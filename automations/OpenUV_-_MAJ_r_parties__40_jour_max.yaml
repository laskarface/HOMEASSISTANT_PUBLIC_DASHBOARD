- id: '1773267939802'
  alias: OpenUV - MAJ réparties (40/jour max)
  description: ''
  triggers:
  - minutes: /1
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  - condition: template
    value_template: '{{ states(''counter.openuv_updates_today'')|int(0) < 40 }}'
  - condition: template
    value_template: "{% set last_ts = states('input_number.openuv_last_update_ts')|int(0)
      %} {% set interval = states('input_number.openuv_interval_seconds')|int(900)
      %} {% if last_ts > 0 %}\n  {{ (as_timestamp(now()) - last_ts) >= interval }}\n{%
      else %}\n  true\n{% endif %}"
  actions:
  - target:
      entity_id: sensor.openuv_maison_indice_uv_actuel
    action: homeassistant.update_entity
  - delay: 00:00:05
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ states('sensor.openuv_maison_niveau_uv_actuel')\n   not
          in ['unknown','unavailable',''] }}\n"
      sequence:
      - target:
          entity_id: counter.openuv_updates_today
        action: counter.increment
      - target:
          entity_id: input_datetime.openuv_last_update
        data:
          datetime: '{{ now().isoformat() }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_number.openuv_last_update_ts
        data:
          value: '{{ as_timestamp(now()) | int }}'
        action: input_number.set_value
  mode: restart
