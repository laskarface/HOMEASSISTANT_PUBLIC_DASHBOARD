- id: '1774605646977'
  alias: "\U0001F3E0 Sécurité : Gestion Automatique Présent/Absent"
  description: Gère la base Eufy (Alarm) et les caméras Tapo (Détection)
  triggers:
  - trigger: state
    entity_id:
    - person.chris
    - person.aline
    - person.marley
    - person.chloe
    - person.morgan
    to: home
  - trigger: state
    entity_id:
    - person.chris
    - person.aline
    - person.marley
    - person.chloe
    - person.morgan
    from: home
    to: not_home
    for: 00:02:00
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{% set people = [''person.chris'', ''person.aline'', ''person.marley'',
          ''person.chloe'', ''person.morgan''] %} {{ expand(people) | selectattr(''state'',
          ''eq'', ''home'') | list | count > 0 }}

          '
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.camera_salon_motion_detection
          - select.camera_salon_person_detection
          - select.camera_bureau_motion_detection
          - select.camera_bureau_person_detection
        data:
          option: 'off'
      - action: alarm_control_panel.alarm_arm_home
        target:
          entity_id: alarm_control_panel.eufy_homebase2
    - conditions:
      - condition: template
        value_template: '{% set people = [''person.chris'', ''person.aline'', ''person.marley'',
          ''person.chloe'', ''person.morgan''] %} {{ expand(people) | selectattr(''state'',
          ''eq'', ''home'') | list | count == 0 }}

          '
      sequence:
      - action: select.select_option
        target:
          entity_id:
          - select.camera_salon_motion_detection
          - select.camera_salon_person_detection
          - select.camera_bureau_motion_detection
          - select.camera_bureau_person_detection
        data:
          option: high
      - action: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.eufy_homebase2
  mode: restart
