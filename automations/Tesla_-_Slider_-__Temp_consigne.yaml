- id: '1767954093158'
  alias: Tesla - Slider -> Temp consigne
  triggers:
  - entity_id: input_number.tesla_temp_cible
    trigger: state
  actions:
  - target:
      entity_id: climate.tesla_model_3_climate
    data:
      temperature: '{{ states(''input_number.tesla_temp_cible'') | float }}'
    action: climate.set_temperature
  mode: restart
