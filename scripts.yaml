alias: Apple TV Salon Power Toggle
sequence:
- choose:
  - conditions:
    - condition: state
      entity_id: media_player.salon
      state: playing
    sequence:
    - service: remote.send_command
      target:
        entity_id: remote.salon
      data:
        command: suspend
  - conditions:
    - condition: state
      entity_id: media_player.salon
      state: idle
    sequence:
    - service: remote.send_command
      target:
        entity_id: remote.salon
      data:
        command: suspend
  default:
  - service: media_player.turn_on
    target:
      entity_id: media_player.salon
mode: single
diffuser_message_alexa:
  alias: Diffuser Message Alexa
  icon: mdi:broadcast
  mode: restart
  description: ''
  sequence:
  - variables:
      nom_envoyeur: "{% set trigger_user = context.user_id %} {% set ns = namespace(name='quelqu\\'un')
        %} {% for state in states.person %}\n  {% if state.attributes.user_id is defined
        and state.attributes.user_id == trigger_user %}\n    {% set ns.name = state.attributes.friendly_name
        %}\n  {% endif %}\n{% endfor %} {{ ns.name }}"
      target_list: '{% set targets = [] %} {% if is_state(''input_boolean.alexa_lison'',
        ''on'') %} {% set targets = targets + [''media_player.echo_lison''] %} {%
        endif %} {% if is_state(''input_boolean.alexa_chloe'', ''on'') %} {% set targets
        = targets + [''media_player.echo_chloe''] %} {% endif %} {% if is_state(''input_boolean.alexa_marley'',
        ''on'') %} {% set targets = targets + [''media_player.echo_marley''] %} {%
        endif %} {% if is_state(''input_boolean.alexa_momo'', ''on'') %} {% set targets
        = targets + [''media_player.echo_momo''] %} {% endif %} {% if is_state(''input_boolean.alexa_salon'',
        ''on'') %} {% set targets = targets + [''media_player.echo_salon''] %} {%
        endif %} {{ targets }}'
      msg_to_say: "{% if message is defined and message | length > 0 %}\n  Message
        de {{ nom_envoyeur }} : {{ message }}\n{% else %}\n  Message de {{ nom_envoyeur
        }} : {{ states('input_text.message_alexa') }}\n{% endif %}"
  - condition: template
    value_template: '{{ target_list != ''[]'' and msg_to_say != '''' and ''unknown''
      not in msg_to_say }}'
  - action: media_player.volume_set
    target:
      entity_id: '{{ target_list }}'
    data:
      volume_level: 0.5
  - delay: 00:00:01
  - action: notify.alexa_media
    data:
      target: '{{ target_list }}'
      data:
        type: announce
        method: all
      message: '{{ msg_to_say }}'
  - action: input_text.set_value
    data:
      value: ''
    target:
      entity_id: input_text.message_alexa
message_salon_2:
  alias: message_salon
  sequence:
  - variables:
      nom_envoyeur: '{% set trigger_user = context.user_id %} {% set personne = states.person
        | selectattr(''attributes.user_id'', ''=='', trigger_user) | first | default(none)
        %} {{ personne.attributes.friendly_name if personne else ''quelqu\''un'' }}'
  - action: notify.alexa_media_echo_salon
    data:
      message: 'Message de {{ nom_envoyeur }} : {{ states(''input_text.message_salon'')
        }}'
      data:
        type: announce
        method: all
  mode: single
alarm_smart_sync:
  alias: Alarme - Synchronisation Intelligente
  description: Désactive l'alarme puis la réactive selon la présence (hors Lison)
  mode: restart
  sequence:
  - service: alarm_control_panel.alarm_disarm
    target:
      entity_id: alarm_control_panel.eufy_homebase2
  - delay: 00:00:02
  - choose:
    - conditions:
      - condition: or
        conditions:
        - condition: state
          entity_id: person.chris
          state: home
        - condition: state
          entity_id: person.aline
          state: home
        - condition: state
          entity_id: person.marley
          state: home
        - condition: state
          entity_id: person.chloe
          state: home
        - condition: state
          entity_id: person.morgan
          state: home
      sequence:
      - service: alarm_control_panel.alarm_arm_home
        target:
          entity_id: alarm_control_panel.eufy_homebase2
    default:
    - service: alarm_control_panel.alarm_arm_away
      target:
        entity_id: alarm_control_panel.eufy_homebase2
