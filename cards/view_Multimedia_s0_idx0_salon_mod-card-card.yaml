        - font-size: 10px
        - color: rgba(255,255,255,0.95)
      tap_action:
        action: call-service
        data:
          command: menu
        service: remote.send_command
        target:
          entity_id: remote.salon
      type: custom:button-card
    columns: 3
    square: false
    type: grid
  - cards:
