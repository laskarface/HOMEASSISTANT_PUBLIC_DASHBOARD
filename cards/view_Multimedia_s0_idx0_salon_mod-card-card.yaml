# =========================================
# CARTE : salon
# VUE   : Multimedia
# TYPE  : custom:mod-card (Carte monobloc)
# DÉPENDANCES :
#  - a.includes
#  - media_player.salon
#  - remote.salon
#  - remote.send_command
# =========================================

card:
  cards:
  - custom_fields:
      app: "[[[\n  const mp = states['media_player.salon'];\n  const a = (mp?.attributes?.app_name\
        \ || mp?.attributes?.source || '').toString().toLowerCase();\n  const label\
        \ = (mp?.attributes?.app_name || mp?.attributes?.source || 'App').toString();\n\
        \n  let ic = 'mdi:apps';\n  if (a.includes('netflix')) ic = 'mdi:netflix';\n\
        \  else if (a.includes('youtube')) ic = 'mdi:youtube';\n  else if (a.includes('music'))\
        \ ic = 'mdi:music';\n  else if (a.includes('apple tv')) ic = 'mdi:apple-tv';\n\
        \  else if (a.includes('iptv')) ic = 'mdi:television-play';\n\n  return `\n\
        \    <div style=\"\n      display:flex; align-items:center; gap:8px;\n   \
        \   padding:6px 10px;\n      border-radius:999px;\n      background: rgba(255,255,255,0.1);\n\
        \      border: 1px solid rgba(255,255,255,0.15);\n      box-shadow: inset\
        \ 0 1px 1px rgba(255,255,255,0.1);\n    \">\n      <ha-icon icon=\"${ic}\"\
        \ style=\"width:18px;height:18px;color:rgba(255,255,255,0.92)\"></ha-icon>\n\
        \      <span style=\"\n        font-weight:900;\n        font-size:12px;\n\
        \        color: rgba(255,255,255,0.95);\n        max-width:140px;\n      \
        \  overflow:hidden;\n        text-overflow:ellipsis;\n        white-space:nowrap;\n\
        \      \">${label}</span>\n    </div>\n  `;\n]]]\n"
    entity: media_player.salon
    icon: mdi:apple
    name: Salon
    show_state: false
    styles:
      card:
      - background: transparent
      - border: none
      - box-shadow: none
      - padding: 10px 12px 0
      custom_fields:
        app:
        - justify-self: end
        - align-self: center
      grid:
      - grid-template-areas: '"i n app"'
      - grid-template-columns: 18px 1fr auto
      - column-gap: 8px
      - align-items: center
      icon:
      - width: 18px
      - color: rgba(255,255,255,0.92)
      name:
      - justify-self: start
      - font-weight: 900
      - font-size: 13px
      - color: rgba(255,255,255,0.95)
    tap_action:
      action: more-info
      entity: media_player.salon
    type: custom:button-card
  - card_mod:
      style: "ha-card{\n  background: transparent !important;\n  border: none !important;\n\
        \  box-shadow: none !important;\n  padding: 6px 10px 2px;\n}\n"
    entity: media_player.salon
    type: media-control
  - card_mod:
      style: "ha-card{\n  background: transparent !important;\n  border: none !important;\n\
        \  box-shadow: none !important;\n  padding: 0 10px 8px;\n}\n"
    cards:
    - hold_action:
        action: call-service
        data:
          command: wakeup
        service: remote.send_command
        target:
          entity_id: remote.salon
      icon: mdi:power
      name: POWER
      show_state: false
      styles:
        card:
        - border-radius: 12px
        - padding: 9px
        - background: rgba(255,255,255,0.06)
        - border: 1px solid rgba(255,255,255,0.10)
        - height: 52px
        grid:
        - grid-template-areas: '"i" "n"'
        - grid-template-rows: 20px min-content
        - row-gap: 4px
        - justify-items: center
        - align-items: center
        icon:
        - width: 18px
        - color: rgba(255,255,255,0.92)
        name:
        - font-weight: 900
        - font-size: 10px
        - color: rgba(255,255,255,0.95)
      tap_action:
        action: call-service
