      - color_type: blank-card
        type: custom:button-card
      columns: 3
      square: false
      type: grid
      view_layout:
        grid-column: 1 / span 4
    - cards:
      - icon: mdi:volume-plus
        name: ''
        show_state: false
        styles:
          card:
          - border-radius: 12px
          - background: rgba(255,255,255,0.06)
          - border: 1px solid rgba(255,255,255,0.10)
