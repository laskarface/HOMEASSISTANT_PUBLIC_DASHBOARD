# =========================================
# CARTE : attributes
# VUE   : Lison
# TYPE  : entities (Carte monobloc)
# DÉPENDANCES :
#  - a.icon
#  - a.level
#  - a.name
#  - active_alerts.map
#  - active_alerts.push
#  - active_alerts.sort
#  - alert.state
#  - alert_ent.attributes
#  - alert_ent.state
#  - ath.max
#  - ath.min
#  - ath.round
#  - b.level
#  - bject.entries
#  - entity.attributes
#  - entity.state
#  - event.stop
#  - key.split
#  - key.to
#  - klow.includes
#  - l.includes
#  - n.card
#  - risk_levels.includes
#  - sensor.91_weather_alert
#  - sensor.openuv_maison_indice_uv_actuel
#  - sensor.qualite_globale_cerny
#  - sun.sun
#  - theme.color
#  - theme.icon
