# =========================================
# CARTE : bureau_z
# VUE   : Lumieres
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - entity.state
#  - images.unsplash
#  - switch.bureau_z
# =========================================

custom_fields:
  left: "[[[\n  const on = entity.state === 'on';\n  const shadow = on ? 'drop-shadow(0\
    \ 0 10px rgba(180,220,255,0.9))' : 'none';\n  const bg = on ? 'linear-gradient(135deg,\
    \ rgba(255,152,0,0.3) 0%, rgba(255,152,0,0.05) 100%)' : 'transparent';\n  \n \
    \ return `\n    <div style=\"width: 100%; height: 100%; display: flex; flex-direction:\
    \ column; align-items: center; justify-content: center; background: ${bg}; border-right:\
    \ 2px solid rgba(255,152,0,0.3); box-sizing: border-box; gap: 4px;\">\n      <ha-icon\
    \ icon=\"mdi:laptop\" style=\"width: 24px; height: 24px; color: white; filter:\
    \ ${shadow};\"></ha-icon>\n      <div style=\"font-size: 10px; font-weight: 950;\
    \ text-transform: uppercase; letter-spacing: 1.5px; color: white; line-height:\
    \ 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5);\">BUREAU</div>\n    </div>\n  `;\n\
    ]]]\n"
  right: "[[[\n  const on = entity.state === 'on';\n  \n  // Image de bureau domestique\
    \ / mobilier\n  const bgImg = \"https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?q=80&w=500&auto=format&fit=crop\"\
    ;\n  const bgHtml = `<div style=\"position: absolute; inset: 0; background: url('${bgImg}')\
    \ center center / cover no-repeat; opacity: 0.35; z-index: 0; filter: contrast(1.3)\
    \ brightness(0.65);\"></div>`;\n\n  if (!on) return bgHtml + `\n    <div style=\"\
    position: relative; z-index: 1; width: 100%; height: 100%; display: flex; align-items:\
    \ center; justify-content: center; pointer-events: none; background: rgba(0,0,0,0.25);\"\
    >\n      <span style=\"font-size: 14px; font-weight: 950; color: rgba(255,255,255,0.7);\
    \ text-shadow: 0 1px 4px rgba(0,0,0,0.8); text-transform: uppercase;\">\n    \
    \    Bureau Éteint\n      </span>\n    </div>`;\n\n  return bgHtml + `\n    <div\
    \ style=\"position: relative; width: 100%; height: 100%; z-index: 1; background:\
    \ rgba(0,0,0,0.2);\">\n      <div style=\"\n        position: absolute; inset:\
    \ 0;\n        background: linear-gradient(90deg, rgba(180,220,255,0.1) 0%, rgba(180,220,255,0.3)\
    \ 50%, rgba(180,220,255,0.1) 100%);\n        z-index: 1;\n      \"></div>\n  \
    \    <div style=\"position: absolute; inset: 0; display: flex; align-items: center;\
    \ justify-content: center; z-index: 2;\">\n        <span style=\"font-size: 13px;\
    \ font-weight: 950; color: white; text-shadow: 0 2px 10px rgba(0,0,0,1); text-transform:\
    \ uppercase; letter-spacing: 1.2px;\">\n          ✦ BUREAU ALLUMÉ ✦\n        </span>\n\
    \      </div>\n    </div>`;\n]]]\n"
entity: switch.bureau_z
show_icon: false
show_name: false
styles:
  card:
  - height: 62px
  - padding: 0
  - border-radius: 20px
  - border: 1.5px solid rgba(255, 152, 0, 0.6)
  - background: rgba(10, 15, 25, 0.85)
  - backdrop-filter: blur(8px)
  - -webkit-backdrop-filter: blur(8px)
  - box-shadow: 0 4px 15px rgba(0,0,0,0.4)
  - overflow: hidden
  custom_fields:
    left:
    - justify-self: stretch
    - align-self: stretch
    - z-index: 2
    right:
    - justify-self: stretch
    - align-self: stretch
    - position: relative
    - overflow: hidden
    - z-index: 1
  grid:
  - grid-template-areas: '"left right"'
  - grid-template-columns: 130px 1fr
  - grid-template-rows: 100%
tap_action:
  action: toggle
type: custom:button-card
