# =========================================
# CARTE : chambre_lison
# VUE   : Sauvegarde_de_card
# TYPE  : custom:bubble-card (Carte monobloc)
# DÉPENDANCES :
#  - binary_sensor.fenetre_lison_contact
#  - climate.smart_thermostat_valve_0300d436
#  - n.bubble
# =========================================

attribute: hvac_modes
card_layout: large-2-rows
card_mod:
  style: "ha-card {\n  background: rgba(20, 27, 38, 0.6) !important;\n  backdrop-filter:\
    \ blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  border-radius: 20px !important;\n\
    \  border: 1px solid rgba(255,255,255,0.1) !important;\n  box-shadow: 0 4px 15px\
    \ rgba(0,0,0,0.2) !important;\n  margin-top: 8px;\n}\n"
card_type: climate
entity: climate.smart_thermostat_valve_0300d436
hide_temperature: false
modules: []
name: Chambre Lison
rows: 1.125
scrolling_effect: false
show_attribute: false
show_icon: true
state_color: false
styles: "ha-card {\n  --bubble-climate-main-background-color: transparent !important;\n\
  \  --bubble-climate-border-radius: 20px;\n}\n.bubble-climate-container {\n  background:\
  \ transparent !important;\n}\n"
sub_button:
  bottom: []
  main:
  - attribute: unit_of_measurement
    entity: binary_sensor.fenetre_lison_contact
    show_attribute: false
    show_icon: true
    show_state: true
    state_background: false
  - attribute: current_temperature
    double_tap_action:
      action: more-info
    entity: climate.smart_thermostat_valve_0300d436
    select_attribute: hvac_modes
    show_arrow: false
    show_attribute: true
    show_name: false
    show_state: false
    sub_button_type: select
    tap_action:
      action: toggle
type: custom:bubble-card
