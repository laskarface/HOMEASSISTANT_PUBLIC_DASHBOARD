- custom_fields:
    content:
      card:
        cards:
        - custom_fields:
            saisie: "[[[\n  setTimeout(() => {\n    const el = document.getElementById('alexa_final_input');\n\
              \    try {\n      if(el && window.hassConnection) {\n        window.hassConnection.then(({conn})\
              \ => {\n          if (conn && conn._entities) {\n            const stateObj\
              \ = conn._entities['input_text.message_alexa'];\n            if (stateObj\
              \ && stateObj.state !== 'unknown') {\n              el.value = stateObj.state;\n\
              \            }\n          }\n        }).catch(() => {});\n      }\n\
              \    } catch(e) {}\n  }, 300);\n\n  return `\n    <div style=\"width:\
              \ 100%; display: flex; align-items: center; justify-content: flex-start;\
              \ padding: 0 15px; box-sizing: border-box;\">\n      <input \n     \
              \   type=\"text\" \n        id=\"alexa_final_input\"\n        placeholder=\"\
              Tapez le message ici...\"\n        onclick=\"event.stopPropagation();\"\
              \n        onmousedown=\"event.stopPropagation();\"\n        ontouchstart=\"\
              event.stopPropagation();\"\n        onpointerdown=\"event.stopPropagation();\"\
              \n        onkeydown=\"event.stopPropagation();\"\n        onkeyup=\"\
              event.stopPropagation();\"\n        onkeypress=\"event.stopPropagation();\"\
              \n        oninput=\"try { window.hassConnection && window.hassConnection.then(({conn})\
              \ => conn.sendMessage({type: 'call_service', domain: 'input_text', service:\
              \ 'set_value', service_data: { entity_id: 'input_text.message_alexa',\
              \ value: this.value }})) } catch(e) {}\"\n        style=\"\n       \
              \   background: transparent !important;\n          border: none !important;\n\
              \          color: white !important;\n          font-size: 14px;\n  \
              \        font-family: inherit;\n          width: 100% !important;\n\
              \          outline: none !important;\n          text-align: left !important;\n\
              \          padding: 0;\n          margin: 0;\n          user-select:\
              \ text !important;\n          -webkit-user-select: text !important;\n\
              \        \"\n      />\n    </div>\n  `;\n]]]\n"
          show_icon: false
          show_name: false
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 12px
            - border: 1px solid rgba(255,255,255,0.1)
            - box-shadow: none
