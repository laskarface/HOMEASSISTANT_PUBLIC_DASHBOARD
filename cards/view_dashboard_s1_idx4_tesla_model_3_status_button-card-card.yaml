# =========================================
# CARTE : tesla_model_3_status
# VUE   : dashboard
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - ath.max
#  - ath.min
#  - ath.round
#  - binary_sensor.tesla_model_3_charging
#  - binary_sensor.tesla_model_3_status
#  - button.press
#  - button.tesla_model_3_wake
#  - image.png
#  - images.pexels
#  - sensor.tesla_model_3_autonomie_de_batterie
#  - sensor.tesla_model_3_niveau_de_batterie
#  - umber.is
#  - variables.color
# =========================================

custom_fields:
  img: "[[[\n  const color = variables.color;\n  const isOn = states['binary_sensor.tesla_model_3_status']?.state\
    \ === 'on';\n  const isCharging = states['binary_sensor.tesla_model_3_charging']?.state\
    \ === 'on';\n  let statusText = isOn ? 'CONNECTÉE' : 'VEILLE';\n  if (isCharging)\
    \ statusText = 'EN CHARGE ⚡';\n  return `\n    <div style=\"width: 100%; height:\
    \ 100%; display: flex; flex-direction: column; align-items: center; justify-content:\
    \ center; background: linear-gradient(135deg, ${color}33 0%, ${color}0D 100%);\"\
    >\n      <img src=\"/local/tesla-car-image.png\" style=\"width: 100%; max-width:\
    \ 100px; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); margin-bottom:\
    \ 8px;\" />\n      <div style=\"font-size: 11px; color: rgba(255,255,255,0.7);\
    \ font-weight: 700; text-transform: uppercase;\">${statusText}</div>\n    </div>\n\
    \  `;\n]]]\n"
  info: "[[[\n  const isCharging = states['binary_sensor.tesla_model_3_charging']?.state\
    \ === 'on';\n  const rawBattery = states['sensor.tesla_model_3_niveau_de_batterie']?.state;\n\
    \  const rawRange   = states['sensor.tesla_model_3_autonomie_de_batterie']?.state;\n\
    \  let batterie = Math.round(Number(rawBattery));\n  let autonomie = Math.round(Number(rawRange));\n\
    \  const pct = Number.isFinite(batterie) ? Math.max(0, Math.min(100, batterie))\
    \ : 0;\n  const fillColor = variables.color;\n  \n  const bar = `\n    <div style=\"\
    height:8px; border-radius:4px; background: rgba(0,0,0,0.3); overflow:hidden; margin-top:\
    \ 6px;\">\n      <div style=\"height:100%; width:${pct}%; background:${fillColor};\
    \ box-shadow: 0 0 10px ${fillColor}99; border-radius:4px;\"></div>\n    </div>\n\
    \  `;\n  \n  const displayBat = Number.isFinite(batterie) ? batterie + \"%\" :\
    \ \"--%\";\n  const displayRange = Number.isFinite(autonomie) ? autonomie + \"\
    \ km\" : \"-- km\";\n  \n  // Image thématique : Garage moderne et minimaliste\n\
    \  const bgImg = \"https://images.pexels.com/photos/4489749/pexels-photo-4489749.jpeg?auto=compress&cs=tinysrgb&w=500\"\
    ;\n  \n  return `\n    <div style=\"width: 100%; height: 100%; position: relative;\
    \ overflow: hidden; display: flex; flex-direction: column; justify-content: center;\
    \ padding: 12px 15px; box-sizing: border-box;\">\n      <!-- Image de garage avec\
    \ opacité à 0.45 pour plus de clarté -->\n      <div style=\"position: absolute;\
    \ top:0; left:0; width: 100%; height: 100%; background: url('${bgImg}') center/cover\
    \ no-repeat; opacity: 0.35; z-index: 0;\"></div>\n      \n      <div style=\"\
    position: relative; z-index: 1;\">\n        <div style=\"font-size: 16px; font-weight:\
    \ 800; color: white; text-align: right; margin-bottom: 2px; text-shadow: 0 2px\
    \ 4px rgba(0,0,0,0.8);\">TESLA MODEL 3</div>\n        <div style=\"width: 100%;\
    \ margin-top: 15px;\">\n          <div style=\"display:flex; justify-content:space-between;\
    \ align-items: flex-end;\">\n            <span style=\"font-size: 11px; color:\
    \ rgba(255,255,255,0.85); font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.8);\"\
    >BATTERIE</span>\n            <span style=\"font-size: 13px; font-weight: 800;\
    \ color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.8);\">${displayBat} <span\
    \ style=\"font-size: 11px; color: rgba(255,255,255,0.4);\">|</span> ${displayRange}</span>\n\
    \          </div>\n          ${bar}\n        </div>\n      </div>\n    </div>\n\
    \  `;\n]]]\n"
  wake:
    card:
      entity: button.tesla_model_3_wake
      icon: mdi:power
      show_name: false
      show_state: false
      size: 18px
      styles:
        card:
        - width: 32px
        - height: 32px
        - border-radius: 10px
        - padding: 0
        - background: rgba(0,0,0,0.3)
        - border: 1px solid rgba(255,255,255,0.1)
        - backdrop-filter: blur(6px)
        - box-shadow: 0 4px 8px rgba(0,0,0,0.2)
        - margin: 0
        icon:
        - color: rgba(255,255,255,0.8)
        - width: 18px
        - transition: all 0.3s ease
      tap_action:
        action: call-service
        service: button.press
        service_data:
          entity_id: button.tesla_model_3_wake
      type: custom:button-card
entity: binary_sensor.tesla_model_3_status
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: "[[[\n  return `1px solid ${variables.color}80`;\n]]]\n"
  - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
  - overflow: hidden
  - margin: 0px
  - box-sizing: border-box
  - position: relative
  custom_fields:
    img:
    - justify-self: stretch
    - align-self: stretch
    - border-right: 2px solid rgba(255,255,255,0.6)
    - display: flex
    - align-items: center
    - justify-content: center
    - padding: 0
    - z-index: 2
    info:
    - justify-self: stretch
    - align-self: stretch
    - padding: 0
    - position: relative
    - overflow: hidden
    wake:
    - position: absolute
    - left: 145px
    - top: 12px
    - z-index: 2
  grid:
  - grid-template-areas: '"img info"'
  - grid-template-columns: 130px minmax(0, 1fr)
  - grid-template-rows: 100px
  - gap: 0px
  - width: 100%
  - margin: 0
tap_action:
  action: navigate
  navigation_path: /lovelace/tesla_modele_3
type: custom:button-card
variables:
  color: "[[[\n  const isCharging = states['binary_sensor.tesla_model_3_charging']?.state\
    \ === 'on';\n  const batteryState = parseFloat(states['sensor.tesla_model_3_niveau_de_batterie']?.state\
    \ || 0);\n  if (isCharging) return '#00D2FF';\n  if (batteryState <= 20) return\
    \ '#FF3232';\n  if (batteryState <= 30) return '#FFAA00';\n  return '#00E676';\n\
    ]]]\n"
