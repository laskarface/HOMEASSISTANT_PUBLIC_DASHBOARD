# =========================================
# CARTE : unsplash
# VUE   : Temperatures_et_Humidites
# TYPE  : grid (Carte monobloc)
# DÉPENDANCES :
#  - images.unsplash
# =========================================

cards:
- custom_fields:
    bg: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `<div style=\"position:absolute; top:0; left:0; width:100%; height:100%;\
      \ background:url('${bgImg}') center/cover no-repeat; opacity:0.15; z-index:0;\
      \ filter: saturate(1.5) sepia(1) hue-rotate(80deg);\"></div>`;\n]]]\n"
  icon: mdi:home
  name: Accueil
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(0, 255, 0, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#00FF00'
    - filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 600
    - color: rgba(255,255,255,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/dashboard
  type: custom:button-card
- custom_fields:
    bg: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `<div style=\"position: absolute; top:0; left:0; width:100%; height:100%;\
      \ background: url('${bgImg}') center 75%/cover no-repeat; opacity: 0.35; filter:\
      \ sepia(0.6) saturate(2); z-index: 0;\"></div>`;\n]]]\n"
  icon: mdi:home-lightbulb-outline
  name: Lumières
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(255, 213, 74, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#ffd54a'
    - filter: drop-shadow(0 0 8px rgba(255, 213, 74, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 950
    - color: white
    - text-shadow: 0 2px 4px rgba(0,0,0,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/lumieres
  type: custom:button-card
- custom_fields:
    bg: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1548337138-e87d889cc369?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `<div style=\"position: absolute; top:0; left:0; width:100%; height:100%;\
      \ background: url('${bgImg}') center center / cover no-repeat; opacity: 0.3;\
      \ z-index: 0; filter: saturate(1.4) brightness(0.7) hue-rotate(10deg);\"></div>`;\n\
      ]]]\n"
  icon: mdi:home-lightning-bolt-outline
  name: Energies
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(0, 128, 255, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#0080ff'
    - filter: drop-shadow(0 0 8px rgba(0, 128, 255, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 950
    - color: white
    - text-shadow: 0 2px 4px rgba(0,0,0,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/energies
  type: custom:button-card
columns: 3
square: false
type: grid
