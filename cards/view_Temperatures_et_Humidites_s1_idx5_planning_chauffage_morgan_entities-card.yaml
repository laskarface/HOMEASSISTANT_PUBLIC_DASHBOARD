        \ height: 12px; color: ${tempIconColor}; transition: color 0.5s;\"></ha-icon>\n\
        \          <span style=\"font-size: 8px; font-weight: 900; color: ${tempIconColor};\
        \ letter-spacing: 1px; line-height: 1;\">TEMPÉRATURE</span>\n        </div>\n\
        \        <div style=\"display: flex; align-items: baseline; gap: 4px;\">\n\
        \          <span style=\"font-size: 22px; font-weight: 900; color: ${tempTextColor};\
        \ line-height: 1;\">${parseFloat(temp).toFixed(1)}</span>\n          <span\
        \ style=\"font-size: 11px; font-weight: 800; color: ${tempIconColor}; line-height:\
        \ 1;\">°C</span>\n        </div>\n      </div>\n      <div style=\"flex: 1;\
        \ height: 100%; display: flex; flex-direction: column; justify-content: center;\
        \ align-items: center; background: ${humBg}; pointer-events: auto; cursor:\
        \ pointer; transition: all 0.5s;\"\n           onclick=\"event.stopPropagation();\
        \ const e = new CustomEvent('hass-more-info', { detail: { entityId: '${variables.hum_entity}'\
        \ }, bubbles: true, composed: true }); this.dispatchEvent(e);\">\n       \
        \ <div style=\"display: flex; align-items: center; gap: 4px; margin-bottom:\
        \ 2px;\">\n          <ha-icon icon=\"mdi:water-percent\" style=\"width: 13px;\
        \ height: 13px; color: ${humIconColor}; margin-left: -2px; transition: color\
        \ 0.5s;\"></ha-icon>\n          <span style=\"font-size: 8px; font-weight:\
        \ 900; color: ${humIconColor}; letter-spacing: 1px; line-height: 1;\">HUMIDITÉ</span>\n\
