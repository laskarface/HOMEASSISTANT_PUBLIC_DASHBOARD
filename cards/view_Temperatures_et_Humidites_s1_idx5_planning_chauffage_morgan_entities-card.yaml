        \ tempBg = \"transparent\";\n  let tempIconColor = \"rgba(255,255,255,0.3)\"\
        ;\n  let tempTextColor = \"white\";\n  \n  if (temp > 0 && temp < 19) {\n\
        \    tempAlert = true; tempBg = \"linear-gradient(135deg, rgba(41, 182, 246,\
        \ 0.25) 0%, transparent 100%)\";\n    tempIconColor = \"#29B6F6\"; tempTextColor\
