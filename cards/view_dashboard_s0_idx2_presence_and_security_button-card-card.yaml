# VUE   : dashboard
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - alarm_control_panel.eufy_homebase2
#  - ath.round
#  - images.unsplash
#  - media_player.decodeur_orange_2
#  - person.aline
#  - person.chloe
#  - person.chris
#  - person.lison
#  - person.marley
#  - person.morgan
