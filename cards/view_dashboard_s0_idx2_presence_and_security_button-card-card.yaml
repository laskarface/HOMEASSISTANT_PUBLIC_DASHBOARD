#  - sensor.pcmorgan_sessionstatesensor
#  - src.includes
# =========================================

custom_fields:
  alarme:
    card:
      card:
        custom_fields:
          bg: '[[[ return `<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:url(''https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=400&auto=format&fit=crop'')
            center/cover;opacity:0.4;z-index:0;"></div>`; ]]]

            '
          btn:
            card:
              entity: alarm_control_panel.eufy_homebase2
              icon: '[[[ const s = states[''alarm_control_panel.eufy_homebase2'']?.state;
                return s === ''triggered'' ? ''mdi:bell-off'' : ''mdi:sync''; ]]]'
              name: DÉSACTIVER SIRÈNE
              styles:
                card:
                - background: '[[[ const s = states[''alarm_control_panel.eufy_homebase2'']?.state;
                    return s === ''triggered'' ? ''#ff1744'' : ''rgba(255,255,255,0.08)'';
                    ]]]'
                - border-radius: 12px
                - padding: 10px 4px
                - width: 90%
                - margin: 0 auto
                - border: '[[[ const s = states[''alarm_control_panel.eufy_homebase2'']?.state;
                    return s === ''triggered'' ? ''none'' : ''1px solid rgba(255,255,255,0.1)'';
                    ]]]'
                - z-index: 2
                icon:
                - width: 14px
                - color: white
                name:
                - font-size: 10px
                - font-weight: 900
                - color: white
                - text-transform: uppercase
                - white-space: normal
                - word-break: break-word
                - line-height: '1.3'
                - text-align: center
              tap_action:
                action: call-service
                service: script.alarm_smart_sync
              type: custom:button-card
          i: "[[[ \n  const s = states['alarm_control_panel.eufy_homebase2']?.state;\
            \ \n  let icon = s === 'disarmed' ? 'mdi:shield-off' : (s === 'triggered'\
            \ ? 'mdi:shield-alert' : (s === 'armed_home' ? 'mdi:shield-home' : 'mdi:shield-lock'));\
            \ \n  let color = s === 'disarmed' ? '#00c853' : (s === 'triggered' ||\
            \ s === 'armed_away' ? '#ff1744' : '#ff9100'); \n  return `<div style=\"\
            display:flex; justify-content:center; position:relative; z-index:1;\"\
            ><ha-icon icon=\"${icon}\" style=\"width:50px; height:50px; color:${color};\
            \ ${s === 'triggered' ? 'animation: pulse 1s infinite;' : ''}\"></ha-icon></div>`;\
            \ \n]]]\n"
          s: "[[[ \n  const s = states['alarm_control_panel.eufy_homebase2']?.state;\
            \ \n  let label = s === 'disarmed' ? 'DÉSACTIVÉE' : (s === 'triggered'\
            \ ? 'ALERTE !' : (s === 'armed_home' ? 'PRÉSENT' : 'ABSENCE')); \n  let\
            \ color = s === 'disarmed' ? '#00c853' : (s === 'triggered' || s === 'armed_away'\
            \ ? '#ff1744' : '#ff9100'); \n  return `<div style=\"text-align:center;\
            \ color:${color}; font-size:14px; font-weight:900; text-transform:uppercase;\
            \ position:relative; z-index:1;\">${label}</div>`; \n]]]\n"
        entity: alarm_control_panel.eufy_homebase2
        name: Alarme
        show_icon: false
        show_name: false
        styles:
          card:
          - height: 230px
          - border-radius: 20px
          - background: rgba(20, 27, 38, 0.6)
          - position: relative
          - overflow: hidden
          - border: "[[[ \n  const s = states['alarm_control_panel.eufy_homebase2']?.state;\n\
              \  const c = s === 'disarmed' ? '0,200,83' : (s === 'triggered' || s\
              \ === 'armed_away' ? '255,23,68' : '255,145,0');\n  return `1px solid\
              \ rgba(${c}, 0.5)`;\n]]]\n"
          grid:
          - grid-template-areas: '"i" "s" "btn"'
          - grid-template-rows: 1.2fr 0.8fr 1fr
          - align-items: center
        tap_action:
          action: more-info
        type: custom:button-card
      exemptions:
      - user: 49a98c3aa3c44399a03d32437dca04ba
      - user: 5ee57ea8e4174d67b0a97686fe4437b5
      restrictions:
        pin:
          code: '1106'
          text: 🔐 Code PIN requis
