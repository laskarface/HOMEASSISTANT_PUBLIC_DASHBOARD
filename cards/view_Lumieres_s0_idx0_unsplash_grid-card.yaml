# =========================================
# CARTE : unsplash
# VUE   : Lumieres
# TYPE  : grid (Carte monobloc)
# DÉPENDANCES :
#  - images.pexels
#  - images.unsplash
# =========================================

cards:
- custom_fields:
    bg: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `<div style=\"position:absolute; top:0; left:0; width:100%; height:100%;\
      \ background:url('${bgImg}') center/cover no-repeat; opacity:0.15; z-index:0;\
      \ filter: saturate(1.5) sepia(1) hue-rotate(80deg);\"></div>`;\n]]]\n"
  icon: mdi:home
  name: Accueil
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(0, 255, 0, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#00FF00'
    - filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 600
    - color: rgba(255,255,255,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/dashboard
  type: custom:button-card
- custom_fields:
    bg: "[[[\n  // Image de thermomètre minimaliste sur fond épuré\n  const bgImg\
      \ = \"https://images.pexels.com/photos/545012/pexels-photo-545012.jpeg?auto=compress&cs=tinysrgb&w=500\"\
      ;\n  return `\n    <div style=\"position: absolute; top:0; left:0; width:100%;\
      \ height:100%; \n                background: linear-gradient(135deg, rgba(250,\
      \ 0, 125, 0.1) 0%, rgba(20, 27, 38, 0) 100%), \n                           \
      \ url('${bgImg}') center center / cover no-repeat; \n                opacity:\
      \ 0.3; z-index: 0;\">\n    </div>`;\n]]]\n"
  icon: mdi:home-thermometer-outline
  name: Temp. & Humidité
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(250, 0, 125, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#FA007D'
    - filter: drop-shadow(0 0 8px rgba(250, 0, 125, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 950
    - color: white
    - white-space: normal
    - line-height: 1.1
    - text-align: center
    - text-shadow: 0 2px 4px rgba(0,0,0,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/temperatures-et-consommations
  type: custom:button-card
- custom_fields:
    bg: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1548337138-e87d889cc369?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `<div style=\"position: absolute; top:0; left:0; width:100%; height:100%;\
      \ background: url('${bgImg}') center center / cover no-repeat; opacity: 0.25;\
      \ z-index: 0; filter: saturate(1.8) brightness(0.8) hue-rotate(-10deg);\"></div>`;\n\
      ]]]\n"
  icon: mdi:home-lightning-bolt-outline
  name: Energies
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(0, 128, 255, 0.5)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - position: relative
    - overflow: hidden
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#0080ff'
    - filter: drop-shadow(0 0 8px rgba(0, 128, 255, 0.4))
    - margin-bottom: 8px
    - z-index: 1
    name:
    - font-size: 13px
    - font-weight: 950
    - color: white
    - text-shadow: 0 2px 4px rgba(0,0,0,0.9)
    - z-index: 1
  tap_action:
    action: navigate
    navigation_path: /lovelace/energies
  type: custom:button-card
columns: 3
square: false
type: grid
