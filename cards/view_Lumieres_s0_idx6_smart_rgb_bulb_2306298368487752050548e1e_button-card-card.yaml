    \    'light.smart_rgb_bulb_2306296173098452050548e1e9ccb62d',\n    'light.smart_light_2303300800116959010148e1e9c297f8'\n\
    \  ];\n  const on = ids.some(id => states[id] && states[id].state === 'on');\n\
    \  const shadow = on ? 'drop-shadow(0 0 10px rgba(255,152,0,0.9))' : 'none';\n\
    \  const bg = on ? 'linear-gradient(135deg, rgba(255,152,0,0.25) 0%, transparent\
