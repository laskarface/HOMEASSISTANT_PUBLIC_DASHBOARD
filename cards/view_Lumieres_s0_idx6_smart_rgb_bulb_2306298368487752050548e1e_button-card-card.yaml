    \ 100%; display: flex; flex-direction: column; align-items: center; justify-content:\
    \ center; background: ${bg}; border-right: 2px solid rgba(255,152,0,0.3); box-sizing:\
    \ border-box; gap: 4px;\">\n      <ha-icon icon=\"mdi:sofa\" style=\"width: 24px;\
    \ height: 24px; color: white; filter: ${shadow};\"></ha-icon>\n      <div style=\"\
    font-size: 10px; font-weight: 950; text-transform: uppercase; letter-spacing:\
    \ 1.5px; color: white; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5);\"\
    >SALON</div>\n    </div>\n  `;\n]]]\n"
  right: "[[[\n  const ids = [\n    'light.smart_rgb_bulb_2306298368487752050548e1e9ccae7f',\n\
    \    'light.smart_rgb_bulb_2306295441699552050548e1e9ccaa5b',\n    'light.smart_rgb_bulb_2306292288660752050548e1e9cc98ed',\n\
    \    'light.smart_rgb_bulb_2306296173098452050548e1e9ccb62d',\n    'light.smart_light_2303300800116959010148e1e9c297f8'\n\
    \  ];\n  const onList = ids.filter(id => states[id] && states[id].state === 'on');\n\
    \  const onCount = onList.length;\n  const on = onCount > 0;\n\n  const avgBri\
    \ = on\n    ? Math.round(onList.reduce((acc, id) => {\n        return acc + ((states[id].attributes.brightness\
    \ || 255) / 255 * 100);\n      }, 0) / onCount)\n    : 0;\n\n  const bgImg = \"\
    https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?q=80&w=500&auto=format&fit=crop\"\
    ;\n  // Correction CONTRASTE et LUMINOSITÉ pour supprimer l'effet de voile\n \
    \ const bgHtml = `<div style=\"position: absolute; inset: 0; background: url('${bgImg}')\
    \ center center / cover no-repeat; opacity: 0.35; z-index: 0; filter: contrast(1.4)\
    \ brightness(0.6) saturate(1.4);\"></div>`;\n\n  if (!on) return bgHtml + `\n\
    \    <div style=\"position: relative; z-index: 1; width: 100%; height: 100%; display:\
    \ flex; align-items: center; justify-content: center; pointer-events: none; background:\
    \ rgba(0,0,0,0.25);\">\n      <span style=\"font-size: 14px; font-weight: 950;\
    \ color: rgba(255,255,255,0.7); text-shadow: 0 1px 4px rgba(0,0,0,0.8); text-transform:\
    \ uppercase; letter-spacing: 1.2px;\">\n        Salon Éteint\n      </span>\n\
    \    </div>`;\n\n  return bgHtml + `\n    <div style=\"position: relative; width:\
    \ 100%; height: 100%; z-index: 1; background: rgba(0,0,0,0.2);\">\n      <div\
    \ style=\"\n        position: absolute; top: 0; left: 0; height: 100%; width:\
    \ ${avgBri}%;\n        background: linear-gradient(90deg, rgba(255,152,0,0.1)\
    \ 0%, rgba(255,152,0,0.45) 100%);\n        transition: width 0.4s ease-out;\n\
    \        z-index: 1;\n      \"></div>\n      <div style=\"position: absolute;\
    \ inset: 0; display: flex; align-items: center; justify-content: center; z-index:\
    \ 2;\">\n        <span style=\"font-size: 13px; font-weight: 950; color: white;\
    \ text-shadow: 0 2px 10px rgba(0,0,0,1); letter-spacing: 1.2px; text-transform:\
    \ uppercase;\">\n          ✦ ${onCount} LUMS — ${avgBri}% ✦\n        </span>\n\
    \      </div>\n    </div>`;\n]]]\n"
