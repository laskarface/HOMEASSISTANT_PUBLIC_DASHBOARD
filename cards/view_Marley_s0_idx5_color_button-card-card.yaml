# =========================================
# CARTE : color
# VUE   : Marley
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - bj.state
#  - conn._entities
#  - conn.send
#  - document.get
#  - el.value
#  - event.stop
#  - input_text.message_salon
#  - input_text.set_value
#  - onnection.then
#  - script.message_salon_2
#  - this.value
#  - variables.color
#  - window.hass
#  - www.w3
# =========================================

custom_fields:
  btn:
    card:
      extra_styles: "ha-card:active {\n  background-color: rgba(0, 255, 0, 0.3) !important;\n\
        \  border: 1px solid rgba(0, 255, 0, 0.6) !important;\n  transition: none\
        \ !important;\n}\nha-card:active ha-icon {\n  color: white !important;\n}\n"
      hold_action:
        action: call-service
        service: input_text.set_value
        service_data:
          entity_id: input_text.message_salon
          value: ''
      icon: mdi:send
      show_name: false
      styles:
        card:
        - width: 50px
        - height: 48px
        - border-radius: 12px
        - background: rgba(0, 205, 249, 0.2)
        - border: 1px solid rgba(0, 205, 249, 0.6)
        - box-shadow: 0 0 10px rgba(0, 205, 249, 0.3)
        - margin: 0
        - padding: 0
        - transition: background-color 0.5s ease, border 0.5s ease
        icon:
        - color: '#00CDF9'
        - width: 20px
      tap_action:
        action: call-service
        service: script.message_salon_2
      type: custom:button-card
  icon: "[[[\n  const color = variables.color;\n  const svgIcon = `\n    <svg viewBox=\"\
    0 0 24 24\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:\
    \ 38px; height: 38px; filter: drop-shadow(0 0 10px ${color}80); z-index: 1;\"\
    >\n      <defs>\n        <linearGradient id=\"gradMsgSalon\" x1=\"0%\" y1=\"0%\"\
    \ x2=\"100%\" y2=\"100%\">\n          <stop offset=\"0%\" stop-color=\"#00CDF9\"\
    \ />\n          <stop offset=\"100%\" stop-color=\"#0066FF\" />\n        </linearGradient>\n\
    \      </defs>\n      <path d=\"M12 2C6.477 2 2 6.03 2 11c0 2.844 1.503 5.378\
    \ 3.844 7.026a10.024 10.024 0 0 1-1.666 3.12 1 1 0 0 0 1.258 1.488c2.956-1.554\
    \ 4.54-2.67 5.76-3.328A11.137 11.137 0 0 0 12 20c5.523 0 10-4.03 10-9s-4.477-9-10-9z\"\
    \ fill=\"url(#gradMsgSalon)\"/>\n      <circle cx=\"8\" cy=\"11\" r=\"1.5\" fill=\"\
    white\"/>\n      <circle cx=\"12\" cy=\"11\" r=\"1.5\" fill=\"white\"/>\n    \
    \  <circle cx=\"16\" cy=\"11\" r=\"1.5\" fill=\"white\"/>\n    </svg>\n  `;\n\
    \  return `\n    <div style=\"width: 100%; height: 100%; display: flex; flex-direction:\
    \ column; align-items: center; justify-content: center; background: linear-gradient(135deg,\
    \ ${color}33 0%, ${color}0D 100%); position: relative;\">\n      <div style=\"\
    position: absolute; width: 50px; height: 50px; background: ${color}; border-radius:\
    \ 50%; filter: blur(20px); opacity: 0.3;\"></div>\n      ${svgIcon}\n      <div\
    \ style=\"font-size: 10px; font-weight: 900; color: white; text-transform: uppercase;\
    \ letter-spacing: 0.8px; margin-top: 4px; z-index: 1; text-align: center;\">Message<br>Salon</div>\n\
    \    </div>\n  `;\n]]]\n"
  input: "[[[\n  setTimeout(() => {\n    const el = document.getElementById('alexa_salon_input');\n\
    \    try {\n      if(el && window.hassConnection) {\n        window.hassConnection.then(({conn})\
    \ => {\n          if (conn && conn._entities) {\n            const stateObj =\
    \ conn._entities['input_text.message_salon'];\n            if (stateObj && stateObj.state\
    \ !== 'unknown') {\n              el.value = stateObj.state;\n            }\n\
    \          }\n        }).catch(() => {});\n      }\n    } catch(e) {}\n  }, 300);\n\
    \n  return `\n    <input \n      type=\"text\" \n      id=\"alexa_salon_input\"\
    \n      placeholder=\"Message pour le salon...\"\n      onclick=\"event.stopPropagation();\"\
    \n      onmousedown=\"event.stopPropagation();\"\n      ontouchstart=\"event.stopPropagation();\"\
    \n      onpointerdown=\"event.stopPropagation();\"\n      onkeydown=\"event.stopPropagation();\"\
    \n      onkeyup=\"event.stopPropagation();\"\n      onkeypress=\"event.stopPropagation();\"\
    \n      oninput=\"try { window.hassConnection && window.hassConnection.then(({conn})\
    \ => conn.sendMessage({type: 'call_service', domain: 'input_text', service: 'set_value',\
    \ service_data: { entity_id: 'input_text.message_salon', value: this.value }}))\
    \ } catch(e) {}\"\n      style=\"\n        background: rgba(0,0,0,0.2) !important;\n\
    \        border: 1px solid rgba(255,255,255,0.05) !important;\n        border-radius:\
    \ 12px;\n        color: white !important;\n        font-size: 14px;\n        font-weight:\
    \ 500;\n        font-family: inherit;\n        width: 100% !important;\n     \
    \   height: 48px !important;\n        outline: none !important;\n        text-align:\
    \ left !important;\n        padding: 0 15px;\n        margin: 0;\n        user-select:\
    \ text !important;\n        -webkit-user-select: text !important;\n        box-sizing:\
    \ border-box;\n        box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);\n      \"\n\
    \    />\n  `;\n]]]\n"
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
  - box-shadow: '[[[ return `0 0 20px ${variables.color}40, 0 8px 32px rgba(0,0,0,0.4)`;
      ]]]'
  - overflow: hidden
  - margin: 0px
  - box-sizing: border-box
  - height: 85px
  - pointer-events: none
  custom_fields:
    btn:
    - justify-self: center
    - align-self: center
    - display: flex
    - align-items: center
    - justify-content: center
    - pointer-events: auto
    - padding-right: 15px
    icon:
    - justify-self: stretch
    - align-self: stretch
    - border-right: 2px solid rgba(255,255,255,0.6)
    - border-top-left-radius: 20px
    - border-bottom-left-radius: 20px
    - display: flex
    - align-items: center
    - justify-content: center
    - padding: 0
    - pointer-events: none
    input:
    - justify-self: stretch
    - align-self: center
    - display: flex
    - align-items: center
    - padding: 0 10px
    - pointer-events: auto
    - width: 100%
    - box-sizing: border-box
  grid:
  - grid-template-areas: '"icon input btn"'
  - grid-template-columns: 130px 1fr 65px
  - grid-template-rows: 100%
  - width: 100%
  - height: 100%
  - margin: 0
  - gap: 0
type: custom:button-card
variables:
  color: '#00CDF9'
