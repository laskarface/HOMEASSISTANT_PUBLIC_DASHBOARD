# =========================================
# CARTE : color
# VUE   : dashboard
# TYPE  : entities (Carte monobloc)
# DÉPENDANCES :
#  - calendar.anniversaires
#  - calendar.chris_billet_gmail_com
#  - images.unsplash
#  - n.card
#  - n.day
#  - n.event
#  - now.get
#  - variables.color
# =========================================

card_mod:
  style: "ha-card {\n  background: none !important;\n  border: none !important;\n\
    \  box-shadow: none !important;\n  padding: 0 !important;\n}\n.card-content {\
    \ padding: 0px !important; }\n#states { padding: 0px !important; }\n"
entities:
- card_mod:
    style: 'div#head { display: block !important; width: 100% !important; padding:
      0 !important; margin: 0 !important; --toggle-icon-width: 0px !important; }

      #head { padding: 0 !important; margin: 0 !important; width: 100% !important;
      cursor: pointer !important; }

      #head ha-icon { display: none !important; }

      '
  clickable: true
  entities:
  - card_mod:
      style: "ha-card {\n  background: rgba(20, 27, 38, 0.4) !important;\n  backdrop-filter:\
        \ blur(10px);\n  border-radius: 20px !important;\n  border: 1px solid rgba(255,215,0,0.3)\
        \ !important;\n  margin: 10px 0 !important;\n  width: 100% !important;\n}\n\
        .event-title { color: white !important; }\n.event-location, .event-location\
        \ a, .event-location-icon { color: #ff9800 !important; }\n"
    entities:
    - calendar.chris_billet_gmail_com
    - calendar.anniversaires
    maxDaysToShow: 7
    showDate: true
    type: custom:atomic-calendar-revive
  head:
    custom_fields:
      date: "[[[\n  const now = new Date();\n  const dayNum = now.getDate();\n  const\
        \ months = ['JANV', 'FÉVR', 'MARS', 'AVRIL', 'MAI', 'JUIN', 'JUIL', 'AOÛT',\
        \ 'SEPT', 'OCT', 'NOV', 'DÉC'];\n  const monthName = months[now.getMonth()];\n\
        \  return `\n    <svg viewBox=\"0 0 200 200\" style=\"width: 55px; height:\
        \ 55px; margin-bottom: 5px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));\"\
        >\n      <rect x=\"25\" y=\"45\" width=\"150\" height=\"130\" rx=\"20\" fill=\"\
        rgba(255,255,255,0.15)\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"\
        2\"/>\n      <path d=\"M25 65 V55 a20 20 0 0 1 20 -20 h110 a20 20 0 0 1 20\
        \ 20 v10 z\" fill=\"#FFD700\"/>\n      <text x=\"100\" y=\"135\" text-anchor=\"\
        middle\" fill=\"white\" style=\"font-size: 75px; font-weight: 900; font-family:\
        \ sans-serif;\">${dayNum}</text>\n      <text x=\"100\" y=\"58\" text-anchor=\"\
        middle\" fill=\"rgba(0,0,0,0.6)\" style=\"font-size: 20px; font-weight: 900;\
        \ font-family: sans-serif;\">${monthName}</text>\n    </svg>\n    <div style=\"\
        color: #FFFFFF; font-size: 11px; font-weight: 900; text-transform: uppercase;\"\
        >Aujourd'hui</div>\n  `;\n]]]\n"
      details:
        card:
          card_mod:
            style: "ha-card { background: none !important; border: none !important;\
              \ box-shadow: none !important; padding: 0 !important; }\n.day-header\
              \ { display: none !important; }\n.event-title { color: white !important;\
              \ font-size: 13px !important; font-weight: 950 !important; }\n.event-time\
              \ { color: rgba(255,255,255,0.7) !important; font-size: 10px !important;\
              \ }\n\n/* FIX POUR LES ADRESSES ET LIENS EN ORANGE */\n.event-location,\
              \ .event-location a, .event-location-icon { \n  color: #ff9800 !important;\
              \ \n  font-size: 10px !important; \n  font-weight: 800 !important;\n\
              \  text-decoration: none !important;\n}\n"
          entities:
          - entity: calendar.chris_billet_gmail_com
          maxDaysToShow: 1
          noEventText: Aucun RDV aujourd'hui
          showDate: false
          showMonth: false
          showNoEventsForToday: true
          showWeekDay: true
          type: custom:atomic-calendar-revive
      footer: '[[[ return `<ha-icon icon="mdi:chevron-down" style="color: rgba(255,255,255,0.4);
        width: 20px; height: 20px;"></ha-icon>`; ]]]

        '
    show_icon: false
    show_name: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}33, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - margin: 0px
      - overflow: hidden
      - pointer-events: none
      custom_fields:
        date:
        - justify-self: stretch
        - align-self: stretch
        - background: '[[[ return `linear-gradient(135deg, ${variables.color}33 0%,
            rgba(20, 27, 38, 0.1) 100%)`; ]]]'
        - border-right: 2px solid rgba(255,255,255,0.6)
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - padding: 12px 4px
        details:
        - justify-self: stretch
        - align-self: stretch
        - padding: 10px 15px
        - display: flex
        - align-items: center
        - background-image: "[[[\n  return `linear-gradient(90deg, rgba(20,27,38,0.95)\
            \ 0%, rgba(20,27,38,0.35) 50%, rgba(20,27,38,0.95) 100%), url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=500&auto=format&fit=crop')`;\n\
            ]]]\n"
        - background-size: cover
        - background-position: center
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.3)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
      grid:
      - grid-template-areas: '"date details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: auto 30px
      - min-height: 110px
    type: custom:button-card
    variables:
      color: '#FFD700'
  padding: 0
  type: custom:fold-entity-row
type: entities
