# =========================================
# CARTE : smart_rgb_pro_led_strip_2406064087258956
# VUE   : Lumieres
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - ath.round
#  - entity.attributes
#  - entity.state
#  - images.pexels
#  - light.smart_rgb_pro_led_strip_24060640872589560f01c4e7ae04b91f
# =========================================

custom_fields:
  left: "[[[\n  const on = entity.state === 'on';\n  const shadow = on ? 'drop-shadow(0\
    \ 0 10px rgba(255,152,0,0.9))' : 'none';\n  const bg = on ? 'linear-gradient(135deg,\
    \ rgba(255,152,0,0.3) 0%, transparent 100%)' : 'transparent';\n  \n  return `\n\
    \    <div style=\"width: 100%; height: 100%; display: flex; flex-direction: column;\
    \ align-items: center; justify-content: center; background: ${bg}; border-right:\
    \ 2px solid rgba(255,152,0,0.2); box-sizing: border-box; gap: 4px;\">\n      <ha-icon\
    \ icon=\"mdi:led-strip-variant\" style=\"width: 24px; height: 24px; color: white;\
    \ filter: ${shadow};\"></ha-icon>\n      <div style=\"font-size: 10px; font-weight:\
    \ 950; text-transform: uppercase; letter-spacing: 1.5px; color: white; line-height:\
    \ 1; text-shadow: 0 1px 3px rgba(0,0,0,0.5);\">MARLEY</div>\n    </div>\n  `;\n\
    ]]]\n"
  right: "[[[\n  const on = entity.state === 'on';\n  const bri = on && entity.attributes.brightness\n\
    \    ? Math.round((entity.attributes.brightness / 255) * 100)\n    : 0;\n\n  const\
    \ bgImg = \"https://images.pexels.com/photos/164595/pexels-photo-164595.jpeg?auto=compress&cs=tinysrgb&w=500\"\
    ;\n  // Amélioration du contraste et de l'opacité pour supprimer l'effet de voile\n\
    \  const bgHtml = `<div style=\"position: absolute; inset: 0; background: url('${bgImg}')\
    \ center center / cover no-repeat; opacity: 0.45; z-index: 0; filter: contrast(1.2)\
    \ saturate(1.3);\"></div>`;\n\n  return bgHtml + `\n    <div style=\"position:\
    \ relative; width: 100%; height: 100%; z-index: 1; pointer-events: none; background:\
    \ rgba(0,0,0,0.1);\">\n      <div style=\"\n        position: absolute; top: 0;\
    \ left: 0; height: 100%; width: ${bri}%;\n        background: linear-gradient(90deg,\
    \ rgba(255,152,0, 0.1) 0%, rgba(255,152,0, 0.45) 100%);\n        transition: width\
    \ 0.4s ease-out;\n        z-index: 1;\n      \"></div>\n      <div style=\"position:\
    \ absolute; inset: 0; display: flex; align-items: center; justify-content: center;\
    \ z-index: 2; padding: 0 15px;\">\n        <span style=\"font-size: 13px; font-weight:\
    \ 950; color: white; text-shadow: 0 1px 8px rgba(0,0,0,1); text-transform: uppercase;\
    \ letter-spacing: 1.2px;\">\n          ${on ? '✦ MARLEY : ' + bri + '% ✦' : 'CHAMBRE\
    \ ÉTEINTE'}\n        </span>\n      </div>\n    </div>`;\n]]]\n"
entity: light.smart_rgb_pro_led_strip_24060640872589560f01c4e7ae04b91f
show_icon: false
show_name: false
styles:
  card:
  - height: 62px
  - padding: 0
  - border-radius: 20px
  - border: 1.5px solid rgba(255, 152, 0, 0.6)
  - background: rgba(10, 15, 25, 0.8)
  - backdrop-filter: blur(8px)
  - -webkit-backdrop-filter: blur(8px)
  - box-shadow: 0 4px 15px rgba(0,0,0,0.3)
  - overflow: hidden
  custom_fields:
    left:
    - justify-self: stretch
    - align-self: stretch
    - z-index: 2
    right:
    - justify-self: stretch
    - align-self: stretch
    - position: relative
    - overflow: hidden
    - z-index: 1
  grid:
  - grid-template-areas: '"left right"'
  - grid-template-columns: 130px 1fr
  - grid-template-rows: 100%
tap_action:
  action: toggle
type: custom:button-card
