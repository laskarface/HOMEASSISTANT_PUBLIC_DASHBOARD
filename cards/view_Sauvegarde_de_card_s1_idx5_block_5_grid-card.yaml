# =========================================
# CARTE : block_5
# VUE   : Sauvegarde_de_card
# TYPE  : grid (Carte monobloc)
# DÉPENDANCES :
#  (Aucune dépendance)
# =========================================

cards:
- icon: mdi:home
  name: Accueil
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - transition: transform 0.1s ease
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#00FF00'
    - filter: drop-shadow(0 0 8px rgba(0, 255, 0, 0.4))
    - margin-bottom: 8px
    name:
    - font-size: 13px
    - font-weight: 600
    - color: rgba(255,255,255,0.9)
  tap_action:
    action: navigate
    navigation_path: /lovelace/dashboard
  type: custom:button-card
- icon: mdi:home-lightbulb-outline
  name: Lumières
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - transition: transform 0.1s ease
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#ffd54a'
    - filter: drop-shadow(0 0 8px rgba(255, 213, 74, 0.4))
    - margin-bottom: 8px
    name:
    - font-size: 13px
    - font-weight: 600
    - color: rgba(255,255,255,0.9)
  tap_action:
    action: navigate
    navigation_path: /lovelace/lumieres
  type: custom:button-card
- icon: mdi:home-thermometer-outline
  name: Températures
  styles:
    card:
    - padding: 12px
    - height: 85px
    - border-radius: 20px
    - border: 1px solid rgba(255,255,255,0.1)
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - transition: transform 0.1s ease
    grid:
    - grid-template-areas: '"i" "n"'
    - grid-template-rows: 1fr min-content
    icon:
    - width: 28px
    - height: 28px
    - color: '#FA007D'
    - filter: drop-shadow(0 0 8px rgba(250, 0, 125, 0.4))
    - margin-bottom: 8px
    name:
    - font-size: 13px
    - font-weight: 600
    - color: rgba(255,255,255,0.9)
  tap_action:
    action: navigate
    navigation_path: /lovelace/temperatures-et-consommations
  type: custom:button-card
columns: 3
square: false
type: grid
