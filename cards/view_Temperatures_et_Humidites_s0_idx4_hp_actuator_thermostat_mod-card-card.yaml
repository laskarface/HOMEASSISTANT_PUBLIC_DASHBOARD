# =========================================
# CARTE : hp_actuator_thermostat
# VUE   : Temperatures_et_Humidites
# TYPE  : custom:mod-card (Carte monobloc)
# DÉPENDANCES :
#  - climate.hp_actuator_thermostat
#  - ent.attributes
#  - images.unsplash
# =========================================

card:
  custom_fields:
    main: "[[[\n  const ent  = states['climate.hp_actuator_thermostat'];\n  const\
      \ temp = ent ? parseFloat(ent.attributes.current_temperature) : NaN;\n\n  let\
      \ label, color, bg, icon;\n  if (!isNaN(temp) && temp > 25) {\n    label = 'TROP\
      \ CHAUDE';\n    color = '#FF9800';\n    bg    = 'rgba(255,152,0,0.1)';\n   \
      \ icon  = '\U0001F321️';\n  } else if (!isNaN(temp) && temp < 19) {\n    label\
      \ = 'TROP FROIDE';\n    color = '#29B6F6';\n    bg    = 'rgba(41,182,246,0.1)';\n\
      \    icon  = '❄️';\n  } else {\n    label = 'TOUT VA BIEN';\n    color = '#4CAF50';\n\
      \    bg    = 'transparent';\n    icon  = '✓';\n  }\n\n  const imageUrl = 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=600&h=400';\n\
      \n  return `\n    <div style=\"display:flex;width:100%;height:56px;align-items:center;\"\
      >\n\n      <!-- LABEL GAUCHE ÉLARGI À 130PX -->\n      <div style=\"flex:0 0\
      \ 130px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-bottom:6px;border-right:2px\
      \ solid rgba(255,255,255,0.08);background:linear-gradient(135deg,rgba(41,182,246,0.15)\
      \ 0%,transparent 100%);\">\n        <span style=\"font-size:14px;font-weight:950;color:white;text-transform:uppercase;letter-spacing:1px;line-height:1;\"\
      >MAISON</span>\n      </div>\n\n      <!-- STATUT AVEC IMAGE EN FOND À DROITE\
      \ -->\n      <div style=\"flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;padding:0\
      \ 12px;\n        background: linear-gradient(${bg}, ${bg}), linear-gradient(rgba(10,\
      \ 15, 25, 0.65), rgba(10, 15, 25, 0.65)), url('${imageUrl}');\n        background-size:\
      \ cover;\n        background-position: center;\n        transition: all 0.4s;\"\
      >\n        <span style=\"font-size:12px;font-weight:950;color:${color};letter-spacing:0.5px;text-shadow:\
      \ 0 1px 4px rgba(0,0,0,0.9);\">${icon} ${label}</span>\n      </div>\n\n   \
      \ </div>`;\n]]]\n"
  entity: climate.hp_actuator_thermostat
  show_icon: false
  show_name: false
  show_state: false
  styles:
    card:
    - background: transparent
    - box-shadow: none
    - border-radius: 0
    - padding: 0
    - height: 56px
    - overflow: hidden
    grid:
    - grid-template-areas: '"main"'
    - align-items: stretch
    - justify-items: stretch
  tap_action:
    action: none
  type: custom:button-card
card_mod:
  style: "ha-card {\n  position: relative !important;\n  background: rgba(10, 15,\
    \ 25, 0.8) !important;\n  backdrop-filter: blur(15px) !important;\n  -webkit-backdrop-filter:\
    \ blur(15px) !important;\n  border-radius: 20px !important;\n  border: none !important;\n\
    \  box-shadow: 0 8px 32px rgba(0,0,0,0.45) !important;\n  overflow: hidden !important;\n\
    \  padding: 0 !important;\n}\nha-card::before {\n  content: '' !important;\n \
    \ position: absolute !important;\n  inset: 0 !important;\n  border-radius: 20px\
    \ !important;\n  padding: 1.5px !important;\n  background: linear-gradient(to\
    \ right, rgba(41,182,246,0.85), transparent) !important;\n  -webkit-mask:\n  \
    \  linear-gradient(#fff 0 0) content-box,\n    linear-gradient(#fff 0 0) !important;\n\
    \  -webkit-mask-composite: xor !important;\n  mask-composite: exclude !important;\n\
    \  pointer-events: none !important;\n  z-index: 10 !important;\n}\n"
type: custom:mod-card
