          \ 0.3s,border 0.3s;\">\n    <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"\
          14\" fill=\"none\">\n      <circle cx=\"12\" cy=\"12\" r=\"3\" fill=\"rgba(${on?r+','+g+','+b:'255,255,255'},${on?'1':'0.35'})\"\
          />\n      <path d=\"M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66\
          \ 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41\" stroke=\"\
          rgba(${on?r+','+g+','+b:'255,255,255'},${on?'1':'0.35'})\" stroke-width=\"\
          1.5\" stroke-linecap=\"round\"/>\n    </svg>\n  </div>`;\n]]]\n"
