          \ 255) * 0.45).toFixed(2) : '0.06';\n  const bord = on ? ((bri / 255) *\
          \ 0.85).toFixed(2) : '0.14';\n  return `<div style=\"width:34px;height:34px;border-radius:50%;background:rgba(${on?r+','+g+','+b:'255,255,255'},${op});border:1.5px\
