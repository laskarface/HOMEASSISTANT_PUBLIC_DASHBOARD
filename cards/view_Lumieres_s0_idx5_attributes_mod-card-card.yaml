card:
  cards:
  - card_mod:
      style: "ha-card {\n  border-bottom: 1px solid rgba(255,255,255,0.08) !important;\n\
        \  border-radius: 0 !important;\n}\n"
    custom_fields:
      t: "[[[\n  return `<div style=\"display:flex;align-items:center;gap:8px;\">\n\
        \    <div style=\"width:3px;height:11px;border-radius:2px;background:linear-gradient(to\
        \ bottom,rgba(255,255,255,0.6),rgba(255,255,255,0.1));\"></div>\n    <span\
        \ style=\"font-size:10px;font-weight:900;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:2px;\"\
        >Table</span>\n  </div>`;\n]]]\n"
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - border: none
      - padding: 8px 14px
      - height: auto
      grid:
      - grid-template-areas: '"t"'
      - justify-items: start
    styles_extra:
      custom_fields:
        t:
        - justify-self: start
        - width: 100%
    tap_action:
      action: none
    type: custom:button-card
  - cards:
    - card_mod:
        style: ':host { flex: 1 1 0 !important; max-width: 100px !important; }

          '
      custom_fields:
        i: "[[[\n  const on = entity.state === 'on';\n  return `<svg viewBox=\"0 0\
          \ 56 56\" width=\"50\" height=\"50\" xmlns=\"http://www.w3.org/2000/svg\"\
          \ style=\"opacity:${on?'1':'0.25'};transition:opacity 0.4s;display:block;margin:auto;\"\
          >\n    <line x1=\"28\" y1=\"2\" x2=\"28\" y2=\"10\" stroke=\"rgba(255,255,255,0.7)\"\
          \ stroke-width=\"2\" stroke-linecap=\"round\"/>\n    <rect x=\"26\" y=\"\
          10\" width=\"4\" height=\"6\" rx=\"1\" fill=\"rgba(255,255,255,0.35)\"/>\n\
          \    <ellipse cx=\"28\" cy=\"16\" rx=\"10\" ry=\"3\" fill=\"rgba(255,255,255,0.25)\"\
          \ stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1\"/>\n    <path d=\"\
          M18,16 L12,38 Q28,44 44,38 L38,16 Z\" fill=\"rgba(255,255,255,0.1)\" stroke=\"\
          rgba(255,255,255,0.45)\" stroke-width=\"1.5\"/>\n    <path d=\"M21,18 L15,36\
          \ Q28,41 41,36 L35,18 Z\" fill=\"rgba(255,255,255,0.12)\"/>\n    <ellipse\
          \ cx=\"28\" cy=\"38\" rx=\"16\" ry=\"3.5\" fill=\"rgba(255,255,255,0.2)\"\
          \ stroke=\"rgba(255,255,255,0.5)\" stroke-width=\"1.2\"/>\n    <circle cx=\"\
          28\" cy=\"26\" r=\"5\" fill=\"rgba(255,255,255,0.85)\"/>\n    <circle cx=\"\
          26\" cy=\"24\" r=\"1.5\" fill=\"white\" opacity=\"0.7\"/>\n  </svg>`;\n\
          ]]]\n"
      entity: light.smart_rgb_bulb_2401021551861452050248e1e9e8d8fb
      name: Spot 1
      show_icon: false
      show_name: true
      styles:
        card:
        - background: "[[[\n  if (entity.state !== 'on') return 'transparent';\n \
            \ const rgb = entity.attributes.rgb_color;\n  const c = rgb ? `${rgb[0]},${rgb[1]},${rgb[2]}`\
            \ : '255,215,0';\n  const bri = entity.attributes.brightness || 255;\n\
            \  const op = ((bri / 255) * 0.45).toFixed(2);\n  return `radial-gradient(ellipse\
            \ at center, rgba(${c},${op}) 0%, transparent 80%)`;\n]]]\n"
        - box-shadow: none
        - border: none
        - border-radius: 0
        - padding: 10px 0 8px 0
        - transition: background 0.5s ease
        grid:
        - grid-template-areas: '"i" "n"'
        name:
        - font-size: 9px
        - font-weight: 800
        - text-transform: uppercase
        - color: rgba(255,255,255,0.85)
        - margin-top: 4px
      styles_extra:
        custom_fields:
          i:
          - justify-self: center
      tap_action:
        action: toggle
      type: custom:button-card
    - card_mod:
        style: ":host {\n  flex: 0 0 48px !important;\n  max-width: 48px !important;\n\
          \  min-width: 48px !important;\n}\nha-card {\n  display: flex !important;\n\
          \  align-items: center !important;\n  justify-content: center !important;\n\
          }\n"
