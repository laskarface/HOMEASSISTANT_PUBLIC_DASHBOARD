        \ style=\"font-size:10px;font-weight:900;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:2px;\"\
        >Salon</span>\n  </div>`;\n]]]\n"
    show_icon: false
    show_name: false
