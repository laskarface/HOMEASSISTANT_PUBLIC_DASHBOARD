# =========================================
# CARTE : attributes
# VUE   : Sauvegarde_de_card
# TYPE  : conditional (Carte monobloc)
# DÉPENDANCES :
#  - entity.attributes
#  - entity.state
#  - excluded.some
#  - id.includes
#  - k.starts
#  - k.to
#  - nm.includes
#  - s.attributes
#  - s.state
#  - sensor.temperature_alerte_count
#  - variables.color
#  - variables.emoji
# =========================================

card:
  card_mod:
    style: "div#head {\n  display: block !important;\n  width: 100% !important;\n\
      \  padding: 0 !important;\n  margin: 0 !important;\n  --toggle-icon-width: 0px\
      \ !important;\n}\n#head {\n  padding: 0 !important;\n  margin: 0 !important;\n\
      \  width: 100% !important;\n  cursor: pointer !important;\n  pointer-events:\
      \ auto !important;\n}\n#head ha-icon {\n  display: none !important;\n  width:\
      \ 0px !important;\n}\ndiv#items {\n  padding: 0 !important;\n  margin: 0 !important;\n\
      }\n"
  clickable: true
  entities:
  - color_type: blank-card
    styles:
      card:
      - height: 14px
    type: custom:button-card
  - card:
      card_mod:
        style: "ha-card {\n  background: transparent !important;\n  box-shadow: none\
          \ !important;\n  border: none !important;\n  padding: 0 !important;\n  margin:\
          \ 0 !important;\n  width: 100% !important;\n}\n"
      columns: 2
      square: false
      type: grid
    card_param: cards
    filter:
      exclude:
      - entity_id: '*battery*'
      - entity_id: '*climate*'
      - entity_id: '*monitor*'
      - entity_id: '*voltage*'
      - entity_id: '*signal*'
      - entity_id: '*ecojoko*'
      - entity_id: '*cerny*'
      - entity_id: '*oil*'
      - entity_id: '*diffus*'
      - entity_id: '*chrisnas*'
      - entity_id: '*dhwp*'
      - entity_id: '*tesla*'
      - entity_id: '*comfort*'
      - entity_id: '*adjust*'
      - entity_id: '*away*'
      - entity_id: '*hp_actuator*'
      - entity_id: '*pac*'
      - name: '*extérieure*'
      - name: '*exterieure*'
      - name: '*intérieure*'
      - name: '*interieure*'
      - name: '*monitor*'
      - name: '*climate*'
      include:
      - attributes:
          device_class: temperature
        domain: sensor
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(255, 87, 34, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#FF5722'
            - width: 22px
            - height: 22px
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
            state:
            - color: '#FF5722'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
          type: custom:button-card
        state: '> 25'
      - attributes:
          device_class: temperature
        domain: sensor
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(30, 144, 255, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#1e90ff'
            - width: 22px
            - height: 22px
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
            state:
            - color: '#1e90ff'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
          type: custom:button-card
        state: < 19
      - name: '*temp*'
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(255, 87, 34, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#FF5722'
            - width: 22px
            - height: 22px
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
            state:
            - color: '#FF5722'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
          type: custom:button-card
        state: '> 25'
      - name: '*temp*'
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(30, 144, 255, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#1e90ff'
            - width: 22px
            - height: 22px
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
            state:
            - color: '#1e90ff'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
          type: custom:button-card
        state: < 19
      - attributes:
          current_temperature: '> 25'
        domain: climate
        options:
          label: '[[[ return entity.attributes.current_temperature + ''°C'' ]]]'
          layout: horizontal
          show_icon: true
          show_label: true
          show_name: true
          show_state: false
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(255, 87, 34, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n l"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#FF5722'
            - width: 22px
            - height: 22px
            - justify-self: center
            label:
            - color: '#FF5722'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
          type: custom:button-card
      - attributes:
          current_temperature: < 19
        domain: climate
        options:
          label: '[[[ return entity.attributes.current_temperature + ''°C'' ]]]'
          layout: horizontal
          show_icon: true
          show_label: true
          show_name: true
          show_state: false
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - backdrop-filter: blur(10px)
            - -webkit-backdrop-filter: blur(10px)
            - border-radius: 20px
            - border: 1px solid rgba(30, 144, 255, 0.4)
            - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
            - height: 60px
            grid:
            - grid-template-areas: '"i n l"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#1e90ff'
            - width: 22px
            - height: 22px
            - justify-self: center
            label:
            - color: '#1e90ff'
            - font-weight: 900
            - font-size: 13px
            - justify-self: end
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - text-align: left
          type: custom:button-card
    show_empty: false
    type: custom:auto-entities
  head:
    custom_fields:
      details: "[[[\n  const count = parseInt(entity.state) || 0;\n  const label =\
        \ count > 1 ? 'PIÈCES TEMP. ANORMALE' : 'PIÈCE TEMP. ANORMALE';\n  const color\
        \ = variables.color;\n  return `\n    <div style=\"width:100%;height:100%;display:flex;flex-direction:row;justify-content:center;align-items:center;padding:0\
        \ 15px;position:relative;gap:15px;\">\n      <div style=\"font-size:38px;font-weight:900;color:${color};line-height:1;text-shadow:0\
        \ 0 15px ${color}80;transition:color 0.8s ease;\">${count}</div>\n      <div\
        \ style=\"display:flex;flex-direction:column;align-items:flex-start;justify-content:center;\"\
        >\n        <div style=\"font-size:13px;font-weight:800;color:white;text-transform:uppercase;letter-spacing:1px;\"\
        >${label}</div>\n        <div style=\"font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px;font-weight:600;\"\
        >ALERTE &lt; 19°C OU &gt; 25°C</div>\n      </div>\n    </div>`;\n]]]\n"
      footer: "[[[\n  return `<div style=\"display:flex;width:100%;justify-content:center;align-items:center;\"\
        >\n    <ha-icon icon=\"mdi:chevron-down\" style=\"color:rgba(255,255,255,0.7);width:18px;height:18px;\"\
        ></ha-icon>\n  </div>`;\n]]]\n"
      icon: "[[[\n  const color = variables.color;\n  const emoji = variables.emoji;\n\
        \  return `\n    <div style=\"width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,${color}33\
        \ 0%,${color}0D 100%);border-top-left-radius:20px;box-sizing:border-box;position:relative;\"\
        >\n      <div style=\"position:absolute;width:50px;height:50px;background:${color};border-radius:50%;filter:blur(20px);opacity:0.3;animation:pulseGlow\
        \ 4s infinite alternate ease-in-out;\"></div>\n      <div style=\"font-size:32px;line-height:1;filter:drop-shadow(0\
        \ 0 10px ${color}80);display:flex;align-items:center;justify-content:center;z-index:1;\"\
        >${emoji}</div>\n      <div style=\"font-size:10px;font-weight:900;color:white;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;z-index:1;\"\
        >Température</div>\n      <style>@keyframes pulseGlow { from{opacity:0.2;transform:scale(0.9);}to{opacity:0.4;transform:scale(1.1);}\
        \ }</style>\n    </div>`;\n]]]\n"
    entity: sensor.temperature_alerte_count
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}80, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - overflow: hidden
      - margin: 0px
      - box-sizing: border-box
      - position: relative
      - height: 85px
      - transition: box-shadow 0.8s ease-in-out, border 0.8s ease-in-out, background
          0.8s ease-in-out
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
        - padding: 0
        - overflow: hidden
        - position: relative
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.2)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
        - padding: 0
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 60px 25px
      - gap: 0px
      - width: 100%
      - margin: 0
    tap_action:
      action: none
    type: custom:button-card
    variables:
      color: "[[[\n  let hasHot = false, hasCold = false;\n  const excluded = [\"\
        battery\",\"voltage\",\"signal\",\"ecojoko\",\"cerny\",\"oil\",\"diffus\"\
        ,\"chrisnas\",\"dhwp\",\"tesla\",\"comfort\",\"adjust\",\"away\",\"extérieure\"\
        ,\"exterieure\",\"intérieure\",\"interieure\",\"hp_actuator\",\"pac\",\"actuator\"\
        ,\"monitor\",\"smart_thermostat_valve_03004482\",\"climate\"];\n  for (const\
        \ k in states) {\n    const s = states[k];\n    if (!s?.attributes) continue;\n\
        \    const id = k.toLowerCase();\n    const nm = (s.attributes.friendly_name||\"\
        \").toLowerCase();\n    if (excluded.some(kw => id.includes(kw)||nm.includes(kw)))\
        \ continue;\n    let val = NaN;\n    if (k.startsWith('sensor.') && s.attributes.device_class==='temperature')\
        \ val = parseFloat(s.state);\n    else if (k.startsWith('climate.') && s.attributes.current_temperature!==undefined)\
        \ val = parseFloat(s.attributes.current_temperature);\n    if (!isNaN(val))\
        \ {\n      if (val > 25) hasHot = true;\n      if (val < 19) hasCold = true;\n\
        \    }\n  }\n  if (hasHot) return \"#FF5722\";\n  return \"#1e90ff\";\n]]]\n"
      emoji: "[[[\n  let hasHot = false;\n  const excluded = [\"battery\",\"voltage\"\
        ,\"signal\",\"ecojoko\",\"cerny\",\"oil\",\"diffus\",\"chrisnas\",\"dhwp\"\
        ,\"tesla\",\"comfort\",\"adjust\",\"away\",\"extérieure\",\"exterieure\",\"\
        intérieure\",\"interieure\",\"hp_actuator\",\"pac\",\"actuator\",\"monitor\"\
        ,\"smart_thermostat_valve_03004482\",\"climate\"];\n  for (const k in states)\
        \ {\n    const s = states[k];\n    if (!s?.attributes) continue;\n    const\
        \ id = k.toLowerCase();\n    const nm = (s.attributes.friendly_name||\"\"\
        ).toLowerCase();\n    if (excluded.some(kw => id.includes(kw)||nm.includes(kw)))\
        \ continue;\n    let val = NaN;\n    if (k.startsWith('sensor.') && s.attributes.device_class==='temperature')\
        \ val = parseFloat(s.state);\n    else if (k.startsWith('climate.') && s.attributes.current_temperature!==undefined)\
        \ val = parseFloat(s.attributes.current_temperature);\n    if (!isNaN(val)\
        \ && val > 25) { hasHot = true; break; }\n  }\n  return hasHot ? \"\U0001F321\
        ️\" : \"❄️\";\n]]]\n"
  padding: 0
  type: custom:fold-entity-row
conditions:
- above: 0
  condition: numeric_state
  entity: sensor.temperature_alerte_count
type: conditional
