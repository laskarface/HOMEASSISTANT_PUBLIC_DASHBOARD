# =========================================
# CARTE : psg_cl
# VUE   : PSG
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - attr.opponent_abbr
#  - attr.opponent_colors
#  - attr.opponent_win_probability
#  - attr.team_abbr
#  - attr.team_colors
#  - attr.team_win_probability
#  - entity.attributes
#  - in.to
#  - pp.to
#  - rob.to
#  - rray.is
#  - sensor.psg_cl
# =========================================

custom_fields:
  jauge: "[[[\n  const attr = entity.attributes;\n  const winProb = attr.team_win_probability;\n\
    \  const oppProb = attr.opponent_win_probability;\n  \n  const teamAbbr = attr.team_abbr\
    \ || 'DOM';\n  const oppAbbr = attr.opponent_abbr || 'EXT';\n  \n  let tCol =\
    \ '#011F68'; \n  if (attr.team_colors) {\n    tCol = Array.isArray(attr.team_colors)\
    \ ? attr.team_colors[0] : String(attr.team_colors).split(',')[0].trim();\n  }\n\
    \  let oCol = '#560080'; \n  if (attr.opponent_colors) {\n    oCol = Array.isArray(attr.opponent_colors)\
    \ ? attr.opponent_colors[0] : String(attr.opponent_colors).split(',')[0].trim();\n\
    \  }\n\n  if (!winProb || !oppProb) {\n     return `\n       <div style=\"display:flex;\
    \ height:100%; align-items:center; justify-content:center;\">\n         <span\
    \ style=\"color:rgba(255,255,255,0.4); font-size:11px; font-weight:700; text-transform:uppercase;\
    \ letter-spacing: 0.5px;\">\U0001F52E Calculs IA ESPN (J-3)</span>\n       </div>\n\
    \     `;\n  }\n\n  const actualWin = parseFloat(winProb) > 1 ? parseFloat(winProb)\
    \ : parseFloat(winProb) * 100;\n  const actualOpp = parseFloat(oppProb) > 1 ?\
    \ parseFloat(oppProb) : parseFloat(oppProb) * 100;\n  const drawProb = 100 - actualWin\
    \ - actualOpp;\n\n  return `\n    <div style=\"width:100%; display:flex; flex-direction:column;\"\
    >\n      <div style=\"display:flex; justify-content:space-between; margin-bottom:10px;\
    \ font-size:12.5px; font-weight:900; color:white; letter-spacing:0.5px;\">\n \
    \       <span style=\"display:flex; align-items:center; gap:6px; text-shadow:\
    \ 0 0 10px rgba(0,0,0,0.5);\">\n          <div style=\"width:8px; height:8px;\
    \ border-radius:50%; background:${tCol}; box-shadow: 0 0 6px ${tCol}; border:\
    \ 1px solid rgba(255,255,255,0.3);\"></div> \n          ${teamAbbr} ${actualWin.toFixed(1)}%\n\
    \        </span>\n        <span style=\"color:rgba(255,255,255,0.5); font-weight:800;\
    \ font-size:11px; margin-top:2px;\">NUL ${drawProb.toFixed(1)}%</span>\n     \
    \   <span style=\"display:flex; align-items:center; gap:6px; text-shadow: 0 0\
    \ 10px rgba(0,0,0,0.5);\">\n          ${actualOpp.toFixed(1)}% ${oppAbbr} \n \
    \         <div style=\"width:8px; height:8px; border-radius:50%; background:${oCol};\
    \ box-shadow: 0 0 6px ${oCol}; border: 1px solid rgba(255,255,255,0.3);\"></div>\n\
    \        </span>\n      </div>\n      <div style=\"display:flex; width:100%; height:12px;\
    \ border-radius:6px; overflow:hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8),\
    \ 0 0 8px rgba(0,0,0,0.3);\">\n        <div style=\"width: ${actualWin}%; background:\
    \ ${tCol}; box-shadow: inset 0 0 10px rgba(255,255,255,0.15);\"></div>\n     \
    \   <div style=\"width: ${drawProb}%; background: rgba(255,255,255,0.15);\"></div>\n\
    \        <div style=\"width: ${actualOpp}%; background: ${oCol}; box-shadow: inset\
    \ 0 0 10px rgba(255,255,255,0.15);\"></div>\n      </div>\n      <div style=\"\
    display:flex; justify-content:space-between; margin-top:6px; font-size:8.5px;\
    \ font-weight:800; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:\
    \ 1px;\">\n        <span>ESPN Analytics®</span>\n        <span>Match Predictor</span>\n\
    \      </div>\n    </div>\n  `;\n]]]\n"
  titre: "[[[\n  const svg = `\n    <svg viewBox=\"0 0 100 100\" width=\"46\" height=\"\
    46\" style=\"filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); transition: all 0.5s;\"\
    >\n      <defs>\n        <radialGradient id=\"glassSphere\" cx=\"35%\" cy=\"30%\"\
    \ r=\"65%\">\n          <stop offset=\"0%\" stop-color=\"#e0f7fa\" stop-opacity=\"\
    0.9\"/>\n          <stop offset=\"35%\" stop-color=\"#18ffff\" stop-opacity=\"\
    0.3\"/>\n          <stop offset=\"75%\" stop-color=\"#006064\" stop-opacity=\"\
    0.6\"/>\n          <stop offset=\"100%\" stop-color=\"#002127\" stop-opacity=\"\
    0.8\"/>\n        </radialGradient>\n        <linearGradient id=\"standGrad\" x1=\"\
    0%\" y1=\"0%\" x2=\"100%\" y2=\"0%\">\n          <stop offset=\"0%\" stop-color=\"\
    #cfd8dc\" stop-opacity=\"1\"/>\n          <stop offset=\"50%\" stop-color=\"#ffffff\"\
    \ stop-opacity=\"1\"/>\n          <stop offset=\"100%\" stop-color=\"#78909c\"\
    \ stop-opacity=\"1\"/>\n        </linearGradient>\n        <linearGradient id=\"\
    holoGrad\" x1=\"0%\" y1=\"100%\" x2=\"0%\" y2=\"0%\">\n          <stop offset=\"\
    0%\" stop-color=\"#ff4081\" stop-opacity=\"0.7\"/>\n          <stop offset=\"\
    50%\" stop-color=\"#d500f9\" stop-opacity=\"0.9\"/>\n          <stop offset=\"\
    100%\" stop-color=\"#00e5ff\" stop-opacity=\"1\"/>\n        </linearGradient>\n\
    \      </defs>\n      \n      <!-- Piédestal Métallique -->\n      <path d=\"\
    M 30 84 L 70 84 L 76 96 L 24 96 Z\" fill=\"url(#standGrad)\" stroke=\"#455a64\"\
    \ stroke-width=\"0.5\"/>\n      <path d=\"M 34 76 L 66 76 L 70 84 L 30 84 Z\"\
    \ fill=\"#78909c\" stroke=\"#455a64\" stroke-width=\"0.5\"/>\n      <ellipse cx=\"\
    50\" cy=\"76\" rx=\"16\" ry=\"3\" fill=\"#263238\" stroke=\"#111\" stroke-width=\"\
    0.5\"/> \n\n      <!-- Sphère en Verre Translucide -->\n      <circle cx=\"50\"\
    \ cy=\"43\" r=\"33\" fill=\"url(#glassSphere)\" stroke=\"#18ffff\" stroke-width=\"\
    0.5\"/>\n\n      <!-- Graphique Holographique IA à l'intérieur -->\n      <rect\
    \ x=\"34\" y=\"48\" width=\"6\" height=\"15\" rx=\"1.5\" fill=\"url(#holoGrad)\"\
    \ />\n      <rect x=\"47\" y=\"35\" width=\"6\" height=\"28\" rx=\"1.5\" fill=\"\
    url(#holoGrad)\" />\n      <rect x=\"60\" y=\"20\" width=\"6\" height=\"43\" rx=\"\
    1.5\" fill=\"url(#holoGrad)\" />\n\n      <!-- Courbe de tendance Fluo -->\n \
    \     <path d=\"M 23 55 Q 35 60, 50 35 T 77 15\" fill=\"none\" stroke=\"#ffee58\"\
    \ stroke-width=\"1.5\" opacity=\"0.9\" filter=\"drop-shadow(0 0 2px #ffee58)\"\
    />\n      <circle cx=\"77\" cy=\"15\" r=\"2.5\" fill=\"#ffffff\" filter=\"drop-shadow(0\
    \ 0 3px #fff)\"/>\n\n      <!-- Reflets 3D du Verre -->\n      <path d=\"M 23\
    \ 30 A 28 28 0 0 1 50 12 A 26 26 0 0 0 26 38 Z\" fill=\"white\" opacity=\"0.5\"\
    \ />\n      <path d=\"M 68 62 A 28 28 0 0 0 75 40 A 26 26 0 0 1 55 69 Z\" fill=\"\
    white\" opacity=\"0.15\" />\n\n      <!-- Particules flottantes \"Data\" -->\n\
    \      <circle cx=\"28\" cy=\"22\" r=\"1.5\" fill=\"#00e5ff\" opacity=\"0.8\"\
    />\n      <circle cx=\"70\" cy=\"20\" r=\"1\" fill=\"#18ffff\" opacity=\"0.8\"\
    />\n      <circle cx=\"35\" cy=\"15\" r=\"1\" fill=\"#d500f9\" opacity=\"0.9\"\
    />\n    </svg>\n  `;\n  \n  return `\n    <div style=\"width:100%; height:100%;\
    \ display:flex; flex-direction:column; align-items:center; justify-content:center;\
    \ background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255,\
    \ 255, 255, 0) 100%); position:relative;\">\n      <div style=\"position: absolute;\
    \ top: 10px; width: 45px; height: 45px; background: #00e5ff; border-radius: 50%;\
    \ filter: blur(20px); opacity: 0.25; animation: pulseOrb 4s infinite alternate\
    \ ease-in-out; z-index: 0;\"></div>\n      <div style=\"position: relative; z-index:\
    \ 1;\">${svg}</div>\n      <span style=\"font-size: 9px; font-weight: 900; color:\
    \ white; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; z-index:\
    \ 1;\">PRONOSTIC</span>\n      <style>@keyframes pulseOrb { from { opacity: 0.15;\
    \ transform: scale(0.9); } to { opacity: 0.4; transform: scale(1.1); } }</style>\n\
    \    </div>\n  `;\n]]]\n"
entity: sensor.psg_cl
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: 1px solid rgba(255, 255, 255, 0.1)
  - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
  - overflow: hidden
  - margin-top: 8px
  custom_fields:
    jauge:
    - justify-self: stretch
    - align-self: stretch
    - display: flex
    - flex-direction: column
    - justify-content: center
    - padding: 0 15px
    titre:
    - justify-self: stretch
    - align-self: stretch
    - border-right: 2px solid rgba(255, 255, 255, 0.6)
  grid:
  - grid-template-areas: '"titre jauge"'
  - grid-template-columns: 130px minmax(0, 1fr)
  - grid-template-rows: 80px
  - gap: 0
type: custom:button-card
