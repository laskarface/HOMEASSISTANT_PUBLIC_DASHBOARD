# =========================================
# CARTE : attributes
# VUE   : NAS
# TYPE  : vertical-stack (Carte monobloc)
# DÉPENDANCES :
#  - entity.attributes
#  - entity.state
#  - sensor.chrisnas_etat_du_lecteur_0_1
#  - sensor.chrisnas_etat_du_lecteur_0_2
#  - sensor.chrisnas_etat_du_lecteur_0_3
#  - sensor.chrisnas_temperature_du_lecteur_0_1
#  - sensor.chrisnas_temperature_du_lecteur_0_2
#  - sensor.chrisnas_temperature_du_lecteur_0_3
# =========================================

cards:
- icon: mdi:harddisk
  name: ÉTAT DES DISQUES
  styles:
    card:
    - background: rgba(30, 39, 54, 0.8)
    - border-radius: 15px 15px 0 0
    - border: 1px solid rgba(255, 255, 255, 0.1)
    - height: 40px
    grid:
    - grid-template-areas: '"i n"'
    - grid-template-columns: 40px 1fr
    - align-items: center
    icon:
    - color: '#00ff88'
    - width: 22px
    name:
    - font-weight: 900
    - font-size: 12px
    - justify-self: start
  type: custom:button-card
- cards:
  - custom_fields:
      sn: '[[[ return entity.attributes[''Serial #''] ? entity.attributes[''Serial
        #''].slice(-4) : ''...'' ]]]

        '
      t: '[[[ return states[''sensor.chrisnas_temperature_du_lecteur_0_1''].state
        + ''°'' ]]]

        '
    entity: sensor.chrisnas_etat_du_lecteur_0_1
    name: HDD 1
    show_state: false
    styles:
      card:
      - background: rgba(20, 27, 38, 0.6)
      - border-radius: 0
      - border: 1px solid rgba(255, 255, 255, 0.1)
      - border-top: none
      - padding: 8px
      custom_fields:
        sn:
        - font-size: 10px
        - color: rgba(255
        - 255
        - 255
        - 0.2)
        - text-transform: uppercase
        t:
        - font-size: 14px
        - font-weight: bold
        - color: '#ffffff'
      grid:
      - grid-template-areas: '"n" "i" "t" "sn"'
      - align-items: center
      icon:
      - width: 22px
      - color: '[[[ return entity.state === ''OK'' ? ''#00ff88'' : ''#ff1111'' ]]]

          '
      name:
      - font-size: 12px
      - color: rgba(255, 255, 255, 0.3)
    type: custom:button-card
  - custom_fields:
      sn: '[[[ return entity.attributes[''Serial #''] ? entity.attributes[''Serial
        #''].slice(-4) : ''...'' ]]]

        '
      t: '[[[ return states[''sensor.chrisnas_temperature_du_lecteur_0_2''].state
        + ''°'' ]]]

        '
    entity: sensor.chrisnas_etat_du_lecteur_0_2
    name: HDD 2
    show_state: false
    styles:
      card:
      - background: rgba(20, 27, 38, 0.6)
      - border-radius: 0
      - border: 1px solid rgba(255, 255, 255, 0.1)
      - border-top: none
      - border-left: none
      - padding: 8px
      custom_fields:
        sn:
        - font-size: 10px
        - color: rgba(255
        - 255
        - 255
        - 0.2)
        - text-transform: uppercase
        t:
        - font-size: 14px
        - font-weight: bold
        - color: '#ffffff'
      grid:
      - grid-template-areas: '"n" "i" "t" "sn"'
      - align-items: center
      icon:
      - width: 22px
      - color: '[[[ return entity.state === ''OK'' ? ''#00ff88'' : ''#ff1111'' ]]]

          '
      name:
      - font-size: 12px
      - color: rgba(255, 255, 255, 0.3)
    type: custom:button-card
  - custom_fields:
      sn: '[[[ return entity.attributes[''Serial #''] ? entity.attributes[''Serial
        #''].slice(-4) : ''...'' ]]]

        '
      t: '[[[ return states[''sensor.chrisnas_temperature_du_lecteur_0_3''].state
        + ''°'' ]]]

        '
    entity: sensor.chrisnas_etat_du_lecteur_0_3
    name: HDD 3
    show_state: false
    styles:
      card:
      - background: rgba(20, 27, 38, 0.6)
      - border-radius: 0 0 15px 0
      - border: 1px solid rgba(255, 255, 255, 0.1)
      - border-top: none
      - border-left: none
      - padding: 8px
      custom_fields:
        sn:
        - font-size: 10px
        - color: rgba(255
        - 255
        - 255
        - 0.2)
        - text-transform: uppercase
        t:
        - font-size: 14px
        - font-weight: bold
        - color: '#ffffff'
      grid:
      - grid-template-areas: '"n" "i" "t" "sn"'
      - align-items: center
      icon:
      - width: 22px
      - color: '[[[ return entity.state === ''OK'' ? ''#00ff88'' : ''#ff1111'' ]]]

          '
      name:
      - font-size: 12px
      - color: rgba(255, 255, 255, 0.3)
    type: custom:button-card
  columns: 3
  square: false
  type: grid
type: vertical-stack
