# =========================================
# CARTE : color
# VUE   : Temperatures_et_Humidites
# TYPE  : conditional (Carte monobloc)
# DÉPENDANCES :
#  - entity.state
#  - grp.attributes
#  - images.pexels
#  - s.state
#  - sensor.temperature_alerte_count
#  - sensor.temperature_maison
#  - variables.color
#  - variables.emoji
# =========================================

card:
  card_mod:
    style: 'div#head { display: block !important; width: 100% !important; padding:
      0 !important; margin: 0 !important; --toggle-icon-width: 0px !important; }

      #head { padding: 0 !important; margin: 0 !important; width: 100% !important;
      cursor: pointer !important; pointer-events: auto !important; }

      #head ha-icon { display: none !important; width: 0px !important; }

      div#items { padding: 0 !important; margin: 0 !important; }

      '
  clickable: true
  entities:
  - color_type: blank-card
    styles:
      card:
      - height: 14px
    type: custom:button-card
  - card:
      card_mod:
        style: 'ha-card { background: transparent !important; box-shadow: none !important;
          border: none !important; padding: 0 !important; margin: 0 !important; width:
          100% !important; }

          '
      columns: 2
      square: false
      type: grid
    card_param: cards
    filter:
      include:
      - group: sensor.temperature_maison
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(255, 87, 34, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#FF5722'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            state:
            - color: '#FF5722'
            - font-weight: 900
            - font-size: 13px
          type: custom:button-card
        state: '> 25'
      - group: sensor.temperature_maison
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(30, 144, 255, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 50px
            icon:
            - color: '#1e90ff'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            state:
            - color: '#1e90ff'
            - font-weight: 900
            - font-size: 13px
          type: custom:button-card
        state: < 19
    show_empty: false
    type: custom:auto-entities
  head:
    custom_fields:
      details: "[[[\n  const count = parseInt(entity.state) || 0;\n  const label =\
        \ count > 1 ? 'PIÈCES TEMP. ANORMALES' : 'PIÈCE TEMP. ANORMALE';\n  const\
        \ color = variables.color;\n  const bgImg = \"https://images.pexels.com/photos/3873200/pexels-photo-3873200.jpeg?auto=compress&cs=tinysrgb&w=500\"\
        ;\n  \n  return `\n    <div style=\"width:100%; height:100%; position: relative;\
        \ overflow: hidden; display: flex; align-items: center; justify-content: center;\"\
        >\n      <!-- Image remontée à 50% d'opacité et sans le voile noir -->\n \
        \     <div style=\"position: absolute; top:0; left:0; width: 100%; height:\
        \ 100%; background: url('${bgImg}') center 45% / 150% no-repeat; opacity:\
        \ 0.5; z-index: 0;\"></div>\n      \n      <div style=\"width:280px; max-width:100%;\
        \ display:flex; flex-direction:row; align-items:center; justify-content:flex-start;\
        \ gap:15px; box-sizing:border-box; position: relative; z-index: 1; padding:\
        \ 0 15px; margin-top: -15px;\">\n        <div style=\"font-size:38px; font-weight:900;\
        \ color:${color}; line-height:1; text-shadow:0 0 15px ${color}80; min-width:40px;\
        \ text-align:center;\">${count}</div>\n        <div style=\"display:flex;\
        \ flex-direction:column; align-items:flex-start; justify-content:center; flex:1;\"\
        >\n          <div style=\"font-size:13px; font-weight:800; color:white; text-transform:uppercase;\
        \ letter-spacing:1px; line-height:1.2; text-shadow: 0 1px 4px rgba(0,0,0,0.8);\"\
        >${label}</div>\n          <div style=\"font-size:11px; color:rgba(255,255,255,0.7);\
        \ margin-top:4px; font-weight:700; text-shadow: 0 1px 2px rgba(0,0,0,0.8);\"\
        >ALERTE &lt; 19°C OU &gt; 25°C</div>\n        </div>\n      </div>\n    </div>`;\n\
        ]]]\n"
      footer: "[[[\n  return `<div style=\"display:flex;width:100%;justify-content:center;align-items:center;\"\
        >\n    <ha-icon icon=\"mdi:chevron-down\" style=\"color:rgba(255,255,255,0.7);width:18px;height:18px;\"\
        ></ha-icon>\n  </div>`;\n]]]\n"
      icon: "[[[\n  const color = variables.color; const emoji = variables.emoji;\n\
        \  return `\n    <div style=\"width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,${color}33\
        \ 0%,${color}0D 100%);border-top-left-radius:20px;box-sizing:border-box;position:relative;\"\
        >\n      <div style=\"position:absolute;width:50px;height:50px;background:${color};border-radius:50%;filter:blur(20px);opacity:0.3;animation:pulseGlow\
        \ 4s infinite alternate ease-in-out;\"></div>\n      <div style=\"font-size:32px;line-height:1;filter:drop-shadow(0\
        \ 0 10px ${color}80);display:flex;align-items:center;justify-content:center;z-index:1;\"\
        >${emoji}</div>\n      <div style=\"font-size:10px;font-weight:900;color:white;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;z-index:1;\"\
        >Température</div>\n      <style>@keyframes pulseGlow { from{opacity:0.2;transform:scale(0.9);}to{opacity:0.4;transform:scale(1.1);}\
        \ }</style>\n    </div>`;\n]]]\n"
    entity: sensor.temperature_alerte_count
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}80, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - overflow: hidden
      - margin: 0px
      - box-sizing: border-box
      - position: relative
      - height: 85px
      - transition: box-shadow 0.8s ease-in-out, border 0.8s ease-in-out, background
          0.8s ease-in-out
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
        - padding: 0
        - overflow: hidden
        - position: relative
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.2)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
        - padding: 0
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 60px 25px
      - gap: 0px
      - width: 100%
      - margin: 0
    tap_action:
      action: none
    type: custom:button-card
    variables:
      color: "[[[\n  let hasHot = false;\n  const grp = states['sensor.temperature_maison'];\n\
        \  if (grp && grp.attributes.entity_id) {\n    for (const eid of grp.attributes.entity_id)\
        \ {\n      const s = states[eid];\n      if (!s) continue;\n      const val\
        \ = parseFloat(s.state);\n      if (!isNaN(val) && val > 25) { hasHot = true;\
        \ break; }\n    }\n  }\n  return hasHot ? \"#FF5722\" : \"#1e90ff\";\n]]]\n"
      emoji: "[[[\n  let hasHot = false;\n  const grp = states['sensor.temperature_maison'];\n\
        \  if (grp && grp.attributes.entity_id) {\n    for (const eid of grp.attributes.entity_id)\
        \ {\n      const s = states[eid];\n      if (!s) continue;\n      const val\
        \ = parseFloat(s.state);\n      if (!isNaN(val) && val > 25) { hasHot = true;\
        \ break; }\n    }\n  }\n  return hasHot ? \"\U0001F321️\" : \"❄️\";\n]]]\n"
  padding: 0
  type: custom:fold-entity-row
conditions:
- above: 0
  condition: numeric_state
  entity: sensor.temperature_alerte_count
type: conditional
