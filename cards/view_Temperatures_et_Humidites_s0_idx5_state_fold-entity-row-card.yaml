              \  var p = Math.max(0, Math.min(100, ((t - 20) / 45) * 100));\n  var\
              \ c = t<35 ? '#008CFF' : t<45 ? '#FFD700' : t<55 ? '#FF8C00' : '#DC4646';\n\
              \  return `<div style=\"position:absolute;bottom:0;left:0;right:0;height:${p}%;background:${c};box-shadow:0\
              \ 0 10px ${c};border-radius:10px;\"></div>`;\n]]]\n"
            gauges_conso: "[[[\n  var conso = parseFloat(states['sensor.eau_chaude_jour']?.state)\
              \ || 0;\n  var numGauges = conso > 600 ? 4 : conso > 400 ? 3 : conso\
              \ > 200 ? 2 : 1;\n  var html = '';\n  for (let i = 1; i <= numGauges;\
              \ i++) {\n    var min = (i - 1) * 200, max = i * 200;\n    var pct =\
              \ conso >= max ? 100 : conso > min ? ((conso - min)/200)*100 : 0;\n\
              \    var color = i===4 ? '#DC5050' : i===3 ? '#FFA500' : i===2 ? '#008CFF'\
