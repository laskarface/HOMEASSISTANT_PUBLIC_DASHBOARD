        cards:
        - aspect_ratio: 16/9
          custom_fields:
            bg: "[[[\n  var clim = states['climate.hp_actuator_thermostat'];\n  var\
              \ on = clim && ((clim.attributes && clim.attributes.hvac_action ===\
              \ 'heating') || clim.state === 'heat');\n  var b = Date.now().toString();\n\
              \  var src = on ? `/local/pac_atlantic_heating_16_9_nostretch2.png?v=${b}`\
              \ : `/local/pac_atlantic_idle_16_9_nostretch.png?v=${b}`;\n  return\
              \ `<div style=\"width:100%;height:100%;position:absolute;inset:0;z-index:0;background:url('${src}')\
              \ center/contain no-repeat;transform:scale(1.4);\"></div>`;\n]]]\n"
            consigne_inline: '[[[ var c = states[''climate.hp_actuator_thermostat''];
              return ''Cible '' + parseFloat(c?.attributes?.temperature || 0).toFixed(1)
              + ''°''; ]]]'
            ext_val: '[[[ return ''Ext<br/>'' + parseFloat(states[''sensor.hp_actuator_io_5470820_3_temperature'']?.state||0).toFixed(1)
              + ''°''; ]]]'
            gauge_ext: "[[[\n  var t = parseFloat(states['sensor.hp_actuator_io_5470820_3_temperature']?.state||0);\n\
              \  var p = Math.max(0, Math.min(100, ((t + 10) / 48) * 100));\n  var\
              \ c = t<5 ? '#78EBFF' : t<15 ? '#008CFF' : t<25 ? '#46D278' : '#FFDC78';\n\
              \  return `<div style=\"position:absolute;bottom:0;left:0;right:0;height:${p}%;background:${c};box-shadow:0\
              \ 0 10px ${c};border-radius:10px;\"></div>`;\n]]]\n"
            gauge_pac: "[[[\n  var t = parseFloat(states['sensor.hp_actuator_io_5470820_9_temperature']?.state||0);\n\
              \  var p = Math.max(0, Math.min(100, ((t + 10) / 48) * 100));\n  var\
              \ c = t<19 ? '#008CFF' : t<25 ? '#46D278' : t<31 ? '#FFDC78' : '#DC5050';\n\
              \  return `<div style=\"position:absolute;bottom:0;left:0;right:0;height:${p}%;background:${c};box-shadow:0\
              \ 0 10px ${c};border-radius:10px;\"></div>`;\n]]]\n"
            overlay: ''
            temp: '[[[ return parseFloat(states[''sensor.hp_actuator_io_5470820_9_temperature'']?.state||0).toFixed(1)
              + ''°''; ]]]'
