head:
  custom_fields:
    details: "[[[\n  const t_maison = (parseFloat(states['sensor.hp_actuator_io_5470820_9_temperature']?.state)\
      \ || 0).toFixed(1);\n  const t_ext = (parseFloat(states['sensor.hp_actuator_io_5470820_3_temperature']?.state)\
      \ || 0).toFixed(1);\n  const s3 = states['water_heater.temperature_ballon'];\n\
      \  const t_ballon = (parseFloat(s3?.attributes?.current_temperature || s3?.attributes?.temperature)\
      \ || 0).toFixed(1);\n  \n  const rawEau = states['sensor.eau_chaude_jour']?.state;\n\
      \  const consoEau = (rawEau && !isNaN(rawEau)) ? Math.round(parseFloat(rawEau))\
      \ : '—';\n\n  const dhw = states['binary_sensor.dhwp_actuator_energy_demand_status']?.state\
      \ === 'on';\n  const pacStateObj = states['climate.hp_actuator_thermostat'];\n\
      \  const pac = pacStateObj && ((pacStateObj.attributes && pacStateObj.attributes.hvac_action\
      \ === 'heating') || pacStateObj.state === 'heat');\n\n  let c1 = pac ? '#FFA500'\
      \ : '#46D278';\n  if (!pac && parseFloat(t_maison) < 19) c1 = '#29B6F6';\n \
      \ let b1 = pac ? 'animation: glow-capsule 3s infinite alternate ease-in-out;'\
      \ : 'box-shadow: 0 4px 10px rgba(0,0,0,0.2);';\n  let i1 = pac ? 'animation:\
      \ obj-pulse 2s infinite ease-in-out;' : '';\n\n  let c2 = dhw ? '#FFA500' :\
      \ '#29B6F6';\n  let b2 = dhw ? 'animation: glow-capsule 3s infinite alternate\
      \ ease-in-out;' : 'box-shadow: 0 4px 10px rgba(0,0,0,0.2);';\n  let i2 = dhw\
      \ ? 'animation: obj-pulse 2s infinite ease-in-out;' : '';\n\n  // Image d'ambiance\
      \ chaleureuse (intérieur moderne)\n  const bgImg = \"https://images.pexels.com/photos/2360673/pexels-photo-2360673.jpeg?auto=compress&cs=tinysrgb&w=500\"\
      ;\n\n  return `\n    <style>\n       @keyframes glow-capsule { 0% { box-shadow:\
      \ 0 0 5px rgba(255, 165, 0, 0.35); } 100% { box-shadow: 0 0 15px rgba(255, 165,\
      \ 0, 0.6); } }\n       @keyframes obj-pulse { 0% { transform: scale(1); filter:\
      \ drop-shadow(0 0 2px currentColor); } 50% { transform: scale(1.15); filter:\
      \ drop-shadow(0 0 8px currentColor); } 100% { transform: scale(1); filter: drop-shadow(0\
      \ 0 2px currentColor); } }\n    </style>\n    \n    <div style=\"display: flex;\
      \ gap: 12px; align-items: center; justify-content: center; height: 100%; width:\
      \ 100%; padding: 0 15px 0 10px; position: relative; overflow: hidden;\">\n \
      \     \n      <!-- Image de fond avec cadrage pour voir le bas -->\n      <div\
      \ style=\"position: absolute; top:0; left:0; width: 100%; height: 100%; background:\
      \ url('${bgImg}') center 80% / cover no-repeat; opacity: 0.4; z-index: 0;\"\
      ></div>\n      \n      <!-- Capsules de données (Z-index pour passer devant\
      \ le fond) -->\n      <div style=\"flex: 1; height: 50px; border-radius: 12px;\
      \ \n        background: linear-gradient(145deg, rgba(20,27,38,0.8) 0%, ${c1}10\
      \ 100%); \n        border: 1px solid ${c1}40; ${b1} \n        display: flex;\
      \ flex-direction: column; justify-content: center; align-items: center; \n \
      \       backdrop-filter: blur(5px); position: relative; z-index: 1;\">\n   \
      \     <div style=\"display: flex; align-items: baseline; gap: 4px;\">\n    \
      \      <ha-icon icon=\"mdi:home\" style=\"--mdc-icon-size: 16px; color: ${c1};\
      \ ${i1}\"></ha-icon>\n          <span style=\"font-size: 16px; font-weight:\
      \ 800; color: white; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);\"\
      >${t_maison}°</span>\n        </div>\n        <div style=\"font-size: 12px;\
      \ font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase;\
      \ text-shadow: 0 1px 2px rgba(0,0,0,0.5);\">\n          Ext <span style=\"color:\
      \ #3DDBB8;\">${t_ext}°</span>\n        </div>\n      </div>\n\n      <div style=\"\
      flex: 1; height: 50px; border-radius: 12px; \n        background: linear-gradient(145deg,\
      \ rgba(20,27,38,0.8) 0%, ${c2}10 100%); \n        border: 1px solid ${c2}40;\
      \ ${b2} \n        display: flex; flex-direction: column; justify-content: center;\
      \ align-items: center; \n        backdrop-filter: blur(5px); position: relative;\
      \ z-index: 1;\">\n        <div style=\"display: flex; align-items: baseline;\
      \ gap: 4px;\">\n          <ha-icon icon=\"mdi:water-boiler\" style=\"--mdc-icon-size:\
      \ 16px; color: ${c2}; ${i2}\"></ha-icon>\n          <span style=\"font-size:\
      \ 16px; font-weight: 800; color: white; letter-spacing: -0.5px; text-shadow:\
      \ 0 2px 4px rgba(0,0,0,0.5);\">${t_ballon}°</span>\n        </div>\n       \
      \ <div style=\"font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7);\
      \ text-transform: uppercase; text-shadow: 0 1px 2px rgba(0,0,0,0.5);\">\n  \
      \        <span style=\"color: #3DDBB8;\">${consoEau}</span> L/Jour\n       \
      \ </div>\n      </div>\n\n    </div>\n  `;\n]]]\n"
    footer: '[[[ return `<div style="display:flex; width:100%; justify-content:center;
      align-items:center; padding-bottom: 5px;"><ha-icon icon="mdi:chevron-down" style="color:
      rgba(255,255,255,0.5); width: 16px; height: 16px;"></ha-icon></div>`; ]]]

      '
    icon: "[[[\n  const dhw = states['binary_sensor.dhwp_actuator_energy_demand_status']?.state\
      \ === 'on';\n  const pacStateObj = states['climate.hp_actuator_thermostat'];\n\
      \  const pac = pacStateObj && ((pacStateObj.attributes && pacStateObj.attributes.hvac_action\
      \ === 'heating') || pacStateObj.state === 'heat');\n  const heating = dhw ||\
      \ pac;\n  \n  const sr = states['sensor.hp_actuator_io_5470820_9_temperature'];\n\
      \  const tempStr = sr ? sr.state : '0';\n  const temp = parseFloat(tempStr.toString().replace(',',\
      \ '.'));\n  \n  let color = '#46D278';\n  if (heating) {\n    color = '#FFA500';\n\
      \  } else if (temp < 19) {\n    color = '#29B6F6';\n  } else if (temp > 25)\
      \ {\n    color = '#FF9800';\n  }\n  \n  const fanAnim = heating ? 'animation:\
      \ rotateFan 2s linear infinite;' : '';\n  \n  const svg = `\n    <svg viewBox=\"\
      0 0 100 100\" width=\"42\" height=\"42\" style=\"filter: drop-shadow(0 6px 12px\
      \ rgba(0,0,0,0.5));\">\n      <defs>\n        <linearGradient id=\"pacBody\"\
      \ x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n          <stop offset=\"0%\"\
      \ style=\"stop-color:#ffffff;stop-opacity:1\" />\n          <stop offset=\"\
      100%\" style=\"stop-color:#f0f0f0;stop-opacity:1\" />\n        </linearGradient>\n\
      \        <radialGradient id=\"fanGlow\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n \
      \         <stop offset=\"0%\" style=\"stop-color:${color};stop-opacity:0.3\"\
      \ />\n          <stop offset=\"100%\" style=\"stop-color:${color};stop-opacity:0\"\
      \ />\n        </radialGradient>\n      </defs>\n      <rect x=\"30\" y=\"20\"\
      \ width=\"40\" height=\"60\" rx=\"8\" ry=\"8\" fill=\"url(#pacBody)\" />\n \
      \     <circle cx=\"50\" cy=\"45\" r=\"14\" fill=\"rgba(0,0,0,0.05)\" stroke=\"\
      rgba(0,0,0,0.1)\" stroke-width=\"1\" />\n      <g style=\"transform-origin:\
      \ 50px 45px; ${fanAnim}\">\n        <path d=\"M50,45 L50,33 A1.5,1.5 0 0,1 51.5,33\
      \ L51.5,45 Z\" fill=\"${color}\" />\n        <path d=\"M50,45 L62,45 A1.5,1.5\
      \ 0 0,1 62,46.5 L50,46.5 Z\" fill=\"${color}\" />\n        <path d=\"M50,45\
      \ L50,57 A1.5,1.5 0 0,1 48.5,57 L48.5,45 Z\" fill=\"${color}\" />\n        <path\
      \ d=\"M50,45 L38,45 A1.5,1.5 0 0,1 38,43.5 L50,43.5 Z\" fill=\"${color}\" />\n\
      \        <circle cx=\"50\" cy=\"45\" r=\"3\" fill=\"${color}\" />\n      </g>\n\
      \      <rect x=\"38\" y=\"65\" width=\"24\" height=\"4\" rx=\"1.5\" fill=\"\
      rgba(0,0,0,0.1)\" />\n      <circle cx=\"50\" cy=\"45\" r=\"18\" fill=\"url(#fanGlow)\"\
      \ />\n    </svg>\n    <style>@keyframes rotateFan { from { transform: rotate(0deg);\
      \ } to { transform: rotate(360deg); } }</style>\n  `;\n\n  return `\n    <div\
      \ style=\"\n      width: 100%; height: 100%; display: flex; flex-direction:\
      \ column; \n      align-items: center; justify-content: center; \n      background:\
      \ linear-gradient(135deg, ${color}33 0%, rgba(20, 27, 38, 0) 100%); \n     \
      \ border-top-left-radius: 20px; box-sizing: border-box; position: relative;\"\
      >\n      \n      <div style=\"\n        position: absolute; width: 50px; height:\
      \ 50px; \n        background: ${color}; border-radius: 50%; \n        filter:\
      \ blur(25px); opacity: 0.3; \n        animation: pulseGlow 3s infinite alternate\
      \ ease-in-out;\"></div>\n        \n      <div style=\"\n        position: relative;\
      \ z-index: 1; display: flex; \n        flex-direction: column; align-items:\
      \ center; justify-content: center;\">\n        ${svg}\n        <div style=\"\
      \n          font-size: 8px; font-weight: 900; color: white; \n          text-transform:\
