# =========================================
# CARTE : color
# VUE   : dashboard
# TYPE  : conditional (Carte monobloc)
# DÉPENDANCES :
#  - entity.state
#  - images.pexels
#  - s.attributes
#  - s.entity_id
#  - s.state
#  - sensor.batterie_maison
#  - sensor.batteries_critiques_count
#  - sensor.ci_tesla_battery
#  - variables.color
# =========================================

card:
  card_mod:
    style: 'div#head { display: block !important; width: 100% !important; padding:
      0 !important; margin: 0 !important; --toggle-icon-width: 0px !important; }

      #head { padding: 0 !important; margin: 0 !important; width: 100% !important;
      cursor: pointer !important; pointer-events: auto !important; }

      #head ha-icon { display: none !important; width: 0px !important; }

      div#items { padding: 0 !important; margin: 0 !important; }

      '
  clickable: true
  entities:
  - card:
      card_mod:
        style: 'ha-card { background: rgba(220, 20, 60, 0.2) !important; backdrop-filter:
          blur(10px) !important; border-radius: 20px !important; border: 1px solid
          rgba(255, 50, 50, 0.4) !important; margin-bottom: 20px !important; margin-top:
          10px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important; }

          .card-header { color: #ff4444 !important; font-weight: 800 !important; font-size:
          13px !important; letter-spacing: 1px !important; padding: 16px 16px 8px
          16px !important; text-transform: uppercase !important; }

          '
      title: BATTERIES CRITIQUES
      type: entities
    filter:
      template: "{%- set sensors = expand('sensor.batterie_maison') | selectattr('state',\
        \ 'is_number') | rejectattr('entity_id', 'search', 'iphone|ipad|tesla', ignorecase=true)\
        \ | rejectattr('entity_id', 'eq', 'sensor.ci_tesla_battery') | list -%}\n\
        {%- for s in sensors if s.state | int <= 10 -%}\n  {{ { 'entity': s.entity_id,\
        \ 'name': s.attributes.friendly_name, 'secondary_info': area_name(s.entity_id)\
        \ or 'Pièce non définie', 'card_mod': { 'style': ':host { --paper-item-icon-color:\
        \ #ff4444; color: white; }' } } }},\n{%- endfor -%}\n"
    show_empty: false
    type: custom:auto-entities
  head:
    custom_fields:
      details: "[[[\n  const count = parseInt(entity.state) || 0;\n  const label =\
        \ count > 1 ? 'BATTERIES À CHANGER' : 'BATTERIE À CHANGER';\n  const color\
        \ = variables.color;\n  // TEST : On utilise l'image des colis qui fonctionne\
        \ chez vous\n  const bgImg = \"https://images.pexels.com/photos/343457/pexels-photo-343457.jpeg?auto=compress&cs=tinysrgb&w=500\"\
        ;\n  \n  return `\n    <div style=\"width:100%; height:100%; display:flex;\
        \ justify-content:center; align-items:center; padding:0 15px; box-sizing:border-box;\
        \ position: relative; overflow: hidden;\">\n      <!-- Image de fond (Idem\
        \ Colis) -->\n      <div style=\"position: absolute; top:0; left:0; width:\
        \ 100%; height: 100%; background: url('${bgImg}') center 80% / cover no-repeat;\
        \ opacity: 0.4; z-index: 0;\"></div>\n      \n      <!-- Contenu -->\n   \
        \   <div style=\"width:280px; max-width:100%; display:flex; flex-direction:row;\
        \ align-items:center; justify-content:flex-start; gap:15px; box-sizing:border-box;\
        \ position: relative; z-index: 1;\">\n        <div style=\"font-size:38px;\
        \ font-weight:900; color:${color}; line-height:1; text-shadow:0 0 15px ${color}80;\
        \ min-width:40px; text-align:center;\">${count}</div>\n        <div style=\"\
        display:flex; flex-direction:column; align-items:flex-start; justify-content:center;\
        \ flex:1;\">\n          <div style=\"font-size:13px; font-weight:800; color:white;\
        \ text-transform:uppercase; letter-spacing:1px; line-height:1.2;\">${label}</div>\n\
        \          <div style=\"font-size:11px; color:rgba(255,255,255,0.7); margin-top:4px;\
        \ font-weight:700;\">NIVEAU CRITIQUE</div>\n        </div>\n      </div>\n\
        \    </div>`;\n]]]\n"
      footer: "[[[\n  return `\n    <div style=\"display:flex; width:100%; justify-content:center;\
        \ align-items:center;\">\n      <ha-icon icon=\"mdi:chevron-down\" style=\"\
        color: rgba(255,255,255,0.7); width: 18px; height: 18px;\"></ha-icon>\n  \
        \  </div>\n  `;\n]]]\n"
      icon: "[[[\n  const color = variables.color;\n  return `\n    <div style=\"\
        width: 100%; height: 100%; display: flex; flex-direction: column; align-items:\
        \ center; justify-content: center; background: linear-gradient(135deg, ${color}33\
        \ 0%, ${color}0D 100%); border-top-left-radius: 20px; box-sizing: border-box;\
        \ position: relative;\">\n      <div style=\"position: absolute; width: 50px;\
        \ height: 50px; background: ${color}; border-radius: 50%; filter: blur(20px);\
        \ opacity: 0.3; animation: pulseGlow 4s infinite alternate ease-in-out;\"\
        ></div>\n      <div style=\"font-size: 32px; line-height: 1; filter: drop-shadow(0\
        \ 0 10px ${color}80); display: flex; align-items: center; justify-content:\
        \ center; z-index: 1;\">\U0001FAAB</div>\n      <div style=\"font-size: 10px;\
        \ font-weight: 900; color: white; text-transform: uppercase; letter-spacing:\
        \ 0.8px; margin-top: 2px; z-index: 1;\">Batteries</div>\n      <style>@keyframes\
        \ pulseGlow { from { opacity: 0.2; transform: scale(0.9); } to { opacity:\
        \ 0.4; transform: scale(1.1); } }</style>\n    </div>\n  `;\n]]]\n"
    entity: sensor.batteries_critiques_count
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}80, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - overflow: hidden
      - margin: 0px
      - box-sizing: border-box
      - position: relative
      - height: 85px
      - transition: box-shadow 0.8s ease-in-out, border 0.8s ease-in-out
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
        - padding: 0
        - overflow: hidden
        - position: relative
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.2)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
        - padding: 0
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 60px 25px
      - gap: 0px
      - width: 100%
      - margin: 0
    tap_action:
      action: none
    type: custom:button-card
    variables:
      color: '#ff4444'
  padding: 0
  type: custom:fold-entity-row
conditions:
- entity: sensor.batteries_critiques_count
  state_not: '0'
type: conditional
