    custom_fields:
      details: "[[[\n  if (!entity || !entity.attributes) return '...';\n  const cur\
        \ = parseFloat(entity.attributes.temperature || 0);\n  const low = parseFloat(entity.attributes.forecast?.[0]?.templow\
        \ || cur - 3);\n  const high = parseFloat(entity.attributes.forecast?.[0]?.temperature\
        \ || cur + 4);\n  const range = Math.max(high - low, 1);\n  const pos = Math.min(Math.max(((cur\
        \ - low) / range) * 100, 0), 100);\n  \n  const alert_ent = states['sensor.91_weather_alert'];\n\
        \  let alerts_html = '';\n  if (alert_ent && alert_ent.state !== 'Vert' &&\
        \ alert_ent.state !== 'unknown') {\n    const risks_map = {'inondation': 'mdi:home-flood',\
        \ 'vent': 'mdi:weather-windy', 'pluie': 'mdi:weather-pouring', 'orage': 'mdi:weather-lightning',\
        \ 'neige': 'mdi:weather-snowy-heavy'};\n    let active_alerts = [];\n    for\
        \ (const [key, val] of Object.entries(alert_ent.attributes)) {\n      if (['2','3','4','jaune','orange','rouge'].includes(String(val).toLowerCase()))\
        \ {\n        active_alerts.push({name: key, icon: risks_map[key.toLowerCase()]\
        \ || 'mdi:alert'});\n      }\n    }\n    alerts_html = '<div style=\"display:\
        \ flex; flex-direction: column; gap: 8px; margin-top: 5px;\">' + active_alerts.map(a\
        \ => `<div style=\"display: flex; align-items: center; gap: 10px; background:\
        \ rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 12px; border: 1px\
        \ solid rgba(255,255,255,0.05);\"><ha-icon icon=\"${a.icon}\" style=\"width:\
        \ 20px; color: orange;\"></ha-icon><span style=\"font-size: 12px; font-weight:\
        \ 800; color: white;\">${a.name}</span></div>`).join('') + '</div>';\n  }\n\
        \  const uv_ent = states['sensor.openuv_maison_indice_uv_actuel'];\n  const\
        \ uv_val = parseFloat(uv_ent?.state || 0);\n  const uv_pct = Math.min((uv_val\
        \ / 12) * 100, 100);\n  let uv_color = '#4CAF50';\n  if (uv_val >= 3) uv_color\
        \ = '#FDD835';\n  if (uv_val >= 6) uv_color = '#FB8C00';\n  if (uv_val >=\
        \ 8) uv_color = '#F44336';\n  if (uv_val >= 11) uv_color = '#9C27B0';\n  //\
        \ Image : Ciel bleu avec cumulus distincts\n  const bgImg = \"https://images.unsplash.com/photo-1517483000871-1dbf64a6e1c6?q=80&w=500&auto=format&fit=crop\"\
        ;\n  return `\n    <div style=\"width: 100%; height: 100%; position: relative;\
        \ overflow: hidden; display: flex; flex-direction: column; padding: 15px 18px;\
        \ box-sizing: border-box; cursor: pointer;\" onclick=\"event.stopPropagation();\
        \ const e = new CustomEvent('hass-more-info', { detail: { entityId: 'weather.cerny'\
        \ }, bubbles: true, composed: true }); this.dispatchEvent(e);\">\n      <div\
        \ style=\"position: absolute; top:0; left:0; width: 100%; height: 100%; background:\
        \ url('${bgImg}') center/cover no-repeat; opacity: 0.35; z-index: 0;\"></div>\n\
        \      \n      <div style=\"position: relative; z-index: 1;\">\n        <div\
        \ style=\"display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom:\
        \ 2px;\">\n          <span style=\"font-size: 12px; font-weight: 900; color:\
        \ white; min-width: 25px;\">${Math.round(low)}°</span>\n          <div style=\"\
        flex: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px;\
        \ position: relative;\">\n            <div style=\"position: absolute; width:\
        \ 100%; height: 100%; background: linear-gradient(90deg, #4FC3F7, #FFA726);\
        \ border-radius: 6px; opacity: 0.8;\"></div>\n            <div style=\"position:\
        \ absolute; left: ${pos}%; top: 50%; transform: translate(-50%, -50%); width:\
        \ 24px; height: 24px; background: white; border-radius: 50%; box-shadow: 0\
        \ 2px 8px rgba(0,0,0,0.5); z-index: 2; border: 2px solid #29B6F6; display:\
        \ flex; align-items: center; justify-content: center;\">\n              <span\
        \ style=\"color: #141B26; font-size: 11px; font-weight: 900;\">${Math.round(cur)}°</span>\n\
        \            </div>\n          </div>\n          <span style=\"font-size:\
        \ 12px; font-weight: 900; color: white; min-width: 25px; text-align: right;\"\
        >${Math.round(high)}°</span>\n        </div>\n        \n        ${alerts_html}\n\
        \        <div style=\"display: flex; flex-direction: column; gap: 8px; width:\
        \ 100%; margin-top: 8px;\">\n          <div style=\"display: flex; justify-content:\
        \ space-between; align-items: center; margin-bottom: 2px;\">\n           \
        \  <span style=\"font-size: 11px; font-weight: 950; color: rgba(255,255,255,0.5);\
        \ text-transform: uppercase;\">Indice UV</span>\n          </div>\n      \
        \    <div style=\"display: flex; align-items: center; gap: 10px; width: 100%;\"\
        >\n            <span style=\"font-size: 12px; font-weight: 900; color: white;\
        \ min-width: 25px;\">0</span>\n            <div style=\"flex: 1; height: 12px;\
        \ background: rgba(0,0,0,0.3); border-radius: 6px; position: relative; border:\
        \ 1px solid rgba(255,255,255,0.05);\">\n              <div style=\"position:\
        \ absolute; width: 100%; height: 100%; background: linear-gradient(90deg,\
        \ #4CAF50 0%, #FDD835 25%, #FB8C00 50%, #F44336 75%, #9C27B0 100%); border-radius:\
        \ 6px; opacity: 0.8;\"></div>\n              <div style=\"position: absolute;\
        \ left: ${uv_pct}%; top: 50%; transform: translate(-50%, -50%); width: 24px;\
        \ height: 24px; background: white; border-radius: 50%; box-shadow: 0 2px 8px\
        \ rgba(0,0,0,0.5); z-index: 2; border: 2px solid ${uv_color}; display: flex;\
        \ align-items: center; justify-content: center;\">\n                <span\
        \ style=\"color: #141B26; font-size: 10px; font-weight: 950;\">${uv_val.toFixed(1)}</span>\n\
        \              </div>\n            </div>\n            <span style=\"font-size:\
        \ 12px; font-weight: 900; color: white; min-width: 30px; text-align: right;\"\
        >12</span>\n          </div>\n        </div>\n      </div>\n    </div>\n \
        \ `;\n]]]\n"
      footer: '[[[ return `<div style="display:flex; width:100%; justify-content:center;
