        \ {\"1\":\"#4CAF50\",\"2\":\"#8BC34A\",\"3\":\"#FFC107\",\"4\":\"#FF9800\"\
        ,\"5\":\"#F44336\",\"6\":\"#9C27B0\"};\n  const msgs = {\n    \"1\":\"Qualité\
        \ de l'air optimale\",\n    \"2\":\"Bonne qualité de l'air\",\n    \"3\":\"\
        Qualité de l'air dégradée\",\n    \"4\":\"Qualité de l'air MAUVAISE\",\n \
        \   \"5\":\"Qualité de l'air TRÈS MAUVAISE\",\n    \"6\":\"Qualité de l'air\
        \ EXTRÊMEMENT MAUVAISE\"\n  };\n  return { \n    color: colors[entity.state]\
        \ || \"#FFFFFF\", \n    title: \"QUALITÉ DE L'AIR\", \n    sub: msgs[entity.state]\
