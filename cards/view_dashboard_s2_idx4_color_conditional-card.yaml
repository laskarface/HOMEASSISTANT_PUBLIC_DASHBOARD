# =========================================
# CARTE : color
# VUE   : dashboard
# TYPE  : conditional (Carte monobloc)
# DÉPENDANCES :
#  - binary_sensor.capteur_fenetre_chloe_contact
#  - binary_sensor.capteur_fenetre_morgan_contact
#  - binary_sensor.capteur_porte_morgan_contact
#  - binary_sensor.fenetre_lison_contact
#  - entity.state
#  - images.unsplash
#  - sensor.ouvertures_count
#  - variables.color
#  - variables.emoji
# =========================================

card:
  card_mod:
    style: 'ha-card { background: transparent !important; border: none !important;
      box-shadow: none !important; }

      .card-content { padding: 0 !important; }

      div#head { display: block !important; width: 100% !important; padding: 0 !important;
      margin: 0 !important; --toggle-icon-width: 0px !important; }

      #head { padding: 0 !important; margin: 0 !important; width: 100% !important;
      cursor: pointer !important; pointer-events: auto !important; }

      #head ha-icon { display: none !important; width: 0px !important; }

      div#items { padding: 0 !important; margin: 0 !important; }

      '
  clickable: true
  entities:
  - color_type: blank-card
    styles:
      card:
      - height: 14px
    type: custom:button-card
  - card:
      card_mod:
        style: 'ha-card { background: transparent !important; box-shadow: none !important;
          border: none !important; padding: 0 !important; margin: 0 !important; width:
          100% !important; }

          '
      columns: 2
      square: false
      type: grid
    card_param: cards
    filter:
      include:
      - entity_id: binary_sensor.capteur_fenetre_chloe_contact
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          state:
          - icon: mdi:window-open-variant
            label: Ouvert
            value: 'on'
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(211, 47, 47, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 65px
            icon:
            - color: '#d32f2f'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - margin-left: 4px
            state:
            - color: '#d32f2f'
            - font-weight: 900
            - font-size: 11px
            - justify-self: start
            - padding-right: 8px
          type: custom:button-card
        state: 'on'
      - entity_id: binary_sensor.capteur_fenetre_morgan_contact
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          state:
          - icon: mdi:window-open-variant
            label: Ouvert
            value: 'on'
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(211, 47, 47, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 65px
            icon:
            - color: '#d32f2f'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - margin-left: 4px
            state:
            - color: '#d32f2f'
            - font-weight: 900
            - font-size: 11px
            - justify-self: start
            - padding-right: 8px
          type: custom:button-card
        state: 'on'
      - entity_id: binary_sensor.capteur_porte_morgan_contact
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          state:
          - icon: mdi:window-open-variant
            label: Ouvert
            value: 'on'
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(211, 47, 47, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 65px
            icon:
            - color: '#d32f2f'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - margin-left: 4px
            state:
            - color: '#d32f2f'
            - font-weight: 900
            - font-size: 11px
            - justify-self: start
            - padding-right: 8px
          type: custom:button-card
        state: 'on'
      - entity_id: binary_sensor.fenetre_lison_contact
        options:
          layout: horizontal
          show_icon: true
          show_name: true
          show_state: true
          state:
          - icon: mdi:window-open-variant
            label: Ouvert
            value: 'on'
          styles:
            card:
            - background: rgba(20, 27, 38, 0.6)
            - border-radius: 20px
            - border: 1px solid rgba(211, 47, 47, 0.4)
            - height: 60px
            grid:
            - grid-template-areas: '"i n s"'
            - grid-template-columns: 45px 1fr 65px
            icon:
            - color: '#d32f2f'
            - justify-self: center
            name:
            - color: white
            - font-weight: 800
            - font-size: 11px
            - justify-self: start
            - margin-left: 4px
            state:
            - color: '#d32f2f'
            - font-weight: 900
            - font-size: 11px
            - justify-self: start
            - padding-right: 8px
          type: custom:button-card
        state: 'on'
    show_empty: false
    type: custom:auto-entities
  head:
    custom_fields:
      details: "[[[\n  const count = parseInt(entity.state) || 0;\n  const label =\
        \ count > 1 ? 'OUVERTURES DÉTECTÉES' : 'OUVERTURE DÉTECTÉE';\n  const color\
        \ = variables.color;\n  // Image sur le thème des ouvertures / architecture\
        \ moderne\n  const bgImg = \"https://images.unsplash.com/photo-1549517045-bc93de075e53?q=80&w=500&auto=format&fit=crop\"\
        ;\n  \n  return `\n    <div style=\"width:100%; height:100%; display:flex;\
        \ justify-content:center; align-items:center; padding:0 15px; box-sizing:border-box;\
        \ position: relative; overflow: hidden;\">\n      <!-- Image de fond -->\n\
        \      <div style=\"position: absolute; top:0; left:0; width: 100%; height:\
        \ 100%; background: url('${bgImg}') center 80% / cover no-repeat; opacity:\
        \ 0.25; z-index: 0;\"></div>\n      \n      <!-- Contenu aligné au pixel près\
        \ -->\n      <div style=\"width:280px; max-width:100%; display:flex; flex-direction:row;\
        \ align-items:center; justify-content:flex-start; gap:15px; box-sizing:border-box;\
        \ position: relative; z-index: 1;\">\n        <div style=\"font-size:38px;\
        \ font-weight:900; color:${color}; line-height:1; text-shadow:0 0 15px ${color}80;\
        \ transition:color 0.8s ease; min-width:40px; text-align:center;\">${count}</div>\n\
        \        <div style=\"display:flex; flex-direction:column; align-items:flex-start;\
        \ justify-content:center; flex:1;\">\n          <div style=\"font-size:13px;\
        \ font-weight:800; color:white; text-transform:uppercase; letter-spacing:1px;\
        \ line-height:1.2; white-space:normal;\">${label}</div>\n          <div style=\"\
        font-size:11px; color:rgba(255,255,255,0.6); margin-top:4px; font-weight:600;\"\
        >SÉCURITÉ FENÊTRES / PORTES</div>\n        </div>\n      </div>\n    </div>`;\n\
        ]]]\n"
      footer: "[[[\n  return `<div style=\"display:flex;width:100%;justify-content:center;align-items:center;\"\
        >\n    <ha-icon icon=\"mdi:chevron-down\" style=\"color:rgba(255,255,255,0.7);width:18px;height:18px;\"\
        ></ha-icon>\n  </div>`;\n]]]\n"
      icon: "[[[\n  const color = variables.color; const emoji = variables.emoji;\n\
        \  return `\n    <div style=\"width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,${color}33\
        \ 0%,${color}0D 100%);border-top-left-radius:20px;box-sizing:border-box;position:relative;\"\
        >\n      <div style=\"position:absolute;width:50px;height:50px;background:${color};border-radius:50%;filter:blur(20px);opacity:0.3;animation:pulseGlow\
        \ 4s infinite alternate ease-in-out;\"></div>\n      <div style=\"font-size:32px;line-height:1;filter:drop-shadow(0\
        \ 0 10px ${color}80);display:flex;align-items:center;justify-content:center;z-index:1;\"\
        >${emoji}</div>\n      <div style=\"font-size:10px;font-weight:900;color:white;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;z-index:1;\"\
        >Ouvertures</div>\n      <style>@keyframes pulseGlow { from{opacity:0.2;transform:scale(0.9);}to{opacity:0.4;transform:scale(1.1);}\
        \ }</style>\n    </div>`;\n]]]\n"
    entity: sensor.ouvertures_count
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}80, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - overflow: hidden
      - margin: 0px
      - height: 85px
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
        - padding: 0
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.2)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 60px 25px
      - gap: 0px
      - width: 100%
      - margin: 0
    tap_action:
      action: none
    type: custom:button-card
    variables:
      color: '#d32f2f'
      emoji: 🚫
  padding: 0
  type: custom:fold-entity-row
conditions:
- above: 0
  condition: numeric_state
  entity: sensor.ouvertures_count
type: conditional
