- card_mod:
    style: "ha-card {\n  background: rgba(20, 27, 38, 0.6) !important;\n  backdrop-filter:\
      \ blur(10px);\n  -webkit-backdrop-filter: blur(10px);\n  border-radius: 20px\
      \ !important;\n  border: 1px solid rgba(255, 255, 255, 0.1) !important;\n  box-shadow:\
      \ 0 4px 15px rgba(0,0,0,0.2) !important;\n  margin: 10px 0 !important;\n  \n\
      \  {% if is_state('switch.chauffage_lison_z', 'on') %}\n    border: 1px solid\
      \ rgba(255, 69, 0, 0.4) !important;\n    box-shadow: 0 0 15px rgba(255, 69,\
      \ 0, 0.2) !important;\n  {% endif %}\n}\n"
  cards:
  - custom_fields:
      m: "[[[ \n  const cal = states['calendar.chris_billet_gmail_com'];\n  const\
        \ calMsg = cal && cal.attributes && cal.attributes.message ? cal.attributes.message.toLowerCase()\
        \ : '';\n  const present = cal && cal.state === 'on' && (calMsg.includes('papa')\
        \ || calMsg.includes('vacances') || calMsg.includes('lison'));\n  const fenetre\
        \ = states['binary_sensor.fenetre_lison_contact'] && states['binary_sensor.fenetre_lison_contact'].state\
        \ === 'on';\n  const forcage_manu = states['input_boolean.lison_heater_force_manual']\
        \ && states['input_boolean.lison_heater_force_manual'].state === 'on';\n \
        \ const forcage_plan = states['input_boolean.lison_heater_force_schedule']\
        \ && states['input_boolean.lison_heater_force_schedule'].state === 'on';\n\
        \  let targetTemp = 17;\n  if (forcage_manu || forcage_plan || present) targetTemp\
        \ = 20.5;\n  const chauffe = states['switch.chauffage_lison_z'] && states['switch.chauffage_lison_z'].state\
        \ === 'on';\n  if (fenetre) return \"FENÊTRE OUVERTE\";\n  if (chauffe) return\
        \ `EN CHAUFFE (CIBLE ${targetTemp}°)`;\n  if (forcage_manu || forcage_plan\
        \ || present) return `ATTENTE (CIBLE 20.2 - ${targetTemp}°)`;\n  return \"\
        LISON ABSENTE\";\n]]]\n"
      t: "[[[\n    const cal = states['calendar.chris_billet_gmail_com'];\n    const\
        \ calMsg = cal && cal.attributes && cal.attributes.message ? cal.attributes.message.toLowerCase()\
        \ : '';\n    const present = cal && cal.state === 'on' && (calMsg.includes('papa')\
        \ || calMsg.includes('vacances') || calMsg.includes('lison'));\n    return\
        \ `<ha-icon icon=\"mdi:account-child\" style=\"width: 20px; height: 20px;\
        \ color: ${present ? '#4CAF50' : 'rgba(255,255,255,0.1)'}\"></ha-icon>`;\n\
        ]]]\n"
    icon: mdi:radiator
    name: Chauffage Lison
    styles:
