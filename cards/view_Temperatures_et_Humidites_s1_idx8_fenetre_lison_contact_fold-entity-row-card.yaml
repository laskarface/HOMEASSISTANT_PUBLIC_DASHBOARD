  keep:
    background: false
    box_shadow: false
    margin: false
  type: custom:stack-in-card
head:
  custom_fields:
    footer: "[[[\n   return `<ha-icon icon=\"mdi:chevron-down\" style=\"color: rgba(255,255,255,0.5);\
      \ width: 20px; height: 20px; transition: all 0.3s ease;\"></ha-icon>`;\n]]]\n"
    main: "[[[\n  const tempEnt = states[variables.temp_entity];\n  const humEnt =\
      \ states[variables.hum_entity];\n  const heaterEnt = states['switch.chauffage_lison_z'];\n\
      \n  const temp = tempEnt && tempEnt.state && !isNaN(parseFloat(tempEnt.state))\
      \ ? parseFloat(tempEnt.state) : 0;\n  const humState = humEnt && humEnt.state\
      \ ? parseFloat(humEnt.state) : 0;\n  const isHeating = heaterEnt && heaterEnt.state\
      \ === 'on'; \n  \n  const isHumPresent = humState > 0 && !isNaN(humState);\n\
      \  const humText = isHumPresent ? humState.toFixed(0) : \"ABSENT\";\n  const\
      \ humUnit = isHumPresent ? \"%\" : \"\";\n  const humIconColorDef = isHumPresent\
      \ ? \"rgba(255,255,255,0.3)\" : \"rgba(255,255,255,0.1)\";\n  const humTextColDef\
      \ = isHumPresent ? \"white\" : \"rgba(255,255,255,0.2)\";\n  \n  let tempAlert\
      \ = false;\n  let tempBg = \"transparent\";\n  let tempIconColor = \"rgba(255,255,255,0.3)\"\
      ;\n  let tempTextColor = \"white\";\n  \n  if (temp > 0 && temp < 19) {\n  \
      \  tempAlert = true; tempBg = \"linear-gradient(135deg, rgba(41, 182, 246, 0.25)\
      \ 0%, transparent 100%)\";\n    tempIconColor = \"#29B6F6\"; tempTextColor =\
      \ \"#29B6F6\";\n  } else if (temp > 25) {\n    tempAlert = true; tempBg = \"\
      linear-gradient(135deg, rgba(255, 152, 0, 0.25) 0%, transparent 100%)\";\n \
      \   tempIconColor = \"#FF9800\"; tempTextColor = \"#FF9800\";\n  }\n\n  let\
      \ humAlert = false;\n  let humBg = \"transparent\";\n  let humIconColor = humIconColorDef;\n\
      \  let humTextColor = humTextColDef;\n\n  if (isHumPresent && humState > 65)\
      \ {\n    humAlert = true; \n    humBg = \"linear-gradient(135deg, rgba(33, 150,\
      \ 243, 0.25) 0%, transparent 100%)\";\n    humIconColor = \"#2196F3\"; humTextColor\
      \ = \"#2196F3\";\n  }\n\n  let leftColor = \"#4CAF50\"; \n  \n  if (isHeating)\
      \ leftColor = \"#FF9800\"; \n  else if (tempAlert || humAlert) {\n     if (temp\
      \ > 0 && temp < 19) leftColor = \"#29B6F6\"; \n     if (temp > 25) leftColor\
      \ = \"#FF9800\"; \n     if (isHumPresent && humState > 65) leftColor = \"#2196F3\"\
      ; \n  }\n\n  return `\n    <div style=\"display: flex; width: 100%; height:\
      \ 100%; margin: 0; padding: 0;\">\n      <div style=\"flex: 0 0 130px; height:\
      \ 100%; display: flex; flex-direction: column; justify-content: center; align-items:\
      \ center; border-right: 1px solid rgba(255,255,255,0.1); background: linear-gradient(135deg,\
      \ ${leftColor}25 0%, transparent 100%); margin: 0; padding: 0; box-sizing: border-box;\
      \ transition: all 0.5s;\">\n        <ha-icon icon=\"mdi:bed\" style=\"width:\
      \ 24px; height: 24px; color: ${leftColor}; filter: drop-shadow(0 0 8px ${leftColor}80);\
      \ margin-bottom: 2px; transition: all 0.5s;\"></ha-icon>\n        <div style=\"\
      font-size: 9px; font-weight: 800; color: white; text-transform: uppercase; letter-spacing:\
      \ 1px; text-align: center; margin: 0; line-height: 1.2;\">CHAMBRE<br>LISON</div>\n\
      \      </div>\n      <div style=\"flex: 1; height: 100%; display: flex; flex-direction:\
      \ column; justify-content: center; align-items: center; border-right: 1px solid\
      \ rgba(255,255,255,0.05); background: ${tempBg}; pointer-events: auto; cursor:\
      \ pointer; margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s;\"\
      \n           onclick=\"event.stopPropagation(); const e = new CustomEvent('hass-more-info',\
      \ { detail: { entityId: '${variables.temp_entity}' }, bubbles: true, composed:\
      \ true }); this.dispatchEvent(e);\">\n        <div style=\"display: flex; align-items:\
      \ center; gap: 4px; margin-bottom: 2px;\">\n          <ha-icon icon=\"mdi:thermometer\"\
      \ style=\"width: 12px; height: 12px; color: ${tempIconColor}; transition: color\
      \ 0.5s;\"></ha-icon>\n          <span style=\"font-size: 8px; font-weight: 900;\
      \ color: ${tempIconColor}; letter-spacing: 1px; line-height: 1; transition:\
      \ color 0.5s;\">TEMPÉRATURE</span>\n        </div>\n        <div style=\"display:\
      \ flex; align-items: baseline; gap: 4px;\">\n          <span style=\"font-size:\
      \ 22px; font-weight: 900; color: ${tempTextColor}; line-height: 1; transition:\
      \ color 0.5s;\">${parseFloat(temp).toFixed(1)}</span>\n          <span style=\"\
      font-size: 11px; font-weight: 800; color: ${tempIconColor}; line-height: 1;\
      \ transition: color 0.5s;\">°C</span>\n        </div>\n      </div>\n      <div\
      \ style=\"flex: 1; height: 100%; display: flex; flex-direction: column; justify-content:\
      \ center; align-items: center; background: ${humBg}; pointer-events: auto; cursor:\
      \ pointer; margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s;\"\
      \n           onclick=\"event.stopPropagation(); const e = new CustomEvent('hass-more-info',\
      \ { detail: { entityId: '${variables.hum_entity}' }, bubbles: true, composed:\
      \ true }); this.dispatchEvent(e);\">\n        <div style=\"display: flex; align-items:\
      \ center; gap: 4px; margin-bottom: 2px;\">\n          <ha-icon icon=\"mdi:water-percent\"\
      \ style=\"width: 13px; height: 13px; color: ${humIconColor}; margin-left: -2px;\
      \ transition: color 0.5s;\"></ha-icon>\n          <span style=\"font-size: 8px;\
      \ font-weight: 900; color: ${humIconColor}; letter-spacing: 1px; line-height:\
      \ 1; transition: color 0.5s;\">HUMIDITÉ</span>\n        </div>\n        <div\
      \ style=\"display: flex; align-items: baseline; gap: 4px;\">\n          <span\
      \ style=\"font-size: ${isHumPresent ? '22px' : '12px'}; font-weight: 900; color:\
      \ ${humTextColor}; line-height: 1; transition: color 0.5s;\">${humText}</span>\n\
      \          <span style=\"font-size: 11px; font-weight: 800; color: ${humIconColor};\
      \ line-height: 1; transition: color 0.5s;\">${humUnit}</span>\n        </div>\n\
      \      </div>\n    </div>\n  `;\n]]]\n"
  entity: sensor.capteur_lison_z_temperature
  show_icon: false
  show_name: false
  show_state: false
  styles:
    card:
    - padding: 0
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: 1px solid rgba(255, 255, 255, 0.1)
    - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
    - overflow: hidden
    - margin-top: 8px
    - pointer-events: none
    custom_fields:
      footer:
      - justify-self: stretch
      - align-self: stretch
      - background: rgba(0,0,0,0.2)
      - border-top: 1px solid rgba(255,255,255,0.05)
      - display: flex
      - align-items: center
      - justify-content: center
      - margin: 0
      main:
      - justify-self: stretch
      - align-self: stretch
      - padding: 0
      - height: 100%
      - margin: 0
    grid:
    - grid-template-areas: '"main" "footer"'
    - grid-template-columns: 1fr
    - grid-template-rows: 64px 20px
    - margin: 0
    - gap: 0
  tap_action:
    action: none
  type: custom:button-card
  variables:
    hum_entity: sensor.capteur_lison_z_humidity
    temp_entity: sensor.capteur_lison_z_temperature
padding: 0
