      - background: transparent
      - border: none
      - padding: 12px 16px
      custom_fields:
        m:
        - font-size: 10px
        - font-weight: 700
        - text-align: center
        - border-left: 1px solid rgba(255,255,255,0.1)
        - border-right: 1px solid rgba(255,255,255,0.1)
        - margin: 0 10px
        - padding: 0 10px
        - color: rgba(255,255,255,0.4)
        t:
        - justify-self: end
      grid:
      - grid-template-areas: '"i n m t"'
      - grid-template-columns: 35px auto 1fr 35px
      - align-items: center
      icon:
      - width: 22px
      - color: "[[[ \n  if (states['binary_sensor.fenetre_lison_contact'] && states['binary_sensor.fenetre_lison_contact'].state\
          \ === 'on') return '#FF0000'; \n  if (states['switch.chauffage_lison_z']\
          \ && states['switch.chauffage_lison_z'].state === 'on') return '#FF4500';\n\
          \  return 'rgba(255,255,255,0.4)';\n]]]\n"
      name:
      - justify-self: start
      - font-size: 13px
      - font-weight: 700
      - color: rgba(255,255,255,0.9)
      - margin-left: 8px
      - white-space: nowrap
    type: custom:button-card
  - cards:
    - entity: input_boolean.lison_heater_force_manual
      icon: mdi:hand-back-right
      name: Forçage Manu
      show_state: false
      styles:
        card:
        - height: 60px
        - background: '[[[ return entity.state === ''on'' ? ''rgba(255, 187, 0, 0.1)''
            : ''transparent'' ]]]

            '
        - border-radius: 0
        - border: none
        - border-right: 1px solid rgba(255,255,255,0.05)
        icon:
        - width: 28px
        - color: '[[[ return entity.state === ''on'' ? ''#FFBB00'' : ''rgba(255,255,255,0.2)''
            ]]]

            '
        name:
        - font-size: 11px
        - color: rgba(255,255,255,0.5)
      type: custom:button-card
    - entity: input_boolean.lison_heater_force_schedule
      icon: mdi:calendar-clock
      name: Planning
      show_state: false
      styles:
        card:
        - height: 60px
        - background: '[[[ return entity.state === ''on'' ? ''rgba(0, 210, 255, 0.1)''
            : ''transparent'' ]]]

            '
        - border-radius: 0
        - border: none
        icon:
        - width: 28px
        - color: '[[[ return entity.state === ''on'' ? ''#00D2FF'' : ''rgba(255,255,255,0.2)''
            ]]]

            '
        name:
        - font-size: 11px
        - color: rgba(255,255,255,0.5)
      type: custom:button-card
    type: horizontal-stack
  - card:
      card:
        entities:
        - entity: input_datetime.lison_heater_force_start
          icon: mdi:calendar-start
          name: Début Forçage
        - entity: input_datetime.lison_heater_force_end
          icon: mdi:calendar-end
          name: Fin Forçage
        type: entities
      card_mod:
        style: "ha-card {\n  background: transparent !important;\n  border: none !important;\n\
          \  padding: 4px 12px 12px 12px !important;\n  margin: 0 !important;\n  box-shadow:\
          \ none !important;\n  --mdc-theme-primary: #00D2FF !important;\n  --paper-item-icon-color:\
          \ rgba(0, 210, 255, 0.6) !important;\n  --primary-text-color: rgba(255,255,255,0.9)\
          \ !important;\n  --secondary-text-color: rgba(255,255,255,0.5) !important;\n\
          }\n"
      type: custom:mod-card
