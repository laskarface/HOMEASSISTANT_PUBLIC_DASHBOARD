card_mod:
  style: "ha-card {\n  /* Style Glassmorphism Raffiné */\n  background: rgba(10, 15,\
    \ 25, 0.8) !important;\n  backdrop-filter: blur(15px) !important;\n  -webkit-backdrop-filter:\
    \ blur(15px) !important;\n  border-radius: 20px !important;\n  \n  /* Bordure\
    \ Dynamique fine avec lueur orange si allumé */\n  border: 1px solid\n    {% if\
    \ states('light.lumiere_chloe') == 'on'\n       or states('light.pilote_led_chloe')\
    \ == 'on' %}\n      rgba(255, 152, 0, 0.6)\n    {% else %}\n      rgba(255, 255,\
    \ 255, 0.12)\n    {% endif %} !important;\n  \n  /* box-shadow profond */\n  box-shadow:\n\
    \    {% if states('light.lumiere_chloe') == 'on'\n       or states('light.pilote_led_chloe')\
    \ == 'on' %}\n      0 0 25px rgba(255, 152, 0, 0.25), 0 8px 32px rgba(0, 0, 0,\
    \ 0.6)\n    {% else %}\n      0 8px 32px rgba(0, 0, 0, 0.5)\n    {% endif %} !important;\n\
    \    \n  overflow: hidden !important;\n  margin-top: 8px !important;\n  padding:\
    \ 0 !important;\n}\n"
type: custom:mod-card
