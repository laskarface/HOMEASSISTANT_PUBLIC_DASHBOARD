# =========================================
# CARTE : smart_temp_humidity_sensor_39000e5be749_
# VUE   : Temperatures_et_Humidites
# TYPE  : custom:mod-card (Carte monobloc)
# DÉPENDANCES :
#  - alerts.length
#  - images.unsplash
#  - s.state
#  - sensor.capteur_lison_z_humidity
#  - sensor.capteur_lison_z_temperature
#  - sensor.capteur_marley_humidity
#  - sensor.capteur_marley_temperature
#  - sensor.humidite_chambre_parentale_humidity
#  - sensor.humidite_chambre_parentale_temperature
#  - sensor.smart_temp_humidity_sensor_39000e4fa9fc_humidity
#  - sensor.smart_temp_humidity_sensor_39000e4fa9fc_temperature
#  - sensor.smart_temp_humidity_sensor_39000e5be749_humidity
#  - sensor.smart_temp_humidity_sensor_39000e5be749_temperature
# =========================================

card:
  custom_fields:
    main: "[[[\n  const check = (name, temp, hum = null) => {\n    // Seuil à 25°C\
      \ et 19°C comme demandé à l'origine\n    if (!isNaN(temp) && temp > 25) return\
      \ { msg: name + ' TROP CHAUDE',  color: '#FF9800', bg: 'rgba(255,152,0,0.15)',\
      \  icon: '\U0001F321️' };\n    if (!isNaN(temp) && temp < 19) return { msg:\
      \ name + ' TROP FROIDE',  color: '#29B6F6', bg: 'rgba(41,182,246,0.15)', icon:\
      \ '❄️' };\n    if (hum !== null && !isNaN(hum) && hum > 65) return { msg: name\
      \ + ' TROP HUMIDE', color: '#2196F3', bg: 'rgba(33,150,243,0.15)', icon: '\U0001F4A7\
      ' };\n    return null;\n  };\n\n  const g = (id) => {\n    const s = states[id];\n\
      \    return s ? parseFloat(s.state) : NaN;\n  };\n\n  const alerts = [\n   \
      \ check('CH. PARENTALE', g('sensor.humidite_chambre_parentale_temperature'),\
      \ g('sensor.humidite_chambre_parentale_humidity')),\n    check('CH. CHLOÉ',\
      \     g('sensor.smart_temp_humidity_sensor_39000e5be749_temperature'), g('sensor.smart_temp_humidity_sensor_39000e5be749_humidity')),\n\
      \    check('CH. MOMO',      g('sensor.smart_temp_humidity_sensor_39000e4fa9fc_temperature'),\
      \ g('sensor.smart_temp_humidity_sensor_39000e4fa9fc_humidity')),\n    check('CH.\
      \ MARLEY',    g('sensor.capteur_marley_temperature'), g('sensor.capteur_marley_humidity')),\n\
      \    check('CH. LISON',     g('sensor.capteur_lison_z_temperature'), g('sensor.capteur_lison_z_humidity')),\n\
      \  ].filter(a => a !== null);\n\n  let label, color, bg, icon;\n  if (alerts.length\
      \ === 0) {\n    label = 'TOUT VA BIEN';\n    color = '#4CAF50';\n    bg    =\
      \ 'rgba(0,0,0,0.2)';\n    icon  = '✓';\n  } else if (alerts.length === 1) {\n\
      \    ({ msg: label, color, bg, icon } = alerts[0]);\n  } else {\n    // Affiche\
      \ le message de la première alerte + le nombre d'autres alertes\n    label =\
      \ alerts[0].msg + ' +' + (alerts.length - 1);\n    color = alerts[0].color;\n\
      \    bg    = alerts[0].bg;\n    icon  = alerts[0].icon;\n  }\n\n  const imageUrl\
      \ = 'https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&q=80&w=600&h=200';\n\
      \n  return `\n    <div style=\"display:flex;width:100%;height:56px;align-items:center;\"\
      >\n      \n      <div style=\"flex:0 0 130px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-bottom:6px;border-right:2px\
      \ solid rgba(255,255,255,0.08);background:linear-gradient(135deg,rgba(41,182,246,0.15)\
      \ 0%,transparent 100%);\">\n        <span style=\"font-size:11px;font-weight:950;color:white;text-transform:uppercase;letter-spacing:1px;line-height:1.2;text-align:center;\"\
      >CHAM-<br>BRES</span>\n      </div>\n\n      <div style=\"flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;padding:0\
      \ 12px;\n        background: linear-gradient(${bg}, ${bg}), linear-gradient(rgba(10,\
      \ 15, 25, 0.65), rgba(10, 15, 25, 0.65)), url('${imageUrl}');\n        background-size:\
      \ cover;\n        background-position: center;\n        transition: all 0.4s;\"\
      >\n        <span style=\"font-size:12px;font-weight:950;color:${color};letter-spacing:0.5px;text-shadow:\
      \ 0 1px 4px rgba(0,0,0,0.9);\">${icon} ${label}</span>\n      </div>\n\n   \
      \ </div>`;\n]]]\n"
  entity: sensor.humidite_chambre_parentale_temperature
  show_icon: false
  show_name: false
  show_state: false
  styles:
    card:
    - background: transparent
    - box-shadow: none
    - border-radius: 0
    - padding: 0
    - height: 56px
    - overflow: hidden
    grid:
    - grid-template-areas: '"main"'
    - align-items: stretch
    - justify-items: stretch
  tap_action:
    action: none
  triggers_update:
  - sensor.humidite_chambre_parentale_temperature
  - sensor.humidite_chambre_parentale_humidity
  - sensor.smart_temp_humidity_sensor_39000e5be749_temperature
  - sensor.smart_temp_humidity_sensor_39000e5be749_humidity
  - sensor.smart_temp_humidity_sensor_39000e4fa9fc_temperature
  - sensor.smart_temp_humidity_sensor_39000e4fa9fc_humidity
  - sensor.capteur_marley_temperature
  - sensor.capteur_marley_humidity
  - sensor.capteur_lison_z_temperature
  - sensor.capteur_lison_z_humidity
  type: custom:button-card
card_mod:
  style: "ha-card {\n  position: relative !important;\n  background: rgba(10, 15,\
    \ 25, 0.8) !important;\n  backdrop-filter: blur(15px) !important;\n  -webkit-backdrop-filter:\
    \ blur(15px) !important;\n  border-radius: 20px !important;\n  border: none !important;\n\
    \  box-shadow: 0 8px 32px rgba(0,0,0,0.45) !important;\n  overflow: hidden !important;\n\
    \  padding: 0 !important;\n}\nha-card::before {\n  content: '' !important;\n \
    \ position: absolute !important;\n  inset: 0 !important;\n  border-radius: 20px\
    \ !important;\n  padding: 1.5px !important;\n  background: linear-gradient(to\
    \ right, rgba(41,182,246,0.85), transparent) !important;\n  -webkit-mask:\n  \
    \  linear-gradient(#fff 0 0) content-box,\n    linear-gradient(#fff 0 0) !important;\n\
    \  -webkit-mask-composite: xor !important;\n  mask-composite: exclude !important;\n\
    \  pointer-events: none !important;\n  z-index: 10 !important;\n}\n"
type: custom:mod-card
