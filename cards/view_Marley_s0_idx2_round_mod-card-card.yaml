card:
  cards:
  - card_mod:
      style: ':host { flex: 1 1 0 !important; }

        '
    custom_fields:
      main: "[[[\n  const lightEnt = states['light.smart_rgb_pro_led_strip_24060640872589560f01c4e7ae04b91f'];\n\
        \  const isOn = lightEnt && lightEnt.state === 'on';\n  const offColor = \"\
        rgba(255,255,255,0.3)\";\n  const rightTextColor = isOn ? \"white\" : offColor;\n\
        \  const stateText = isOn ? \"ALLUMÉE\" : \"ÉTEINTE\";\n  const rgb = isOn\
        \ && lightEnt.attributes.rgb_color;\n  const bri = isOn ? Math.round((lightEnt.attributes.brightness\
        \ || 255) / 255 * 100) : 0;\n  const rgbColor = rgb ? `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`\
        \ : null;\n  \n  const rgbStrAlpha = rgb ? `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.45)`\
        \ : '';\n  const centerHaloStr = rgb ? `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.25)`\
        \ : '';\n\n  let rgbStyles = \"\";\n  let classLeftBg = \"\";\n  let classIcon\
        \ = \"\";\n  let classCenterBg = \"\";\n\n  if (isOn && !rgbColor) {\n   \
        \ classLeftBg = \"rgb-bg-left-marley\";\n    classIcon = \"rgb-icon-marley\"\
        ;\n    classCenterBg = \"rgb-bg-center-marley\";\n    rgbStyles = `<style>\n\
        \      @keyframes pulseRgbIconM {\n        0%{color:#ff0000;filter:drop-shadow(0\
        \ 0 6px rgba(255,0,0,0.6));}\n        16%{color:#ff00ff;filter:drop-shadow(0\
        \ 0 6px rgba(255,0,255,0.6));}\n        33%{color:#0000ff;filter:drop-shadow(0\
        \ 0 6px rgba(0,0,255,0.6));}\n        50%{color:#00ffff;filter:drop-shadow(0\
        \ 0 6px rgba(0,255,255,0.6));}\n        66%{color:#00ff00;filter:drop-shadow(0\
        \ 0 6px rgba(0,255,0,0.6));}\n        83%{color:#ffff00;filter:drop-shadow(0\
        \ 0 6px rgba(255,255,0,0.6));}\n        100%{color:#ff0000;filter:drop-shadow(0\
        \ 0 6px rgba(255,0,0,0.6));}\n      }\n      @keyframes pulseRgbBgM {\n  \
        \      0%{background:linear-gradient(135deg,rgba(255,0,0,0.3) 0%,transparent\
        \ 100%);}\n        16%{background:linear-gradient(135deg,rgba(255,0,255,0.3)\
        \ 0%,transparent 100%);}\n        33%{background:linear-gradient(135deg,rgba(0,0,255,0.3)\
        \ 0%,transparent 100%);}\n        50%{background:linear-gradient(135deg,rgba(0,255,255,0.3)\
        \ 0%,transparent 100%);}\n        66%{background:linear-gradient(135deg,rgba(0,255,0,0.3)\
        \ 0%,transparent 100%);}\n        83%{background:linear-gradient(135deg,rgba(255,255,0,0.3)\
        \ 0%,transparent 100%);}\n        100%{background:linear-gradient(135deg,rgba(255,0,0,0.3)\
        \ 0%,transparent 100%);}\n      }\n      @keyframes pulseRgbCenterM {\n  \
        \      0%{background:radial-gradient(ellipse at center,rgba(255,0,0,0.2) 0%,transparent\
        \ 65%); text-shadow:0 0 10px rgba(255,0,0,0.8);}\n        16%{background:radial-gradient(ellipse\
        \ at center,rgba(255,0,255,0.2) 0%,transparent 65%); text-shadow:0 0 10px\
        \ rgba(255,0,255,0.8);}\n        33%{background:radial-gradient(ellipse at\
        \ center,rgba(0,0,255,0.2) 0%,transparent 65%); text-shadow:0 0 10px rgba(0,0,255,0.8);}\n\
        \        50%{background:radial-gradient(ellipse at center,rgba(0,255,255,0.2)\
        \ 0%,transparent 65%); text-shadow:0 0 10px rgba(0,255,255,0.8);}\n      \
        \  66%{background:radial-gradient(ellipse at center,rgba(0,255,0,0.2) 0%,transparent\
        \ 65%); text-shadow:0 0 10px rgba(0,255,0,0.8);}\n        83%{background:radial-gradient(ellipse\
        \ at center,rgba(255,255,0,0.2) 0%,transparent 65%); text-shadow:0 0 10px\
        \ rgba(255,255,0,0.8);}\n        100%{background:radial-gradient(ellipse at\
        \ center,rgba(255,0,0,0.2) 0%,transparent 65%); text-shadow:0 0 10px rgba(255,0,0,0.8);}\n\
        \      }\n      .rgb-icon-marley { animation: pulseRgbIconM 8s linear infinite;\
        \ }\n      .rgb-bg-left-marley { animation: pulseRgbBgM 8s linear infinite;\
        \ }\n      .rgb-bg-center-marley { animation: pulseRgbCenterM 8s linear infinite;\
        \ }\n    </style>`;\n  }\n\n  const iconColor = rgbColor || (isOn ? \"white\"\
        \ : offColor);\n  const iconShadow = isOn ? `drop-shadow(0 0 6px ${rgbColor\
        \ || 'rgba(255,255,255,0.6)'})` : \"none\";\n  const leftBgStyle = (isOn &&\
        \ rgbStrAlpha) ? `background:linear-gradient(135deg, ${rgbStrAlpha} 0%, transparent\
        \ 100%);` : '';\n  \n  // On ajoute le halo concentrique de fond + l'aura\
        \ sur le texte\n  const centerHaloStyle = (isOn && centerHaloStr) ? `background:radial-gradient(ellipse\
        \ at center, ${centerHaloStr} 0%, transparent 65%); text-shadow: 0 0 12px\
        \ ${rgbColor};` : '';\n\n  return `\n    ${rgbStyles}\n    <div style=\"display:flex;width:100%;height:100%;margin:0;padding:0;\"\
        >\n\n      <!-- MODIFICATION ICI : flex 0 0 130px -->\n      <div class=\"\
        ${classLeftBg}\" style=\"flex:0 0 130px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;border-right:1px\
        \ solid rgba(255,255,255,0.1);margin:0;box-sizing:border-box;${leftBgStyle}\"\
        >\n        <ha-icon icon=\"mdi:led-strip-variant\" class=\"${classIcon}\"\
        \ style=\"width:26px;height:26px;color:${iconColor};filter:${iconShadow};display:block;\"\
        ></ha-icon>\n        <div style=\"font-size:11px;font-weight:800;color:${isOn?'white':'rgba(255,255,255,0.5)'};text-transform:uppercase;letter-spacing:1px;text-align:center;line-height:1;\"\
        >LED MARLEY</div>\n      </div>\n\n      <div class=\"${classCenterBg}\" style=\"\
        flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;margin:0;box-sizing:border-box;${centerHaloStyle}\"\
        >\n        <span style=\"font-size:12px;font-weight:900;color:${rightTextColor};letter-spacing:1px;line-height:1;\"\
        >${isOn ? bri + '%' : ''}</span>\n        <span style=\"font-size:22px;font-weight:900;color:${rightTextColor};line-height:1;\"\
        >${stateText}</span>\n      </div>\n\n    </div>`;\n]]]\n"
    entity: light.smart_rgb_pro_led_strip_24060640872589560f01c4e7ae04b91f
