    custom_fields:
      m: "[[[\n  const on = entity.state === 'on';\n  const rgb = entity.attributes.rgb_color\
        \ || [255,215,0];\n  const r = rgb[0], g = rgb[1], b = rgb[2];\n  const rawBri\
        \ = entity.attributes.brightness || 0;\n  const briRatio = on ? rawBri / 255\
        \ : 0;\n  \n  const size = on ? Math.round(24 + briRatio * 20) : 24;\n  const\
        \ op = on ? (briRatio * 0.45).toFixed(2) : '0.06';\n  const bord = on ? (briRatio\
        \ * 0.85).toFixed(2) : '0.14';\n  const svgSize = Math.round(size * 0.45);\n\
        \  \n  return `<div style=\"width:${size}px;height:${size}px;border-radius:50%;\n\
        \    background:rgba(${on?r+','+g+','+b:'255,255,255'},${op});\n    border:1.5px\
        \ solid rgba(${on?r+','+g+','+b:'255,255,255'},${bord});\n    display:flex;align-items:center;justify-content:center;transition:all\
        \ 0.4s;\">\n    <svg viewBox=\"0 0 24 24\" width=\"${svgSize}\" height=\"\
        ${svgSize}\" fill=\"none\">\n      <circle cx=\"12\" cy=\"12\" r=\"3\" fill=\"\
        rgba(${on?r+','+g+','+b:'255,255,255'},${on?'1':'0.35'})\"/>\n      <path\
        \ d=\"M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41\
        \ 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41\"\n        stroke=\"rgba(${on?r+','+g+','+b:'255,255,255'},${on?'1':'0.35'})\"\
        \n        stroke-width=\"1.5\" stroke-linecap=\"round\"/>\n    </svg>\n  </div>`;\n\
        ]]]\n"
