  full_row: true
  head:
    custom_fields:
      details: "[[[\n  const bgImg = \"https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?q=80&w=500&auto=format&fit=crop\"\
        ;\n  return `\n    <div style=\"width: 100%; height: 100%; position: relative;\
        \ overflow: hidden; display: flex; flex-direction: column; align-items: center;\
        \ justify-content: center;\">\n      <div style=\"position: absolute; top:0;\
        \ left:0; width: 100%; height: 100%; background: url('${bgImg}') center/cover\
        \ no-repeat; opacity: 0.25; z-index: 0;\"></div>\n      <div style=\"position:\
        \ relative; z-index: 1; text-align: center; width: 100%;\">\n        <div\
        \ style=\"font-size: 13px; font-weight: 950; color: white; text-transform:\
        \ uppercase; letter-spacing: 1px; margin-bottom: 2px; text-shadow: 0 4px 8px\
        \ rgba(0,0,0,0.95);\">INTÉRIEURES</div>\n        <div style=\"font-size: 10px;\
        \ color: #46D278; font-weight: 900; display: flex; align-items: center; gap:\
        \ 5px; justify-content: center; text-shadow: 0 2px 4px rgba(0,0,0,0.9);\"\
        >\n          <span style=\"width: 6px; height: 6px; background: #46D278; border-radius:\
        \ 50%; display: inline-block; animation: pulseLED 2s infinite;\"></span>\n\
        \          SALON, CHAMBRE & BUREAU EN LIGNE\n        </div>\n      </div>\n\
        \    </div>\n    <style>@keyframes pulseLED { 0%, 100% { opacity: 0.5; } 50%\
        \ { opacity: 1; } }</style>\n  `;\n]]]\n"
      footer: '[[[ return `<div style="display:flex; width:100%; justify-content:center;
        padding: 5px;"><ha-icon icon="mdi:chevron-down" style="color:rgba(255,255,255,0.5);
        width:18px;"></ha-icon></div>`; ]]]

        '
      icon: "[[[\n  const blue = \"#00BFFF\";\n  const svg = `\n    <svg viewBox=\"\
        0 0 100 100\" width=\"42\" height=\"42\" style=\"filter: drop-shadow(0 4px\
        \ 8px rgba(0,0,0,0.5));\">\n      <circle cx=\"50\" cy=\"45\" r=\"25\" fill=\"\
        white\" />\n      <circle cx=\"50\" cy=\"45\" r=\"18\" fill=\"#111\" />\n\
        \      <circle cx=\"50\" cy=\"45\" r=\"12\" fill=\"black\" />\n      <circle\
        \ cx=\"50\" cy=\"28\" r=\"1.5\" fill=\"#00E676\" style=\"animation: blinkLED\
        \ 2.5s infinite;\" />\n    </svg>\n  `;\n  return `\n    <div style=\"width:\
        \ 100%; height: 100%; display: flex; flex-direction: column; align-items:\
        \ center; justify-content: center; background: linear-gradient(135deg, ${blue}33\
        \ 0%, ${blue}0D 100%);\">\n      <div style=\"position: relative; z-index:\
        \ 1;\">${svg}</div>\n      <div style=\"font-size: 10px; font-weight: 950;\
        \ color: white; text-transform: uppercase; margin-top: 2px;\">Caméras</div>\n\
        \    </div>\n  `;\n]]]\n"
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: 1px solid rgba(0, 191, 255, 0.4)
      - box-shadow: 0 8px 32px rgba(0,0,0,0.4)
      - height: 85px
      - overflow: hidden
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - padding: 0
        - position: relative
        - overflow: hidden
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
        - z-index: 2
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 58px 27px
    type: custom:button-card
  padding: 0
  type: custom:fold-entity-row
type: entities
