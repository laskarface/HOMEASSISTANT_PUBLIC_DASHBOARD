# =========================================
# CARTE : camera_salon_move_left
# VUE   : dashboard
# TYPE  : entities (Carte monobloc)
# DÉPENDANCES :
#  - browser_mod.popup
#  - button.camera_bureau_move_down
#  - button.camera_bureau_move_left
#  - button.camera_bureau_move_right
#  - button.camera_bureau_move_up
#  - button.camera_chambre_move_down
#  - button.camera_chambre_move_left
#  - button.camera_chambre_move_right
#  - button.camera_chambre_move_up
#  - button.camera_salon_move_down
#  - button.camera_salon_move_left
#  - button.camera_salon_move_right
#  - button.camera_salon_move_up
#  - button.press
#  - images.unsplash
#  - n.card
#  - number.camera_bureau_microphone_volume
#  - number.camera_chambre_microphone_volume
#  - number.camera_salon_microphone_volume
#  - switch.camera_bureau_microphone_mute
#  - switch.camera_chambre_microphone_mute
#  - switch.camera_salon_microphone_mute
# =========================================

card_mod:
  style: "ha-card {\n  background: transparent !important;\n  box-shadow: none !important;\n\
    \  border: none !important;\n  padding: 0 !important;\n  margin: 0 !important;\n\
    \  width: 100% !important;\n}\n.card-content {\n  padding: 0 !important;\n  margin:\
    \ 0 !important;\n  width: 100% !important;\n}\n"
entities:
- card_mod:
    style: ':host { --toggle-icon-width: 0px !important; }

      #head ha-icon, #head ha-icon-button { display: none !important; width: 0px !important;
      visibility: hidden !important; }

      div#head { display: block !important; width: 100% !important; padding: 0 !important;
      margin: 0 !important; }

      #head { padding: 0 !important; margin: 0 !important; width: 100% !important;
      cursor: pointer !important; }

      #head > * { width: 100% !important; max-width: 100% !important; }

      div#items { padding: 0 !important; margin: 0 !important; }

      '
  clickable: true
  entities:
  - name: CAMÉRA SALON
    styles:
      card:
      - background: none
      - border: none
      - padding: 10px 15px 5px 15px
      name:
      - color: rgba(255,255,255,0.4)
      - font-size: 10px
      - font-weight: 800
      - text-transform: uppercase
      - justify-self: start
    type: custom:button-card
  - custom_fields:
      cam:
        card:
          type: custom:webrtc-camera
          ui: false
          url: rtsp://!secret local_ip:8554/Salon
    styles:
      card:
      - margin: 0 0px 15px 0px
      - width: 100%
      - border-radius: 12px
      - overflow: hidden
      - border: 1px solid rgba(255,255,255,0.1)
      - padding: 0
      - background: black
      grid:
      - grid-template-areas: '"cam"'
      - grid-template-columns: 1fr
    tap_action:
      action: fire-dom-event
      browser_mod:
        data:
          content:
            cards:
            - type: custom:webrtc-camera
              ui: true
              url: rtsp://!secret local_ip:8554/Salon
            - card_mod:
                style: 'ha-card { background: rgba(0,0,0,0.3); border-radius: 12px;
                  border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; margin-bottom:
                  20px; }

                  '
              entities:
              - entity: switch.camera_salon_microphone_mute
                name: Désactiver Micro
              - entity: number.camera_salon_microphone_volume
                name: Volume Micro
              type: entities
            - cards:
              - icon: mdi:arrow-up
                styles:
                  card:
                  - background: rgba(255,255,255,0.15)
                  - border-radius: 50%
                  icon:
                  - color: white
                  - width: 30px
                tap_action:
                  action: call-service
                  service: button.press
                  service_data:
                    entity_id: button.camera_salon_move_up
                type: custom:button-card
                view_layout:
                  grid-area: up
              - icon: mdi:arrow-left
                styles:
                  card:
                  - background: rgba(255,255,255,0.15)
                  - border-radius: 50%
                  icon:
                  - color: white
                  - width: 30px
                tap_action:
                  action: call-service
                  service: button.press
                  service_data:
                    entity_id: button.camera_salon_move_left
                type: custom:button-card
                view_layout:
                  grid-area: left
              - icon: mdi:arrow-right
                styles:
                  card:
                  - background: rgba(255,255,255,0.15)
                  - border-radius: 50%
                  icon:
                  - color: white
                  - width: 30px
                tap_action:
                  action: call-service
                  service: button.press
                  service_data:
                    entity_id: button.camera_salon_move_right
                type: custom:button-card
                view_layout:
                  grid-area: right
              - icon: mdi:arrow-down
                styles:
                  card:
                  - background: rgba(255,255,255,0.15)
                  - border-radius: 50%
                  icon:
                  - color: white
                  - width: 30px
                tap_action:
                  action: call-service
                  service: button.press
                  service_data:
                    entity_id: button.camera_salon_move_down
                type: custom:button-card
                view_layout:
                  grid-area: down
              layout:
                grid-gap: 15px
                grid-template-areas: '"  .    up    .  "

                  " left  .   right"

                  "  .   down   .  "

                  '
                grid-template-columns: 60px 60px 60px
                grid-template-rows: 60px 60px 60px
                place-content: center
              layout_type: grid
              type: custom:layout-card
            type: vertical-stack
          title: Live Salon
        service: browser_mod.popup
    type: custom:button-card
