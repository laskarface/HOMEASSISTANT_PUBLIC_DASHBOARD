# =========================================
# CARTE : pcmorgan_eteindre
# VUE   : dashboard
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - button.pcmorgan_eteindre
#  - button.press
#  - c.active
#  - c.color
#  - c.icon
#  - c.label
#  - c.name
#  - entity.state
#  - images.unsplash
#  - items.length
#  - items.push
#  - pathname.includes
#  - person.morgan
#  - search.includes
#  - state.to
#  - window.location
# =========================================

custom_fields:
  img: "[[[\n  const red = \"#ff1744\";\n  const svg = `\n    <svg viewBox=\"0 0 100\
    \ 100\" width=\"52\" height=\"52\" style=\"filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));\"\
    >\n      <defs>\n        <linearGradient id=\"metal\" x1=\"0%\" y1=\"0%\" x2=\"\
    100%\" y2=\"100%\">\n          <stop offset=\"0%\" style=\"stop-color:#ffffff;stop-opacity:1\"\
    \ />\n          <stop offset=\"100%\" style=\"stop-color:#bdbdbd;stop-opacity:1\"\
    \ />\n        </linearGradient>\n        <linearGradient id=\"screen\" x1=\"0%\"\
    \ y1=\"0%\" x2=\"0%\" y2=\"100%\">\n          <stop offset=\"0%\" style=\"stop-color:#263238;stop-opacity:1\"\
    \ />\n          <stop offset=\"100%\" style=\"stop-color:#111826;stop-opacity:1\"\
    \ />\n        </linearGradient>\n        <linearGradient id=\"glowRed\" x1=\"\
    0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n          <stop offset=\"0%\" style=\"\
    stop-color:#ff5252;stop-opacity:0.9\" />\n          <stop offset=\"100%\" style=\"\
    stop-color:#d50000;stop-opacity:1\" />\n        </linearGradient>\n      </defs>\n\
    \      <path d=\"M 25 74 L 51 74 L 47 70 L 29 70 Z\" fill=\"url(#metal)\" stroke=\"\
    #9e9e9e\" stroke-width=\"0.5\" />\n      <rect x=\"35\" y=\"58\" width=\"6\" height=\"\
    15\" fill=\"#e0e0e0\" stroke=\"#9e9e9e\" stroke-width=\"0.5\" />\n      <rect\
    \ x=\"8\" y=\"24\" width=\"60\" height=\"36\" rx=\"2\" fill=\"url(#metal)\" stroke=\"\
    #9e9e9e\" stroke-width=\"0.5\" />\n      <rect x=\"11\" y=\"27\" width=\"54\"\
    \ height=\"28\" fill=\"url(#screen)\" />\n      <path d=\"M 38 31 L 44 46 L 32\
    \ 46 Z\" fill=\"#ff1744\" opacity=\"0.95\" />\n      <rect x=\"37.2\" y=\"35\"\
    \ width=\"1.6\" height=\"5\" fill=\"white\" />\n      <circle cx=\"38\" cy=\"\
    43.5\" r=\"1\" fill=\"white\" />\n      <path d=\"M 11 27 L 65 27 L 65 42 L 11\
    \ 53 Z\" fill=\"white\" opacity=\"0.05\" />\n      <circle cx=\"63\" cy=\"57.5\"\
    \ r=\"0.8\" fill=\"#ff1744\" />\n      <rect x=\"74\" y=\"22\" width=\"18\" height=\"\
    54\" rx=\"2\" fill=\"url(#metal)\" stroke=\"#9e9e9e\" stroke-width=\"0.5\" />\n\
    \      <rect x=\"77\" y=\"25\" width=\"12\" height=\"42\" rx=\"1\" fill=\"url(#screen)\"\
    \ stroke=\"#757575\" stroke-width=\"0.5\" />\n      <rect x=\"77\" y=\"25\" width=\"\
    12\" height=\"42\" rx=\"1\" fill=\"url(#glowRed)\" opacity=\"0.35\" />\n     \
    \ <rect x=\"81\" y=\"28\" width=\"5\" height=\"2\" rx=\"0.5\" fill=\"#ffffff\"\
    \ opacity=\"0.9\" />\n      <rect x=\"81\" y=\"32\" width=\"5\" height=\"2\" rx=\"\
    0.5\" fill=\"#ffffff\" opacity=\"0.9\" />\n      <rect x=\"79\" y=\"45\" width=\"\
    10\" height=\"4\" rx=\"0.5\" fill=\"url(#metal)\" />\n      <path d=\"M 77 25\
    \ L 89 25 L 89 35 L 77 45 Z\" fill=\"white\" opacity=\"0.1\" />\n      <rect x=\"\
    89.5\" y=\"22\" width=\"3\" height=\"54\" fill=\"#757575\" />\n      <rect x=\"\
    90.5\" y=\"24\" width=\"1\" height=\"5\" rx=\"0.5\" fill=\"#424242\" />\n    \
    \  <circle cx=\"91\" cy=\"25\" r=\"0.5\" fill=\"#ff1744\" />\n      <rect x=\"\
    76\" y=\"76\" width=\"3\" height=\"2\" fill=\"#616161\" rx=\"0.5\" />\n      <rect\
    \ x=\"87\" y=\"76\" width=\"3\" height=\"2\" fill=\"#616161\" rx=\"0.5\" />\n\
    \    </svg>\n  `;\n  return `\n    <div style=\"width: 100%; height: 100%; display:\
    \ flex; flex-direction: column; align-items: center; justify-content: center;\
    \ background: linear-gradient(135deg, rgba(255, 23, 68, 0.25) 0%, rgba(255, 23,\
    \ 68, 0.05) 100%); border-top-left-radius: 20px; position: relative;\">\n    \
    \  <div style=\"position: absolute; width: 60px; height: 60px; background: ${red};\
    \ border-radius: 50%; filter: blur(25px); opacity: 0.35; animation: pulseGlow\
    \ 3s infinite alternate ease-in-out;\"></div>\n      <div style=\"position: relative;\
    \ z-index: 1;\">${svg}</div>\n      <div style=\"font-size: 8px; font-weight:\
    \ 900; color: white; text-transform: uppercase; letter-spacing: 1.2px; margin-top:\
    \ 5px; z-index: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.5);\">PC MORGAN</div>\n\
    \      <style>@keyframes pulseGlow { from { opacity: 0.2; transform: scale(0.85);\
    \ } to { opacity: 0.45; transform: scale(1.15); } }</style>\n    </div>\n  `;\n\
    ]]]\n"
  info: "[[[\n  var isEditMode = window.location.search.includes('edit=1') || window.location.pathname.includes('edit');\n\
    \  var pcIsOn = entity && entity.state !== 'unavailable' && entity.state !== 'unknown';\n\
    \  var morgan = states['person.morgan'] ? states['person.morgan'].state.toLowerCase()\
    \ : 'home';\n  var hour = new Date().getHours();\n  var isLate = (hour >= 0 &&\
    \ hour <= 6); \n  var alertActive = pcIsOn && (morgan !== 'home' || isLate);\n\
    \  \n  const bgImg = \"https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=500&auto=format&fit=crop\"\
    ;\n  const bgHtml = `<div style=\"position:absolute; top:0; left:0; width:100%;\
    \ height:100%; background:url('${bgImg}') center/cover no-repeat; opacity:0.25;\
    \ z-index:0; filter: contrast(1.2) brightness(0.8) sepia(1) hue-rotate(-50deg);\"\
    ></div>`;\n  \n  var items = [];\n  if (alertActive) {\n    let reason = \"Anomalie\
    \ détectée\";\n    if (morgan !== 'home') reason = \"Morgan absent !\";\n    else\
    \ if (isLate) reason = \"Allumé la nuit !\";\n    items.push({ name: 'ÉTEINDRE\
    \ LE PC', label: reason, icon: 'mdi:power', color: '#ff1744', active: true });\n\
    \  }\n  \n  if (items.length === 0 && isEditMode) {\n    const statusText = pcIsOn\
    \ ? \"ALLUMÉ\" : \"ÉTEINT\";\n    const statusColor = pcIsOn ? \"#4caf50\" : \"\
    rgba(255,255,255,0.4)\";\n    return bgHtml + `\n      <div style=\"display: flex;\
    \ flex-direction: column; align-items: center; justify-content: center; height:\
    \ 100%; width: 100%; position: relative; z-index: 1;\">\n        <div style=\"\
    color: ${statusColor}; font-size: 16px; font-weight: 900; letter-spacing: 1.5px;\
    \ text-transform: uppercase; text-shadow: 0 0 10px rgba(0,0,0,0.5);\">PC ${statusText}</div>\n\
    \        <div style=\"color: rgba(255,255,255,0.3); font-size: 9px; font-weight:\
    \ 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;\">(Mode\
    \ Édition)</div>\n      </div>\n    `;\n  }\n  \n  if (items.length === 0) return\
    \ bgHtml;\n  \n  var html = bgHtml + '<style>@keyframes pulse-icon { 0% { transform:\
    \ scale(1); filter: drop-shadow(0 0 2px currentColor); } 50% { transform: scale(1.15);\
    \ filter: drop-shadow(0 0 10px currentColor); } 100% { transform: scale(1); filter:\
    \ drop-shadow(0 0 2px currentColor); } } @keyframes glow-box { 0% { box-shadow:\
    \ 0 0 5px rgba(255, 23, 68, 0.2); } 50% { box-shadow: 0 0 15px rgba(255, 23, 68,\
    \ 0.6); } 100% { box-shadow: 0 0 5px rgba(255, 23, 68, 0.2); } }</style>';\n \
    \ html += '<div style=\"display: flex; gap: 12px; align-items: center; justify-content:\
    \ center; height: 100%; padding: 0 15px 0 10px; position: relative; z-index: 1;\"\
    >';\n  \n  for (var i = 0; i < items.length; i++) {\n    var c = items[i];\n \
    \   var bg = `linear-gradient(145deg, rgba(20,27,38,0.85) 0%, ${c.color}30 100%)`;\n\
    \    var shadow = c.active ? 'animation: glow-box 3s infinite ease-in-out;' :\
    \ '';\n    html += `<div style=\"flex: 1; height: 62px; border-radius: 14px; background:\
    \ ${bg}; border: 1px solid ${c.color}70; ${shadow} display: flex; flex-direction:\
    \ column; justify-content: center; align-items: center; backdrop-filter: blur(5px);\"\
    >`;\n    var iconAnim = c.active ? 'animation: pulse-icon 1.5s infinite ease-in-out;'\
    \ : '';\n    html += `<ha-icon icon=\"${c.icon}\" style=\"--mdc-icon-size: 24px;\
    \ color: ${c.color}; margin-bottom: 4px; ${iconAnim}\"></ha-icon>`;\n    html\
    \ += `<div style=\"font-size: 11px; font-weight: 900; color: white; line-height:\
    \ 1.1; letter-spacing: 0.5px; text-transform: uppercase;\">${c.name}</div>`;\n\
    \    html += `<div style=\"font-size: 9px; color: rgba(255,255,255,0.8); font-weight:\
    \ 600; text-transform: uppercase; margin-top: 3px; text-align: center; padding:\
    \ 0 2px;\">${c.label}</div>`;\n    html += '</div>';\n  }\n  return html + '</div>';\n\
    ]]]\n"
entity: button.pcmorgan_eteindre
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: 1px solid rgba(255, 23, 68, 0.55)
  - box-shadow: 0 0 15px rgba(255, 23, 68, 0.3), 0 4px 15px rgba(0,0,0,0.4)
  - overflow: hidden
  - margin: 0px
  - box-sizing: border-box
  - position: relative
  - display: "[[[\n  var isEditMode = window.location.search.includes('edit=1') ||\
      \ window.location.pathname.includes('edit');\n  var pcIsOn = entity && entity.state\
      \ !== 'unavailable' && entity.state !== 'unknown';\n  var morgan = states['person.morgan']\
      \ ? states['person.morgan'].state.toLowerCase() : 'home';\n  var hour = new\
      \ Date().getHours();\n  var isLate = (hour >= 0 && hour <= 6); \n  var alertActive\
      \ = pcIsOn && (morgan !== 'home' || isLate);\n  \n  if (isEditMode || alertActive)\
      \ return 'flex';\n  return 'none !important';\n]]]\n"
  custom_fields:
    img:
    - justify-self: stretch
    - align-self: stretch
    - border-right: 2px solid rgba(255,255,255,0.6)
    - padding: 0
    - position: relative
    - z-index: 2
    info:
    - justify-self: stretch
    - align-self: stretch
    - width: 100%
    - box-sizing: border-box
    - position: relative
    - overflow: hidden
  grid:
  - grid-template-areas: '"img info"'
  - grid-template-columns: 130px minmax(0, 1fr)
  - grid-template-rows: 85px
  - align-items: stretch
tap_action:
  action: call-service
  confirmation:
    text: 🔌 Ordre d'extinction distant (Fermeture dans 60s). Confirmer ?
  haptic: heavy
  service: button.press
  target:
    entity_id: button.pcmorgan_eteindre
triggers_update:
- button.pcmorgan_eteindre
- person.morgan
type: custom:button-card
