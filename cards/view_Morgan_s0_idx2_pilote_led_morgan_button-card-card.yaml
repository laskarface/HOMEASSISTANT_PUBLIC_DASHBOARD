# =========================================
# CARTE : pilote_led_morgan
# VUE   : Morgan
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - light.pilote_led_morgan
#  - nt.state
# =========================================

custom_fields:
  main: "[[[\n  // Récupération de la BONNE entité lumière pour Momo\n  const lightEnt\
    \ = states['light.pilote_led_morgan'];\n  const isOn = lightEnt && lightEnt.state\
    \ === 'on';\n\n  // Le texte (ici \"ALLUMÉES\" ou \"ÉTEINTES\" pour \"Les Leds\"\
    )\n  const stateText = isOn ? \"ALLUMÉES\" : \"ÉTEINTES\";\n  \n  // Couleurs\
    \ statiques pour le côté DROIT (ne bouge plus)\n  const offColor = \"rgba(255,\
    \ 255, 255, 0.3)\";\n  const rightTextColor = isOn ? \"white\" : offColor;\n\n\
    \  // Injection de feuilles de style dynamiques (uniquement si allumé)\n  let\
    \ rgbStyles = \"\";\n  let classLeftBg = \"\";\n  let classIcon = \"\";\n  let\
    \ classText = \"\";\n\n  if (isOn) {\n    classLeftBg = \"rgb-bg-left-momo\";\n\
    \    classIcon = \"rgb-icon-momo\";\n    classText = \"rgb-text-momo\";\n    rgbStyles\
    \ = `\n      <style>\n        @keyframes pulseRgbMomoIcon {\n          0%   {\
    \ color: #ff0000; filter: drop-shadow(0 0 8px rgba(255,0,0,0.6)); }\n        \
    \  16%  { color: #ff00ff; filter: drop-shadow(0 0 8px rgba(255,0,255,0.6)); }\n\
    \          33%  { color: #0000ff; filter: drop-shadow(0 0 8px rgba(0,0,255,0.6));\
    \ }\n          50%  { color: #00ffff; filter: drop-shadow(0 0 8px rgba(0,255,255,0.6));\
    \ }\n          66%  { color: #00ff00; filter: drop-shadow(0 0 8px rgba(0,255,0,0.6));\
    \ }\n          83%  { color: #ffff00; filter: drop-shadow(0 0 8px rgba(255,255,0,0.6));\
    \ }\n          100% { color: #ff0000; filter: drop-shadow(0 0 8px rgba(255,0,0,0.6));\
    \ }\n        }\n        @keyframes pulseRgbMomoBgLeft {\n          0%   { background:\
    \ linear-gradient(135deg, rgba(255,0,0,0.25) 0%, transparent 100%); }\n      \
    \    16%  { background: linear-gradient(135deg, rgba(255,0,255,0.25) 0%, transparent\
    \ 100%); }\n          33%  { background: linear-gradient(135deg, rgba(0,0,255,0.25)\
    \ 0%, transparent 100%); }\n          50%  { background: linear-gradient(135deg,\
    \ rgba(0,255,255,0.25) 0%, transparent 100%); }\n          66%  { background:\
    \ linear-gradient(135deg, rgba(0,255,0,0.25) 0%, transparent 100%); }\n      \
    \    83%  { background: linear-gradient(135deg, rgba(255,255,0,0.25) 0%, transparent\
    \ 100%); }\n          100% { background: linear-gradient(135deg, rgba(255,0,0,0.25)\
    \ 0%, transparent 100%); }\n        }\n        /* Application des animations (durée\
    \ 8 secondes) */\n        .rgb-icon-momo    { animation: pulseRgbMomoIcon 8s linear\
    \ infinite; }\n        .rgb-bg-left-momo { animation: pulseRgbMomoBgLeft 8s linear\
    \ infinite; }\n      </style>\n    `;\n  }\n\n  return `\n    ${rgbStyles}\n \
    \   <div style=\"display: flex; width: 100%; height: 100%; margin: 0; padding:\
    \ 0;\">\n      \n      <!-- BLOC GAUCHE : 130px, Icône et Nom (Seule partie animée\
    \ en RGB quand ALLUMÉ) -->\n      <div class=\"${classLeftBg}\" style=\"flex:\
    \ 0 0 130px; height: 100%; display: flex; flex-direction: column; justify-content:\
    \ center; align-items: center; border-right: 1px solid rgba(255,255,255,0.1);\
    \ transition: background 0.5s; margin: 0; padding: 0; box-sizing: border-box;\
    \ ${!isOn ? 'background: transparent;' : ''}\">\n        <ha-icon icon=\"mdi:led-strip-variant\"\
    \ class=\"${classIcon}\" style=\"width: 24px; height: 24px; color: ${offColor};\
    \ margin-bottom: 2px; transition: all 0.5s;\"></ha-icon>\n        <div style=\"\
    font-size: 9px; font-weight: 800; color: ${isOn ? 'white' : 'rgba(255,255,255,0.5)'};\
    \ text-transform: uppercase; letter-spacing: 1px; text-align: center; margin:\
    \ 0; line-height: 1.2; transition: all 0.5s;\">LEDS<br>MOMO</div>\n      </div>\n\
    \      \n      <!-- BLOC MILIEU (Prend tout le reste) : État STATIQUE épuré -->\n\
    \      <div style=\"flex: 1; height: 100%; display: flex; flex-direction: column;\
    \ justify-content: center; align-items: center; background: transparent; transition:\
    \ all 0.5s; margin: 0; padding: 0; box-sizing: border-box;\">\n        <span style=\"\
    font-size: 20px; font-weight: 900; color: ${rightTextColor}; letter-spacing: 1px;\
    \ line-height: 1; transition: color 0.5s;\">${stateText}</span>\n      </div>\n\
    \      \n    </div>\n  `;\n]]]\n"
entity: light.pilote_led_morgan
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: 1px solid rgba(255, 255, 255, 0.1)
  - box-shadow: 0 4px 15px rgba(0,0,0,0.2)
  - overflow: hidden
  - margin-top: 8px
  - cursor: pointer
  custom_fields:
    main:
    - justify-self: stretch
    - align-self: stretch
    - padding: 0
    - height: 100%
    - margin: 0
  grid:
  - grid-template-areas: '"main"'
  - grid-template-columns: 1fr
  - grid-template-rows: 64px
  - margin: 0
  - gap: 0
tap_action:
  action: toggle
type: custom:button-card
