# =========================================
# CARTE : pilote_led_morgan
# VUE   : Lumieres
# TYPE  : custom:mod-card (Carte monobloc)
# DÉPENDANCES :
#  - entity.state
#  - light.pilote_led_morgan
#  - nt.state
# =========================================

card:
  cards:
  - card_mod:
      style: ':host { flex: 1 1 0 !important; }

        '
    custom_fields:
      main: "[[[\n  const lightEnt = states['light.pilote_led_morgan'];\n  const isOn\
        \ = lightEnt && lightEnt.state === 'on';\n  const offColor = \"rgba(255,255,255,0.3)\"\
        ;\n  const rightTextColor = isOn ? \"white\" : offColor;\n  const stateText\
        \ = isOn ? \"ALLUMÉE\" : \"ÉTEINTE\";\n\n  let rgbStyles = \"\";\n  let classLeftBg\
        \ = \"\";\n  let classIcon = \"\";\n  let classCenterBg = \"\";\n\n  if (isOn)\
        \ {\n    classLeftBg = \"rb-bg-l\";\n    classIcon = \"rb-ic\";\n    classCenterBg\
        \ = \"rb-bg-c\";\n    rgbStyles = `<style>\n      @keyframes pulseRgbMomoIcon\
        \ {\n        0%{color:#ff0000;filter:drop-shadow(0 0 6px rgba(255,0,0,0.8));}\n\
        \        16%{color:#ff00ff;filter:drop-shadow(0 0 6px rgba(255,0,255,0.8));}\n\
        \        33%{color:#0000ff;filter:drop-shadow(0 0 6px rgba(0,0,255,0.8));}\n\
        \        50%{color:#00ffff;filter:drop-shadow(0 0 6px rgba(0,255,255,0.8));}\n\
        \        66%{color:#00ff00;filter:drop-shadow(0 0 6px rgba(0,255,0,0.8));}\n\
        \        83%{color:#ffff00;filter:drop-shadow(0 0 6px rgba(255,255,0,0.8));}\n\
        \        100%{color:#ff0000;filter:drop-shadow(0 0 6px rgba(255,0,0,0.8));}\n\
        \      }\n      @keyframes pulseRgbMomo2BgL {\n        0%{background:linear-gradient(135deg,rgba(255,0,0,0.3)\
        \ 0%,transparent 100%);}\n        16%{background:linear-gradient(135deg,rgba(255,0,255,0.3)\
        \ 0%,transparent 100%);}\n        33%{background:linear-gradient(135deg,rgba(0,0,255,0.3)\
        \ 0%,transparent 100%);}\n        50%{background:linear-gradient(135deg,rgba(0,255,255,0.3)\
        \ 0%,transparent 100%);}\n        66%{background:linear-gradient(135deg,rgba(0,255,0,0.3)\
        \ 0%,transparent 100%);}\n        83%{background:linear-gradient(135deg,rgba(255,255,0,0.3)\
        \ 0%,transparent 100%);}\n        100%{background:linear-gradient(135deg,rgba(255,0,0,0.3)\
        \ 0%,transparent 100%);}\n      }\n      @keyframes pulseRgbMomo2Center {\n\
        \        0%{background:radial-gradient(ellipse at center,rgba(255,0,0,0.22)\
        \ 0%,transparent 65%); text-shadow:0 0 12px rgba(255,0,0,1);}\n        16%{background:radial-gradient(ellipse\
        \ at center,rgba(255,0,255,0.22) 0%,transparent 65%); text-shadow:0 0 12px\
        \ rgba(255,0,255,1);}\n        33%{background:radial-gradient(ellipse at center,rgba(0,0,255,0.22)\
        \ 0%,transparent 65%); text-shadow:0 0 12px rgba(0,0,255,1);}\n        50%{background:radial-gradient(ellipse\
        \ at center,rgba(0,255,255,0.22) 0%,transparent 65%); text-shadow:0 0 12px\
        \ rgba(0,255,255,1);}\n        66%{background:radial-gradient(ellipse at center,rgba(0,255,0,0.22)\
        \ 0%,transparent 65%); text-shadow:0 0 12px rgba(0,255,0,1);}\n        83%{background:radial-gradient(ellipse\
        \ at center,rgba(255,255,0,0.22) 0%,transparent 65%); text-shadow:0 0 12px\
        \ rgba(255,255,0,1);}\n        100%{background:radial-gradient(ellipse at\
        \ center,rgba(255,0,0,0.22) 0%,transparent 65%); text-shadow:0 0 12px rgba(255,0,0,1);}\n\
        \      }\n      .rb-bg-l { animation: pulseRgbMomo2BgL 8s linear infinite;\
        \ }\n      .rb-bg-c { animation: pulseRgbMomo2Center 8s linear infinite; }\n\
        \      .rb-ic { animation: pulseRgbMomoIcon 8s linear infinite; }\n    </style>`;\n\
        \  }\n\n  return `\n    ${rgbStyles}\n    <div style=\"display:flex;width:100%;height:100%;margin:0;padding:0;align-items:center;\"\
        >\n      <div class=\"${classLeftBg}\" style=\"flex:0 0 130px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;border-right:1px\
        \ solid rgba(255,255,255,0.1);margin:0;box-sizing:border-box;\">\n       \
        \ <ha-icon icon=\"mdi:led-strip-variant\" class=\"${classIcon}\" style=\"\
        width:20px;height:20px;color:${isOn?'white':'rgba(255,255,255,0.3)'};display:block;\"\
        ></ha-icon>\n        <div style=\"font-size:8px;font-weight:950;color:${isOn?'white':'rgba(255,255,255,0.5)'};text-transform:uppercase;letter-spacing:1px;text-align:center;line-height:1;\"\
        >LEDS MOMO</div>\n      </div>\n      <div class=\"${classCenterBg}\" style=\"\
        flex:1;height:100%;display:flex;justify-content:center;align-items:center;margin:0;box-sizing:border-box;\"\
        >\n        <span style=\"font-size:16px;font-weight:950;color:${rightTextColor};letter-spacing:1px;\"\
        >${stateText}</span>\n      </div>\n    </div>`;\n]]]\n"
    entity: light.pilote_led_morgan
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: transparent
      - box-shadow: none
      - border: none
      - border-radius: 0
      - overflow: hidden
      - cursor: pointer
      - height: 52px
      custom_fields:
        main:
        - justify-self: stretch
        - align-self: stretch
        - padding: 0
        - height: 100%
        - margin: 0
      grid:
      - grid-template-areas: '"main"'
      - grid-template-columns: 1fr
      - grid-template-rows: 52px
      - margin: 0
      - gap: 0
    tap_action:
      action: toggle
    type: custom:button-card
  - card_mod:
      style: ':host { flex: 0 0 54px !important; }

        ha-card { display: flex !important; align-items: center !important; justify-content:
        center !important; }

        '
    custom_fields:
      m: "[[[\n  const on = entity.state === 'on';\n  const size = on ? 34 : 28;\n\
        \  const op = on ? '0.22' : '0.08';\n  const bord = on ? '0.6' : '0.15';\n\
        \  const svgSize = size * 0.55;\n  return `<div style=\"width:${size}px;height:${size}px;border-radius:50%;\n\
        \    background:rgba(255,255,255,${op});\n    border:1px solid rgba(255,255,255,${bord});\n\
        \    display:flex;align-items:center;justify-content:center;transition:all\
        \ 0.4s;\">\n    <ha-icon icon=\"mdi:cog\" style=\"--mdc-icon-size: ${svgSize}px;\
        \ color: rgba(255,255,255,${on?'1':'0.4'});\"></ha-icon>\n  </div>`;\n]]]\n"
    entity: light.pilote_led_morgan
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - border: none
      - border-left: 1px solid rgba(255,255,255,0.08)
      - border-radius: 0
      - padding: 0
      - height: 52px
      grid:
      - grid-template-areas: '"m"'
    tap_action:
      action: more-info
    type: custom:button-card
  type: horizontal-stack
card_mod:
  style: "ha-card {\n  /* Style Glassmorphism Raffiné */\n  background: rgba(10, 15,\
    \ 25, 0.8) !important;\n  backdrop-filter: blur(15px) !important;\n  -webkit-backdrop-filter:\
    \ blur(15px) !important;\n  border-radius: 20px !important;\n  \n  /* Bordure\
    \ Dynamique fine avec lueur orange si allumé */\n  border: 1px solid\n    {% if\
    \ states('light.pilote_led_morgan') == 'on' %}\n      rgba(255, 152, 0, 0.6)\n\
    \    {% else %}\n      rgba(255, 255, 255, 0.12)\n    {% endif %} !important;\n\
    \  \n  /* box-shadow profond */\n  box-shadow:\n    {% if states('light.pilote_led_morgan')\
    \ == 'on' %}\n      0 0 25px rgba(255, 152, 0, 0.25), 0 8px 32px rgba(0, 0, 0,\
    \ 0.6)\n    {% else %}\n      0 8px 32px rgba(0, 0, 0, 0.5)\n    {% endif %} !important;\n\
    \    \n  overflow: hidden !important;\n  margin-top: 8px !important;\n  padding:\
    \ 0 !important;\n}\n"
type: custom:mod-card
