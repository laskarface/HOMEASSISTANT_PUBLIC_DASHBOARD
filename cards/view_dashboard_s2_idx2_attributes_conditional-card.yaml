# =========================================
# CARTE : attributes
# VUE   : dashboard
# TYPE  : conditional (Carte monobloc)
# DÉPENDANCES :
#  - attr.packages
#  - base_text.split
#  - entity.attributes
#  - entity.state
#  - error.message
#  - images.unsplash
#  - packages.for
#  - packages.length
#  - pkg.friendly_name
#  - pkg.info_text
#  - pkg.status
#  - pkg.tracking_number
#  - rray.is
#  - sensor.colis_17track_actifs
#  - variables.color
# =========================================

card:
  card_mod:
    style: 'div#head { display: block !important; width: 100% !important; padding:
      0 !important; margin: 0 !important; --toggle-icon-width: 0px !important; } #head
      { padding: 0 !important; margin: 0 !important; width: 100% !important; cursor:
      pointer !important; pointer-events: auto !important; } #head ha-icon { display:
      none !important; width: 0px !important; } div#items { padding: 0 !important;
      margin: 0 !important; }

      '
  clickable: true
  entities:
  - custom_fields:
      details: "[[[\n  try {\n    if (!entity) return `<div style=\"color:red; padding:10px;\"\
        >Entité en cours de chargement...</div>`;\n    const attr = entity.attributes\
        \ || {}; const packages = attr.packages;\n    if (!packages || !Array.isArray(packages)\
        \ || packages.length === 0) { return `<div style=\"color: rgba(255,255,255,0.7);\
        \ font-size: 13px; text-align: center; padding: 20px 0;\">Aucun colis en attente.</div>`;\
        \ }\n    const trad_status = { \"In Transit\": \"En transit\", \"Not Found\"\
        : \"Introuvable\", \"Expired\": \"Expiré\", \"Ready to be picked up\": \"\
        À retirer\", \"Undelivered\": \"Non distribué\", \"Alert\": \"Alerte\", \"\
        Delivered\": \"Livré\", \"Pending\": \"En attente\" };\n    const trad_phrases\
        \ = { \"Departed from departure country/region\": \"Départ du pays d’origine\"\
        , \"Left from departure country/region\": \"Colis parti du pays d’origine\"\
        , \"Destination country/region arrived\": \"Arrivé dans le pays de destination\"\
        , \"Arrived at sorting center\": \"Arrivé au centre de tri\", \"Item dispatched\"\
        : \"Colis expédié\", \"Out for delivery\": \"En cours de livraison\", \"Shipment\
        \ information received\": \"Informations d’expédition reçues\", \"Handed over\
        \ from linehaul office\": \"Pris en charge par le hub principal\", \"At destination\
        \ country/region\": \"dans le pays de destination\" };\n    let html = '<div\
        \ style=\"display: flex; flex-direction: column; gap: 12px; margin-top: 10px;\"\
        >';\n    packages.forEach(pkg => {\n      const name = pkg.friendly_name ||\
        \ pkg.tracking_number || \"Colis inconnu\";\n      const status_en = pkg.status\
        \ || \"\"; const status_fr = trad_status[status_en] || status_en || \"Inconnu\"\
        ;\n      let base_text = String(pkg.info_text || \"\").replace(/\\n/g, ' ').replace('Carrier\
        \ note:', '').trim();\n      for (const eng in trad_phrases) { base_text =\
        \ base_text.split(eng).join(trad_phrases[eng]); }\n      html += `<div style=\"\
        background:rgba(0,0,0,0.2);border-radius:12px;padding:12px;border:1px solid\
        \ rgba(255,255,255,0.05);\"><div style=\"color:white;font-weight:700;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;\"\
        >\U0001F4E6 <span style=\"letter-spacing:0.5px;white-space:normal;word-break:break-word;\"\
        >${name}</span></div><div style=\"color:rgba(255,255,255,0.8);font-size:12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;line-height:1.4;\"\
        ><span>✈️</span> <span style=\"flex:1;white-space:normal;word-break:break-word;\"\
        >${base_text}</span></div><div style=\"color:#FF9800;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;\"\
        ><span>\U0001F4CD</span> <span style=\"white-space:normal;word-break:break-word;\"\
        >Statut: ${status_fr}</span></div></div>`;\n    });\n    html += '</div>';\
        \ return html;\n  } catch (error) { return `<div style=\"color:#ff4444;font-family:monospace;font-size:11px;padding:10px;background:rgba(0,0,0,0.5);border-radius:8px;\"\
        >Erreur JS: ${error.message}</div>`; }\n]]]\n"
      title: '[[[ return `<div style="color:#FF9800;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;">SUIVI
        DES COLIS</div>`; ]]]

        '
    entity: sensor.colis_17track_actifs
    show_icon: false
    show_name: false
    styles:
      card:
      - background: rgba(20, 27, 38, 0.6)
      - border-radius: 20px
      - border: 1px solid rgba(255, 152, 0, 0.4)
      - margin-bottom: 20px
      - margin-top: 10px
      - padding: 0
      custom_fields:
        details:
        - justify-self: stretch
        - padding: 0 16px 16px 16px
        title:
        - justify-self: stretch
        - text-align: left
        - padding: 16px 16px 8px 16px
      grid:
      - grid-template-areas: '"title" "details"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content 1fr
    type: custom:button-card
  head:
    custom_fields:
      details: "[[[\n  const count = entity.state;\n  const color = variables.color;\n\
        \  const bgImg = \"https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=500&auto=format&fit=crop\"\
        ;\n  \n  return `\n    <div style=\"width:100%; height:100%; display:flex;\
        \ justify-content:center; align-items:center; padding:0 15px; box-sizing:border-box;\
        \ position: relative; overflow: hidden;\">\n      <!-- Image de fond isolée\
        \ pour ne pas impacter l'alignement -->\n      <div style=\"position: absolute;\
        \ top:0; left:0; width: 100%; height: 100%; background: url('${bgImg}') center\
        \ 80% / cover no-repeat; opacity: 0.25; z-index: 0;\"></div>\n      \n   \
        \   <!-- Contenu strictement identique à votre version d'origine -->\n   \
        \   <div style=\"width:280px; max-width:100%; display:flex; flex-direction:row;\
        \ align-items:center; justify-content:flex-start; gap:15px; box-sizing:border-box;\
        \ position: relative; z-index: 1;\">\n        <div style=\"font-size:38px;\
        \ font-weight:900; color:${color}; line-height:1; text-shadow:0 0 15px ${color}80;\
        \ transition:color 0.8s ease; min-width:40px; text-align:center;\">${count}</div>\n\
        \        <div style=\"display:flex; flex-direction:column; align-items:flex-start;\
        \ justify-content:center; flex:1;\">\n          <div style=\"font-size:13px;\
        \ font-weight:800; color:white; text-transform:uppercase; letter-spacing:1px;\
        \ line-height:1.2; white-space:normal;\">COLIS EN ATTENTE</div>\n        \
        \  <div style=\"font-size:11px; color:rgba(255,255,255,0.6); margin-top:4px;\
        \ display:flex; align-items:center; font-weight:600;\">SUIVI 17TRACK</div>\n\
        \        </div>\n      </div>\n    </div>`;\n]]]\n"
      footer: "[[[\n   return `<div style=\"display:flex; width:100%; justify-content:center;\
        \ align-items:center;\"><ha-icon icon=\"mdi:chevron-down\" style=\"color:\
        \ rgba(255,255,255,0.7); width: 18px; height: 18px;\"></ha-icon></div>`;\n\
        ]]]\n"
      icon: "[[[\n  const color = variables.color;\n  return `\n    <div style=\"\
        width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,${color}33\
        \ 0%,${color}0D 100%);border-top-left-radius:20px;box-sizing:border-box;position:relative;\"\
        >\n      <div style=\"position:absolute;width:50px;height:50px;background:${color};border-radius:50%;filter:blur(20px);opacity:0.3;animation:pulseGlow\
        \ 4s infinite alternate ease-in-out;\"></div>\n      <div style=\"font-size:32px;line-height:1;filter:drop-shadow(0\
        \ 0 10px ${color}80);display:flex;align-items:center;justify-content:center;z-index:1;\"\
        >\U0001F4E6</div>\n      <div style=\"font-size:10px;font-weight:900;color:white;text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;z-index:1;\"\
        >Livraisons</div>\n      <style>@keyframes pulseGlow { from{opacity:0.2;transform:scale(0.9);}to{opacity:0.4;transform:scale(1.1);}\
        \ }</style>\n    </div>`;\n]]]\n"
    entity: sensor.colis_17track_actifs
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
      - padding: 0
      - background: rgba(20, 27, 38, 0.6)
      - backdrop-filter: blur(10px)
      - -webkit-backdrop-filter: blur(10px)
      - border-radius: 20px
      - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
      - box-shadow: '[[[ return `0 0 20px ${variables.color}80, 0 8px 32px rgba(0,0,0,0.4)`;
          ]]]'
      - overflow: hidden
      - margin: 0px
      - height: 85px
      custom_fields:
        details:
        - justify-self: stretch
        - align-self: stretch
        - display: flex
        - flex-direction: column
        - justify-content: center
        - align-items: center
        - padding: 0
        - overflow: hidden
        - position: relative
        footer:
        - justify-self: stretch
        - align-self: stretch
        - background: rgba(0,0,0,0.2)
        - border-top: 1px solid rgba(255,255,255,0.05)
        - display: flex
        - align-items: center
        - justify-content: center
        - border-radius: 0 0 20px 20px
        - z-index: 2
        icon:
        - justify-self: stretch
        - align-self: stretch
        - border-right: 2px solid rgba(255,255,255,0.6)
        - border-top-left-radius: 20px
        - display: flex
        - align-items: center
        - justify-content: center
        - z-index: 2
      grid:
      - grid-template-areas: '"icon details" "footer footer"'
      - grid-template-columns: 130px minmax(0, 1fr)
      - grid-template-rows: 60px 25px
      - gap: 0px
      - width: 100%
      - margin: 0
    tap_action:
      action: none
    type: custom:button-card
    variables:
      color: '#FF9800'
  padding: 0
  type: custom:fold-entity-row
conditions:
- above: 0
  condition: numeric_state
  entity: sensor.colis_17track_actifs
type: conditional
