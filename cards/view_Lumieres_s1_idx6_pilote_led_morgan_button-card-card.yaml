# =========================================
# CARTE : pilote_led_morgan
# VUE   : Lumieres
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - ath.round
#  - entity.attributes
#  - entity.state
#  - images.pexels
#  - light.pilote_led_morgan
# =========================================

card_mod:
  style: "@keyframes rainbow-spin {\n  0% { filter: hue-rotate(0deg); }\n  100% {\
    \ filter: hue-rotate(360deg); }\n}\n"
custom_fields:
  left: "[[[\n  const on = entity.state === 'on';\n  const shadow = on ? 'drop-shadow(0\
    \ 0 10px rgba(255,255,255,0.9))' : 'none';\n  \n  let bgLayer = '';\n  if (on)\
    \ {\n    bgLayer = `\n      <div style=\"position: absolute; inset: -50%; background:\
    \ conic-gradient(red, yellow, lime, cyan, blue, magenta, red); animation: rainbow-spin\
    \ 4s linear infinite; opacity: 0.6; z-index: 0; pointer-events: none;\"></div>\n\
    \    `;\n  }\n  \n  return `\n    <div style=\"position: relative; width: 100%;\
    \ height: 100%; display: flex; flex-direction: column; align-items: center; justify-content:\
    \ center; border-right: 2px solid rgba(255,152,0,0.4); box-sizing: border-box;\
    \ overflow: hidden;\">\n      ${bgLayer}\n      <div style=\"z-index: 1; display:\
    \ flex; flex-direction: column; align-items: center; justify-content: center;\
    \ gap: 4px; pointer-events: none;\">\n        <ha-icon icon=\"mdi:led-strip-variant\"\
    \ style=\"width: 24px; height: 24px; color: white; filter: ${shadow};\"></ha-icon>\n\
    \        <div style=\"font-size: 10px; font-weight: 950; text-transform: uppercase;\
    \ letter-spacing: 1.5px; color: white; line-height: 1; text-align: center; text-shadow:\
    \ 0 1px 3px rgba(0,0,0,0.8);\">LEDS MOMO</div>\n      </div>\n    </div>\n  `;\n\
    ]]]\n"
  right: "[[[\n  const on = entity.state === 'on';\n  const bri = on && entity.attributes.brightness\n\
    \    ? Math.round((entity.attributes.brightness / 255) * 100)\n    : 0;\n  \n\
    \  const rgb = on && entity.attributes.rgb_color;\n  const c = rgb ? `${rgb[0]},${rgb[1]},${rgb[2]}`\
    \ : '255,152,0';\n  \n  // Image d'ambiance Gaming/RGB (Pexels stable)\n  const\
    \ bgImg = \"https://images.pexels.com/photos/4581902/pexels-photo-4581902.jpeg?auto=compress&cs=tinysrgb&w=500\"\
    ;\n  // Correction CONTRASTE et LUMINOSITÉ pour éviter le voile blanc\n  const\
    \ bgHtml = `<div style=\"position: absolute; inset: 0; background: url('${bgImg}')\
    \ center center / cover no-repeat; opacity: 0.35; z-index: 0; filter: contrast(1.4)\
    \ brightness(0.6) saturate(1.5);\"></div>`;\n\n  return bgHtml + `\n    <div style=\"\
    position: relative; width: 100%; height: 100%; z-index: 1; pointer-events: none;\
    \ background: rgba(0,0,0,0.25);\">\n      <div style=\"\n        position: absolute;\
    \ top: 0; left: 0; height: 100%; width: ${bri}%;\n        background: linear-gradient(90deg,\
    \ rgba(${c}, 0.1) 0%, rgba(${c}, 0.45) 100%);\n        transition: width 0.4s\
    \ ease-out;\n        z-index: 1;\n      \"></div>\n      <div style=\"position:\
    \ absolute; inset: 0; display: flex; align-items: center; justify-content: center;\
    \ z-index: 2; padding: 0 15px;\">\n        <span style=\"font-size: 13px; font-weight:\
    \ 950; color: white; text-shadow: 0 2px 10px rgba(0,0,0,1); white-space: nowrap;\
    \ letter-spacing: 1.2px; text-transform: uppercase;\">\n          ${on ? '✦ MORGAN\
    \ : ' + bri + '% ✦' : 'CHAMBRE ÉTEINTE'}\n        </span>\n      </div>\n    </div>`;\n\
    ]]]\n"
entity: light.pilote_led_morgan
show_icon: false
show_name: false
styles:
  card:
  - height: 62px
  - padding: 0
  - border-radius: 20px
  - border: 1.5px solid rgba(255, 152, 0, 0.6)
  - background: rgba(10, 15, 25, 0.85)
  - backdrop-filter: blur(8px)
  - -webkit-backdrop-filter: blur(8px)
  - box-shadow: 0 4px 15px rgba(0,0,0,0.4)
  - overflow: hidden
  custom_fields:
    left:
    - justify-self: stretch
    - align-self: stretch
    - z-index: 2
    right:
    - justify-self: stretch
    - align-self: stretch
    - position: relative
    - overflow: hidden
    - z-index: 1
  grid:
  - grid-template-areas: '"left right"'
  - grid-template-columns: 130px 1fr
  - grid-template-rows: 100%
tap_action:
  action: toggle
type: custom:button-card
