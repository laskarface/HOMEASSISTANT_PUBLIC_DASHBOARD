# =========================================
# CARTE : color
# VUE   : dashboard
# TYPE  : custom:fold-entity-row (Carte monobloc)
# DÉPENDANCES :
#  - button.boite_a_lettres_start_rtsp_stream
#  - button.portail_start_rtsp_stream
#  - button.press
#  - camera.camera_boite_a_lettres
#  - camera.camera_portail
#  - image.boite_a_lettres_event_image
#  - image.portail_event_image
#  - images.unsplash
#  - sensor.camera_boite_a_lettre_batterie
#  - sensor.camera_portail_batterie
#  - variables.color
# =========================================

card_mod:
  style: "div#head { \n  display: block !important; \n  width: 100% !important; \n\
    \  padding: 0 !important; \n  margin: 0 !important; \n  --toggle-icon-width: 0px\
    \ !important; \n}\n#head { \n  padding: 0 !important; \n  margin: 0 !important;\
    \ \n  width: 100% !important; \n  cursor: pointer !important; \n}\n#head ha-icon\
    \ { display: none !important; }\ndiv#items { padding: 0 !important; margin: 0\
    \ !important; }\n"
clickable: true
entities:
- card:
    cards:
    - cards:
      - icon: mdi:play
        name: ACTIVER
        show_icon: true
        styles:
          card:
          - background: rgba(0, 200, 83, 0.2)
          - border: 1px solid rgba(0, 200, 83, 0.4)
          - border-radius: 8px
          - height: 40px
          - margin-bottom: 8px
          icon:
          - color: '#00C853'
          - width: 18px
          name:
          - font-size: 11px
          - font-weight: 800
          - color: white
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.portail_start_rtsp_stream
        type: custom:button-card
      - entity: image.portail_event_image
        show_entity_picture: true
        show_name: false
        styles:
          card:
          - height: 120px
          - border-radius: 12px
          - border: 1px solid rgba(255, 255, 255, 0.1)
          - overflow: hidden
          entity_picture:
          - width: 100%
          - height: 100%
          - object-fit: cover
        tap_action:
          action: more-info
          entity: camera.camera_portail
        type: custom:button-card
      type: vertical-stack
    - cards:
      - icon: mdi:play
        name: ACTIVER
        show_icon: true
        styles:
          card:
          - background: rgba(0, 200, 83, 0.2)
          - border: 1px solid rgba(0, 200, 83, 0.4)
          - border-radius: 8px
          - height: 40px
          - margin-bottom: 8px
          icon:
          - color: '#00C853'
          - width: 18px
          name:
          - font-size: 11px
          - font-weight: 800
          - color: white
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.boite_a_lettres_start_rtsp_stream
        type: custom:button-card
      - entity: image.boite_a_lettres_event_image
        show_entity_picture: true
        show_name: false
        styles:
          card:
          - height: 120px
          - border-radius: 12px
          - border: 1px solid rgba(255, 255, 255, 0.1)
          - overflow: hidden
          entity_picture:
          - width: 100%
          - height: 100%
          - object-fit: cover
        tap_action:
          action: more-info
          entity: camera.camera_boite_a_lettres
        type: custom:button-card
      type: vertical-stack
    columns: 2
    square: false
    type: grid
  card_mod:
    style: 'ha-card { margin: 15px 10px; background: transparent; border: none; }'
  type: custom:mod-card
head:
  custom_fields:
    details: "[[[\n  const batP = states['sensor.camera_portail_batterie']?.state\
      \ || '?';\n  const batB = states['sensor.camera_boite_a_lettre_batterie']?.state\
      \ || '?';\n  const getCol = (s) => (parseInt(s) > 20 ? \"#00E676\" : \"#FF3232\"\
      );\n  const bgImg = \"https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=500&auto=format&fit=crop\"\
      ;\n  return `\n    <div style=\"width: 100%; height: 100%; position: relative;\
      \ overflow: hidden; display: flex; flex-direction: column; align-items: center;\
      \ justify-content: center;\">\n      <div style=\"position: absolute; top:0;\
      \ left:0; width: 100%; height: 100%; background: url('${bgImg}') center/cover\
      \ no-repeat; opacity: 0.25; z-index: 0;\"></div>\n      <div style=\"position:\
      \ relative; z-index: 1; text-align: center; width: 100%;\">\n        <div style=\"\
      font-size: 13px; font-weight: 950; color: white; text-transform: uppercase;\
      \ letter-spacing: 1px; margin-bottom: 2px; text-shadow: 0 4px 8px rgba(0,0,0,0.95);\"\
      >Extérieures</div>\n        <div style=\"display: flex; gap: 15px; align-items:\
      \ center; justify-content: center;\">\n          <div style=\"font-size: 10px;\
      \ color: rgba(255,255,255,0.85); font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.9);\"\
      >PORTAIL: <span style=\"color: ${getCol(batP)}; font-weight: 950;\">${batP}%</span></div>\n\
      \          <div style=\"font-size: 10px; color: rgba(255,255,255,0.85); font-weight:\
      \ 900; text-shadow: 0 2px 4px rgba(0,0,0,0.9);\">BAL: <span style=\"color: ${getCol(batB)};\
      \ font-weight: 950;\">${batB}%</span></div>\n        </div>\n      </div>\n\
      \    </div>\n  `;\n]]]\n"
    footer: '[[[ return `<div style="display:flex; width:100%; justify-content:center;
      padding: 5px;"><ha-icon icon="mdi:chevron-down" style="color:rgba(255,255,255,0.5);
      width:18px;"></ha-icon></div>`; ]]]

      '
    icon: "[[[\n  const color = variables.color;\n  const svg = `\n    <svg viewBox=\"\
      0 0 100 100\" width=\"42\" height=\"42\" style=\"filter: drop-shadow(0 4px 8px\
      \ rgba(0,0,0,0.5));\">\n      <path d=\"M50,65 L50,80 M40,80 L60,80\" stroke=\"\
      #ccc\" stroke-width=\"4\" stroke-linecap=\"round\" />\n      <rect x=\"25\"\
      \ y=\"25\" width=\"50\" height=\"40\" rx=\"10\" ry=\"10\" fill=\"white\" />\n\
      \      <circle cx=\"50\" cy=\"45\" r=\"15\" fill=\"#222\" />\n      <circle\
      \ cx=\"50\" cy=\"45\" r=\"10\" fill=\"black\" />\n      <circle cx=\"68\" cy=\"\
      33\" r=\"1.5\" fill=\"#00E676\" style=\"animation: blinkLED 2s infinite;\" />\n\
      \    </svg>\n  `;\n  return `\n    <div style=\"width: 100%; height: 100%; display:\
      \ flex; flex-direction: column; align-items: center; justify-content: center;\
      \ background: linear-gradient(135deg, ${color}33 0%, ${color}0D 100%);\">\n\
      \      <div style=\"position: relative;\">${svg}</div>\n      <div style=\"\
      font-size: 10px; font-weight: 950; color: white; text-transform: uppercase;\
      \ margin-top: 2px;\">Caméras</div>\n    </div>\n  `;\n]]]\n"
  show_icon: false
  show_name: false
  show_state: false
  styles:
    card:
    - padding: 0
    - background: rgba(20, 27, 38, 0.6)
    - backdrop-filter: blur(10px)
    - -webkit-backdrop-filter: blur(10px)
    - border-radius: 20px
    - border: '[[[ return `1px solid ${variables.color}80`; ]]]'
    - box-shadow: 0 8px 32px rgba(0,0,0,0.4)
    - height: 85px
    - overflow: hidden
    custom_fields:
      details:
      - justify-self: stretch
      - align-self: stretch
      - padding: 0
      - position: relative
      - overflow: hidden
      footer:
      - justify-self: stretch
      - align-self: stretch
      - background: rgba(0,0,0,0.2)
      - border-top: 1px solid rgba(255,255,255,0.05)
      - display: flex
      - align-items: center
      - justify-content: center
      - border-radius: 0 0 20px 20px
      - z-index: 2
      icon:
      - justify-self: stretch
      - align-self: stretch
      - border-right: 2px solid rgba(255,255,255,0.6)
      - border-top-left-radius: 20px
      - display: flex
      - align-items: center
      - justify-content: center
      - z-index: 2
    grid:
    - grid-template-areas: '"icon details" "footer footer"'
    - grid-template-columns: 130px minmax(0, 1fr)
    - grid-template-rows: 58px 27px
  type: custom:button-card
  variables:
    color: '#00d2ff'
padding: 0
type: custom:fold-entity-row
