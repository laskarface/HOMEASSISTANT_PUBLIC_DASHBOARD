# =========================================
# CARTE : inter_cuisine
# VUE   : Lumieres
# TYPE  : custom:mod-card (Carte monobloc)
# DÉPENDANCES :
#  - entity.state
#  - switch.inter_cellier
#  - switch.inter_cuisine
#  - switch.inter_toilettes_z
# =========================================

card:
  cards:
  - card_mod:
      style: "ha-card {\n  border-bottom: 1px solid rgba(255,255,255,0.08) !important;\n\
        \  border-radius: 0 !important;\n}\n"
    custom_fields:
      t: "[[[\n  return `<div style=\"display:flex;align-items:center;gap:10px;\"\
        >\n    <div style=\"width:3px;height:12px;border-radius:2px;background:linear-gradient(to\
        \ bottom,rgba(255,255,255,0.7),rgba(255,255,255,0.1));\"></div>\n    <span\
        \ style=\"font-size:10px;font-weight:950;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:2.5px;\"\
        >Cuisine, Toilettes & Cellier</span>\n  </div>`;\n]]]\n"
    show_icon: false
    show_name: false
    styles:
      card:
      - background: transparent
      - box-shadow: none
      - border: none
      - padding: 8px 16px
      - height: auto
      grid:
      - grid-template-areas: '"t"'
      - justify-items: start
    styles_extra:
      custom_fields:
        t:
        - justify-self: start
        - width: 100%
    tap_action:
      action: none
    type: custom:button-card
  - cards:
    - card_mod:
        style: ':host { flex: 1 1 0 !important; }

          ha-card { border-right: 1px solid rgba(255,255,255,0.08) !important; }

          '
      custom_fields:
        i: "[[[\n  const on = entity.state === 'on';\n  return `<svg viewBox=\"0 0\
          \ 56 56\" width=\"38\" height=\"38\" style=\"opacity:${on?'1':'0.25'};transition:opacity\
          \ 0.4s;display:block;margin:auto;\">\n    <line x1=\"28\" y1=\"4\" x2=\"\
          28\" y2=\"12\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\"\
          />\n    <ellipse cx=\"28\" cy=\"12\" rx=\"12\" ry=\"4\" fill=\"rgba(255,255,255,0.2)\"\
          \ stroke=\"white\" stroke-width=\"1.2\"/>\n    <path d=\"M16,12 Q10,22 6,34\
          \ Q28,40 50,34 Q46,22 40,12 Z\" fill=\"rgba(255,255,255,0.08)\" stroke=\"\
          white\" stroke-width=\"1.5\"/>\n    <circle cx=\"28\" cy=\"20\" r=\"4\"\
          \ fill=\"white\"/>\n  </svg>`;\n]]]\n"
      entity: switch.inter_cuisine
      name: Cuisine
      show_icon: false
      show_name: true
      styles:
        card:
        - background: "[[[\n  if (entity.state !== 'on') return 'transparent';\n \
            \ return 'radial-gradient(ellipse at center, rgba(255,220,120,0.3) 0%,\
            \ transparent 80%)';\n]]]\n"
        - box-shadow: none
        - border: none
        - border-radius: 0
        - padding: 8px 0
        - transition: background 0.5s ease
        grid:
        - grid-template-areas: '"i" "n"'
        name:
        - font-size: 9px
        - font-weight: 800
        - text-transform: uppercase
        - color: rgba(255,255,255,0.85)
        - margin-top: 5px
      tap_action:
        action: toggle
      type: custom:button-card
    - card_mod:
        style: ':host { flex: 1 1 0 !important; }

          ha-card { border-right: 1px solid rgba(255,255,255,0.08) !important; }

          '
      custom_fields:
        i: "[[[\n  const on = entity.state === 'on';\n  return `<svg viewBox=\"0 0\
          \ 56 56\" width=\"38\" height=\"38\" style=\"opacity:${on?'1':'0.25'};transition:opacity\
          \ 0.4s;display:block;margin:auto;\">\n    <path d=\"M22,30 Q18,24 18,20\
          \ A10,10 0 0,1 38,20 Q38,24 34,30 Z\" fill=\"rgba(255,255,255,0.1)\" stroke=\"\
          white\" stroke-width=\"1.5\"/>\n    <rect x=\"22\" y=\"30\" width=\"12\"\
          \ height=\"3\" rx=\"1\" fill=\"rgba(255,255,255,0.3)\"/>\n    <rect x=\"\
          20\" y=\"44\" width=\"16\" height=\"9\" rx=\"3\" fill=\"rgba(255,255,255,0.1)\"\
          \ stroke=\"white\" stroke-width=\"1.2\"/>\n    <rect x=\"24\" y=\"46\" width=\"\
          8\" height=\"5\" rx=\"2\" fill=\"${on?'rgba(255,220,100,0.95)':'rgba(255,255,255,0.3)'}\"\
          />\n  </svg>`;\n]]]\n"
      entity: switch.inter_toilettes_z
      name: Toilettes
      show_icon: false
      show_name: true
      styles:
        card:
        - background: "[[[\n  if (entity.state !== 'on') return 'transparent';\n \
            \ return 'radial-gradient(ellipse at center, rgba(255,220,120,0.3) 0%,\
            \ transparent 80%)';\n]]]\n"
        - box-shadow: none
        - border: none
        - border-radius: 0
        - padding: 8px 0
        - transition: background 0.5s ease
        grid:
        - grid-template-areas: '"i" "n"'
        name:
        - font-size: 9px
        - font-weight: 800
        - text-transform: uppercase
        - color: rgba(255,255,255,0.85)
        - margin-top: 5px
      tap_action:
        action: toggle
      type: custom:button-card
    - card_mod:
        style: ':host { flex: 1 1 0 !important; }

          '
      custom_fields:
        i: "[[[\n  const on = entity.state === 'on';\n  return `<svg viewBox=\"0 0\
          \ 56 56\" width=\"38\" height=\"38\" style=\"opacity:${on?'1':'0.25'};transition:opacity\
          \ 0.4s;display:block;margin:auto;\">\n    <rect x=\"22\" y=\"10\" width=\"\
          12\" height=\"6\" rx=\"2\" fill=\"rgba(255,255,255,0.2)\" stroke=\"white\"\
          \ stroke-width=\"1.2\"/>\n    <path d=\"M 22 16 L 34 16 C 42 16 46 24 46\
          \ 32 C 46 42 38 50 28 50 C 18 50 10 42 10 32 C 10 24 14 16 22 16 Z\" fill=\"\
          rgba(255,255,255,0.1)\" stroke=\"white\" stroke-width=\"1.5\"/>\n    <circle\
          \ cx=\"28\" cy=\"32\" r=\"5\" fill=\"white\"/>\n  </svg>`;\n]]]\n"
      entity: switch.inter_cellier
      name: Cellier
      show_icon: false
      show_name: true
      styles:
        card:
        - background: "[[[\n  if (entity.state !== 'on') return 'transparent';\n \
            \ return 'radial-gradient(ellipse at center, rgba(255,220,120,0.3) 0%,\
            \ transparent 80%)';\n]]]\n"
        - box-shadow: none
        - border: none
        - border-radius: 0
        - padding: 8px 0
        - transition: background 0.5s ease
        grid:
        - grid-template-areas: '"i" "n"'
        name:
        - font-size: 9px
        - font-weight: 800
        - text-transform: uppercase
        - color: rgba(255,255,255,0.85)
        - margin-top: 5px
      tap_action:
        action: toggle
      type: custom:button-card
    type: horizontal-stack
  type: vertical-stack
card_mod:
  style: "ha-card {\n  /* Style Glassmorphism Raffiné */\n  background: rgba(10, 15,\
    \ 25, 0.8) !important;\n  backdrop-filter: blur(15px) !important;\n  -webkit-backdrop-filter:\
    \ blur(15px) !important;\n  border-radius: 20px !important;\n  \n  /* Logique\
    \ de bordure dynamique (Synchronisée avec vos Switchs) */\n  border: 1px solid\n\
    \    {% if states('switch.inter_cuisine') == 'on'\n       or states('switch.inter_toilettes_z')\
    \ == 'on'\n       or states('switch.inter_cellier') == 'on' %}\n      rgba(255,\
    \ 152, 0, 0.6)\n    {% else %}\n      rgba(255, 255, 255, 0.12)\n    {% endif\
    \ %} !important;\n  \n  /* Ombrage profond */\n  box-shadow:\n    {% if states('switch.inter_cuisine')\
    \ == 'on'\n       or states('switch.inter_toilettes_z') == 'on'\n       or states('switch.inter_cellier')\
    \ == 'on' %}\n      0 0 25px rgba(255, 152, 0, 0.25), 0 8px 32px rgba(0, 0, 0,\
    \ 0.6)\n    {% else %}\n      0 8px 32px rgba(0, 0, 0, 0.5)\n    {% endif %} !important;\n\
    \  \n  overflow: hidden !important;\n  padding: 0 !important;\n}\n"
type: custom:mod-card
