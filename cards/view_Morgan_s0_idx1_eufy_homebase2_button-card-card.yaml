# =========================================
# CARTE : eufy_homebase2
# VUE   : Morgan
# TYPE  : custom:button-card (Carte monobloc)
# DÉPENDANCES :
#  - alarm_control_panel.eufy_homebase2
#  - this.hass
# =========================================

custom_fields:
  main: "[[[\n  const s = states['alarm_control_panel.eufy_homebase2']?.state || 'unknown';\n\
    \n  const isTriggered = s === 'triggered';\n  const isArmedAway = s === 'armed_away';\n\
    \  const isArmedHome = s === 'armed_home';\n  const isDisarmed = s === 'disarmed';\n\
    \n  let mainColor = '#00c853';\n  let statusLabel = 'DÉSACTIVÉE';\n  let iconName\
    \ = 'mdi:shield-off';\n\n  if (isTriggered)   { mainColor = '#ff1744'; statusLabel\
    \ = 'ALERTE !';  iconName = 'mdi:shield-alert'; }\n  else if (isArmedAway) { mainColor\
    \ = '#ff9100'; statusLabel = 'ABSENCE';   iconName = 'mdi:shield-lock'; }\n  else\
    \ if (isArmedHome) { mainColor = '#00c853'; statusLabel = 'PRÉSENT';   iconName\
    \ = 'mdi:shield-home'; }\n  else                  { mainColor = 'rgba(255,255,255,0.4)';\
    \ }\n\n  const pulse = isTriggered ? 'animation: pulse 1s infinite;' : '';\n\n\
    \  return `\n    <div style=\"display: flex; width: 100%; height: 100%; margin:\
    \ 0; padding: 0;\">\n\n      <!-- GAUCHE : Icône + label Alarme (Élargi à 130px)\
    \ -->\n      <div style=\"flex: 0 0 130px; height: 100%; display: flex; flex-direction:\
    \ column; justify-content: center; align-items: center; border-right: 1px solid\
    \ rgba(255,255,255,0.1); background: ${mainColor}10;\">\n        <ha-icon icon=\"\
    ${iconName}\" style=\"width: 28px; height: 28px; color: ${mainColor}; ${pulse}\"\
    ></ha-icon>\n        <div style=\"font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.6);\
    \ text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;\">ALARME</div>\n\
    \      </div>\n\n      <!-- MILIEU : Statut -->\n      <div style=\"flex: 1; display:\
    \ flex; justify-content: center; align-items: center;\">\n        <span style=\"\
    font-size: 16px; font-weight: 900; color: ${mainColor}; letter-spacing: 1.5px;\
    \ ${pulse}\">${statusLabel}</span>\n      </div>\n\n      <!-- DROITE : Bouton\
    \ script -->\n      <div style=\"flex: 0 0 110px; height: 100%; display: flex;\
    \ flex-direction: column; justify-content: center; align-items: center; border-left:\
    \ 1px solid rgba(255,255,255,0.1); background: ${isTriggered ? 'rgba(255,23,68,0.15)'\
    \ : 'rgba(255,255,255,0.03)'};\">\n        <button onclick=\"(async () => { await\
    \ this.hass.callService('script', 'alarm_smart_sync', {}); })()\" \n         \
    \ style=\"background: ${isTriggered ? '#ff1744' : 'rgba(255,255,255,0.08)'}; border:\
    \ ${isTriggered ? 'none' : '1px solid rgba(255,255,255,0.15)'}; border-radius:\
    \ 10px; padding: 7px 10px; cursor: pointer; display: flex; flex-direction: column;\
    \ align-items: center; gap: 3px;\">\n          <ha-icon icon=\"${isTriggered ?\
    \ 'mdi:bell-off' : 'mdi:sync'}\" style=\"width: 16px; color: white;\"></ha-icon>\n\
    \          <span style=\"font-size: 8px; font-weight: 900; color: white; text-transform:\
    \ uppercase; white-space: normal; word-break: break-word; text-align: center;\
    \ line-height: 1.3;\">${isTriggered ? 'DÉSACTIVER SIRÈNE' : 'SYNC ALARME'}</span>\n\
    \        </button>\n      </div>\n\n      <style>\n        @keyframes pulse {\
    \ 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }\n      </style>\n\
    \    </div>\n  `;\n]]]\n"
entity: alarm_control_panel.eufy_homebase2
show_icon: false
show_name: false
show_state: false
styles:
  card:
  - padding: 0
  - background: rgba(20, 27, 38, 0.6)
  - backdrop-filter: blur(10px)
  - -webkit-backdrop-filter: blur(10px)
  - border-radius: 20px
  - border: "[[[\n  const s = states['alarm_control_panel.eufy_homebase2']?.state;\n\
      \  if (s === 'triggered') return '2px solid #ff1744';\n  if (s === 'armed_away')\
      \ return '1px solid rgba(255, 145, 0, 0.5)';\n  if (s === 'armed_home') return\
      \ '1px solid rgba(0, 200, 83, 0.5)';\n  return '1px solid rgba(255, 255, 255,\
      \ 0.1)';\n]]]\n"
  - box-shadow: "[[[\n  const s = states['alarm_control_panel.eufy_homebase2']?.state;\n\
      \  if (s === 'triggered') return '0 0 20px rgba(255, 23, 68, 0.6)';\n  if (s\
      \ === 'armed_away') return '0 0 15px rgba(255, 145, 0, 0.2)';\n  if (s === 'armed_home')\
      \ return '0 0 15px rgba(0, 200, 83, 0.2)';\n  return '0 4px 15px rgba(0,0,0,0.2)';\n\
      ]]]\n"
  - overflow: hidden
  - margin-top: 8px
  - cursor: pointer
  custom_fields:
    main:
    - justify-self: stretch
    - align-self: stretch
    - padding: 0
    - height: 100%
    - margin: 0
  grid:
  - grid-template-areas: '"main"'
  - grid-template-columns: 1fr
  - grid-template-rows: 64px
  - margin: 0
  - gap: 0
tap_action:
  action: none
type: custom:button-card
