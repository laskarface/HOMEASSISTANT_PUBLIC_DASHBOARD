                    - type: conditional
                      conditions:
                        - entity: climate.tesla_model_3_climate
                          state_not: 'off'
                        - entity: climate.tesla_model_3_climate
                          state_not: unavailable
                        - entity: climate.tesla_model_3_climate
                          state_not: unknown
