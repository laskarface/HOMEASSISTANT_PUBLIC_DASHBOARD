      - type: grid
        cards:
          - type: custom:button-card
            name: |
              [[[ 
                const date = new Date();
                const jours = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
                const mois = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
                return 'Conso du Jour - ' + jours[date.getDay()] + ' ' + date.getDate() + ' ' + mois[date.getMonth()];
              ]]]
            icon: mdi:lightning-bolt
            styles:
              card:
                - background: none
                - border: none
                - padding: 8px 15px
              grid:
                - grid-template-areas: '"i n"'
                - grid-template-columns: min-content 1fr
                - gap: 10px
              icon:
                - width: 24px
                - color: '#FFB03B'
                - filter: drop-shadow(0 0 5px rgba(255, 176, 59, 0.4))
              name:
                - justify-self: start
                - font-weight: 900
                - font-size: 15px
                - color: '#FFB03B'
                - text-transform: uppercase
                - letter-spacing: 1px
                - text-shadow: 0 0 10px rgba(255, 176, 59, 0.3)
          - type: custom:button-card
            name: Consommation & Énergie (Ce jour)
            styles:
              card:
                - background: |
                    [[[ 
                      return "linear-gradient(rgba(10, 15, 25, 0.75), rgba(10, 15, 25, 0.75)), url('/local/conso_global_bg.png')";
                    ]]]
                - background-size: cover
                - background-position: center
                - backdrop-filter: blur(15px)
                - '-webkit-backdrop-filter': blur(15px)
                - border-radius: 24px
                - border: 1px solid rgba(255,255,255,0.12)
                - box-shadow: 0 8px 32px rgba(0,0,0,0.5)
                - padding: 20px
              grid:
                - grid-template-areas: '"n" "table"'
                - grid-template-rows: auto auto
              name:
                - font-size: 16px
                - font-weight: 800
                - color: rgba(255,255,255,0.9)
                - margin-bottom: 20px
                - text-align: left
                - justify-self: start
                - text-transform: uppercase
                - letter-spacing: 1px
                - text-shadow: 0 2px 4px rgba(0,0,0,0.8)
            custom_fields:
              table:
                card:
                  type: custom:button-card
                  styles:
                    card:
                      - background: transparent
                      - border: none
                      - box-shadow: none
                      - padding: 0
                    grid:
                      - grid-template-areas: '"header" "solaire" "reseau" "batterie"'
                      - grid-template-columns: 1fr
                  custom_fields:
                    header: |
                      [[[
                        return `
                          <div style="display: grid; grid-template-columns: 1fr 120px; padding: 0 10px 10px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px;">
                            <div>Source</div>
                            <div style="text-align: right;">Consommé</div>
                          </div>
                        `;
                      ]]]
                    solaire: |
                      [[[
                        const p = states['sensor.production_solaire_today']?.state || '0'; 
                        const isProd = states['sensor.production_solaire_today'] !== undefined;
                        if (!isProd) return `<div style="display:none"></div>`;
                        return `
                          <div style="display: grid; grid-template-columns: 1fr 120px; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                              <div style="color: #FFD700; display: flex; filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4));"><ha-icon icon="mdi:solar-power" style="--mdc-icon-size: 22px;"></ha-icon></div>
                              <div style="font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.95);">Solaire</div>
                            </div>
                            <div style="text-align: right; font-size: 15px; font-weight: 800; color: #FFD700; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">—</div>
                          </div>
                        `;
                      ]]]
                    reseau: |
                      [[[
                        const c = states['sensor.ecojoko_consommation_reseau']?.state || '0';
                        const unit = states['sensor.ecojoko_consommation_reseau']?.attributes?.unit_of_measurement || 'kWh';
                        return `
                          <div style="display: grid; grid-template-columns: 1fr 120px; padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                              <div style="color: #00B4FF; display: flex; filter: drop-shadow(0 0 5px rgba(0, 180, 255, 0.4));"><ha-icon icon="mdi:transmission-tower" style="--mdc-icon-size: 22px;"></ha-icon></div>
                              <div style="font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.95);">Réseau</div>
                            </div>
                            <div style="text-align: right; font-size: 15px; font-weight: 800; color: #00B4FF; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">${c} ${unit}</div>
                          </div>
                        `;
                      ]]]
                    batterie: |
                      [[[
                        const isBat = states['sensor.battery_charge_today'] !== undefined;
                        if (!isBat) return `<div style="display:none"></div>`;
                        const dch = states['sensor.battery_discharge_today']?.state || '0';
                        return `
                          <div style="display: grid; grid-template-columns: 1fr 120px; padding: 15px 10px; align-items: center;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                              <div style="color: #00FF00; display: flex; filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.4));"><ha-icon icon="mdi:battery-high" style="--mdc-icon-size: 22px;"></ha-icon></div>
                              <div style="font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.95);">Batterie</div>
                            </div>
                            <div style="text-align: right; font-size: 15px; font-weight: 800; color: #00FF00; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">${dch} kWh</div>
                          </div>
                        `;
                      ]]]
