                    </div>
                  `;
                ]]]
              input: |
                [[[
                  setTimeout(() => {
                    const el = document.getElementById('alexa_salon_input');
                    try {
                      if(el && window.hassConnection) {
                        window.hassConnection.then(({conn}) => {
                          if (conn && conn._entities) {
                            const stateObj = conn._entities['input_text.message_salon'];
                            if (stateObj && stateObj.state !== 'unknown') {
                              el.value = stateObj.state;
                            }
                          }
                        }).catch(() => {});
                      }
                    } catch(e) {}
                  }, 300);

                  return `
                    <input 
                      type="text" 
                      id="alexa_salon_input"
                      placeholder="Message pour le salon..."
                      onclick="event.stopPropagation();"
                      onmousedown="event.stopPropagation();"
