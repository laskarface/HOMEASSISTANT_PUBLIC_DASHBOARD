                    tempBg = "linear-gradient(135deg, rgba(255, 152, 0, 0.25) 0%, transparent 100%)";
                    tempIconColor = "#FF9800";
                    tempTextColor = "#FF9800";
                  }

                  // ----- LOGIQUE D'ALERTE HUMIDITE (Uniformisée en Bleu #2196F3) -----
                  let humAlert = false;
                  let humBg = "transparent";
                  let humIconColor = "rgba(255,255,255,0.3)";
                  let humTextColor = "white";

                  if (hum > 65) {
                    humAlert = true;
                    humBg = "linear-gradient(135deg, rgba(33, 150, 243, 0.25) 0%, transparent 100%)";
                    humIconColor = "#2196F3";
                    humTextColor = "#2196F3";
                  }

                  // ----- LOGIQUE GLOBALE (BLOC DE GAUCHE) -----
                  let leftColor = "#4CAF50"; 
                  if (tempAlert || humAlert) {
                     if (temp < 19) leftColor = "#29B6F6"; 
                     if (temp > 25) leftColor = "#FF9800"; 
                     if (hum > 65) leftColor = "#2196F3"; 
                  }

                  return `
                    <div style="display: flex; width: 100%; height: 100%; margin: 0; padding: 0;">
                      
                      <div style="flex: 0 0 130px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, ${leftColor}25 0%, transparent 100%); transition: background 0.3s; margin: 0; padding: 0; box-sizing: border-box;">
                        <ha-icon icon="mdi:bathtub" style="width: 24px; height: 24px; color: ${leftColor}; filter: drop-shadow(0 0 8px ${leftColor}80); margin-bottom: 2px;"></ha-icon>
                        <div style="font-size: 8px; font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin: 0; line-height: 1.2;">SDB CHLOÉ<br>& MOMO</div>
                      </div>
                      
                      <div style="flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255,255,255,0.05); background: ${tempBg}; cursor: pointer; transition: all 0.3s; margin: 0; padding: 0; box-sizing: border-box;"
                           onclick="event.stopPropagation(); const e = new CustomEvent('hass-more-info', { detail: { entityId: '${variables.temp_entity}' }, bubbles: true, composed: true }); this.dispatchEvent(e);">
                        <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 2px;">
                          <ha-icon icon="mdi:thermometer" style="width: 12px; height: 12px; color: ${tempIconColor};"></ha-icon>
                          <span style="font-size: 8px; font-weight: 900; color: ${tempIconColor}; letter-spacing: 1px; line-height: 1;">TEMPÉRATURE</span>
                        </div>
                        <div style="display: flex; align-items: baseline; gap: 4px;">
                          <span style="font-size: 22px; font-weight: 900; color: ${tempTextColor}; line-height: 1;">${temp.toFixed(1)}</span>
                          <span style="font-size: 11px; font-weight: 800; color: ${tempIconColor}; line-height: 1;">°C</span>
                        </div>
                      </div>
                      
                      <div style="flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: ${humBg}; cursor: pointer; transition: all 0.3s; margin: 0; padding: 0; box-sizing: border-box;"
                           onclick="event.stopPropagation(); const e = new CustomEvent('hass-more-info', { detail: { entityId: '${variables.hum_entity}' }, bubbles: true, composed: true }); this.dispatchEvent(e);">
                        <div style="display: flex; align-items: center; gap: 4px; margin-bottom: 2px;">
                          <ha-icon icon="mdi:water-percent" style="width: 13px; height: 13px; color: ${humIconColor}; margin-left: -2px;"></ha-icon>
                          <span style="font-size: 8px; font-weight: 900; color: ${humIconColor}; letter-spacing: 1px; line-height: 1;">HUMIDITÉ</span>
                        </div>
                        <div style="display: flex; align-items: baseline; gap: 4px;">
                          <span style="font-size: 22px; font-weight: 900; color: ${humTextColor}; line-height: 1;">${hum.toFixed(0)}</span>
                          <span style="font-size: 11px; font-weight: 800; color: ${humIconColor}; line-height: 1;">%</span>
                        </div>
                      </div>
                      
                    </div>
                  `;
                ]]]
