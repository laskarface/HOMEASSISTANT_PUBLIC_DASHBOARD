                            ${m}
                          </div>
                          ${p ? `<div style="font-size: 9px; font-weight: 700; color: white; opacity: 0.9; margin-top: 4px; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,1);">${p}</div>` : ''}
