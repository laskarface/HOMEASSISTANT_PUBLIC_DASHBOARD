              - value: 30
                color: '#9ade1b'
              - value: 60
                color: '#8fba17'
              - value: 90
                color: '#968013'
              - value: 120
                color: '#b21301'
            color_blocks: false
            bar_radius: 10
        images:
          - image: /api/image/serve/2f279a2aa6f54dc602c787bdef31a69f/512x512
        button_cards:
          - show_icon: true
            show_primary: true
            show_secondary: true
