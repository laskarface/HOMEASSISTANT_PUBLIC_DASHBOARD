                        <rect x="32" y="78" width="6" height="4" rx="1" /> <rect x="44" y="78" width="6" height="4" rx="1" />
                        <rect x="56" y="78" width="6" height="4" rx="1" /> <rect x="68" y="78" width="6" height="4" rx="1" />
                      </g>
                      <rect x="18" y="52" width="64" height="6" rx="3" fill="#eeeeee" stroke="#bdbdbd" stroke-width="0.5" />
                      <rect x="22" y="53.5" width="20" height="1.5" rx="1" fill="white" opacity="0.4" />
                    </svg>
                  `;
                  return `
                    <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(79, 195, 247, 0.2) 0%, rgba(79, 195, 247, 0) 100%); border-top-left-radius: 20px; position: relative;">
                      <div style="position: absolute; width: 50px; height: 50px; background: ${blue}; border-radius: 50%; filter: blur(20px); opacity: 0.3; animation: pulseGlow 4s infinite alternate ease-in-out;"></div>
                      <div style="position: relative; z-index: 1;">${svg}</div>
                      <div style="font-size: 9px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; z-index: 1;">BUANDERIE</div>
                      <style>@keyframes pulseGlow { from { opacity: 0.2; transform: scale(0.9); } to { opacity: 0.4; transform: scale(1.1); } }</style>
                    </div>
                  `;
                ]]]
              info: |
                [[[
                  var timeSince = function(dateString) {
                    if (!dateString) return '';
                    var date = new Date(dateString);
                    var seconds = Math.floor((new Date() - date) / 1000);
                    if (seconds < 60) return "à l'instant";
                    var minutes = Math.floor(seconds / 60);
                    if (minutes < 60) return "depuis " + minutes + " min";
                    var hours = Math.floor(minutes / 60);
                    var r_min = minutes % 60;
                    if (hours < 24) return "depuis " + hours + "h" + (r_min < 10 && r_min > 0 ? '0' : '') + (r_min > 0 ? r_min : '');
                    var days = Math.floor(hours / 24);
                    return "depuis " + days + " j";
                  };

                  var parseTimeOrPhase = function(val) {
                    if (!val || val === 'unavailable' || val === 'unknown') return '';
                    if (!isNaN(val)) return "Reste " + val + " min";
                    var d = new Date(val);
                    if (!isNaN(d.getTime())) {
                       var seconds = Math.floor((d - new Date()) / 1000);
                       if (seconds <= 0) return "Bientôt fini";
                       var minutes = Math.floor(seconds / 60);
                       if (minutes < 60) return "Reste " + minutes + " min";
                       var hours = Math.floor(minutes / 60);
                       var r_min = minutes % 60;
                       return "Reste " + hours + "h" + (r_min < 10 ? '0' : '') + r_min;
                    }
                    return val;
                  };

                  var isEditMode = window.location.search.includes('edit=1') || window.location.pathname.includes('edit');
                  
                  var w_power_val = parseFloat(states['sensor.prise_machine_a_laver_z_power']?.state || '0');
                  var w_on = states['binary_sensor.machine_a_laver_en_cours']?.state === 'on' || w_power_val > 10;
                  var w_door = states['binary_sensor.capteur_ouverture_lave_linge_contact']?.state === 'on';
                  var w_done_state = states['input_boolean.machine_a_laver_terminee'];
                  var w_done = (w_done_state?.state === 'on') && !w_door;
                  
                  var d_mode = states['sensor.seche_linge_mode']?.state;
                  var d_on = (d_mode === 'Running' || d_mode === '2');
                  var d_door = states['sensor.seche_linge_door_status']?.state === 'Open';
                  var d_done_state = states['input_boolean.seche_linge_termine'];
                  var d_done = (d_done_state?.state === 'on') && !d_door;
                  
                  var w_power = states['sensor.prise_machine_a_laver_z_power']?.state || '0';
                  var d_power = states['sensor.prise_seche_linge_z_power']?.state || '0';
                  var d_end = states['sensor.seche_linge_end_time']?.state;
                  
                  var items = [];
                  
                  if (w_on) {
                    var phase = states['input_select.phase_machine_a_laver']?.state || "En cours";
                    let label = `${phase} - ${Math.round(w_power)} W`;
                    let couleur = (phase === 'Lavage (Chauffe)') ? '#ff4444' : '#FF9800';
                    items.push({ name: 'Lave-linge', label: label, icon: 'mdi:washing-machine', color: couleur, active: true });
                  } else if (w_done) {
                    let label = "Terminé " + timeSince(w_done_state?.last_changed);
                    items.push({ name: 'Lave-linge', label: label, icon: 'mdi:washing-machine-alert', color: '#00BFA5', active: false });
                  }
                  
                  if (d_on) {
                    let info = parseTimeOrPhase(d_end);
                    let label = info ? info : `En cours - ${Math.round(d_power)} W`;
                    items.push({ name: 'Sèche-linge', label: label, icon: 'mdi:tumble-dryer', color: '#FF9800', active: true });
                  } else if (d_done) {
                    let label = "Terminé " + timeSince(d_done_state?.last_changed);
                    items.push({ name: 'Sèche-linge', label: label, icon: 'mdi:tumble-dryer-alert', color: '#00BFA5', active: false });
                  }
                  
                  if (items.length === 0 && !isEditMode) return '';
                  
                  // Image thématique : Buanderie moderne (Opacité 0.35)
                  const bgImg = "https://images.unsplash.com/photo-1545173168-9f1947eebb7f?q=80&w=500&auto=format&fit=crop0";
                  
                  var style = '<style>@keyframes pulse-icon { 0% { transform: scale(1); filter: drop-shadow(0 0 2px currentColor); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 10px currentColor); } 100% { transform: scale(1); filter: drop-shadow(0 0 2px currentColor); } } @keyframes glow-box { 0% { box-shadow: 0 0 5px rgba(255, 152, 0, 0.2); } 50% { box-shadow: 0 0 15px rgba(255, 152, 0, 0.6); } 100% { box-shadow: 0 0 5px rgba(255, 152, 0, 0.2); } }</style>';
                  
                  var content = '<div style="display: flex; gap: 12px; align-items: center; justify-content: center; height: 100%; padding: 0 15px 0 10px; position: relative; z-index: 1;">';
                  
                  if (isEditMode && items.length === 0) {
                    content += '<div style="color: rgba(255,255,255,0.4); font-size: 11px;">Mode Édition</div>';
                  } else {
                    for (var i = 0; i < items.length; i++) {
                      var c = items[i];
                      var bg = `linear-gradient(145deg, rgba(20,27,38,0.75) 0%, ${c.color}20 100%)`;
                      var shadow = c.active ? 'animation: glow-box 3s infinite ease-in-out;' : `box-shadow: 0 4px 10px rgba(0,0,0,0.3);`;
                      content += `<div style="flex: 1; height: 60px; border-radius: 14px; background: ${bg}; border: 1px solid ${c.color}50; ${shadow} display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px);">`;
                      var iconAnim = c.active ? 'animation: pulse-icon 2s infinite ease-in-out;' : '';
                      content += `<ha-icon icon="${c.icon}" style="--mdc-icon-size: 24px; color: ${c.color}; margin-bottom: 4px; ${iconAnim}"></ha-icon>`;
                      content += `<div style="font-size: 11px; font-weight: 800; color: white; line-height: 1.1; letter-spacing: 0.5px;">${c.name}</div>`;
                      content += `<div style="font-size: 9px; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; margin-top: 3px; text-align: center; padding: 0 2px;">${c.label}</div>`;
                      content += '</div>';
                    }
                  }
                  content += '</div>';
                  
                  return `
                    <div style="width: 100%; height: 100%; position: relative; overflow: hidden;">
                      <!-- Image de fond Buanderie -->
                      <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: url('${bgImg}') center/cover no-repeat; opacity: 0.35; z-index: 0;"></div>
                      ${style}
                      ${content}
                    </div>
                  `;
                ]]]
