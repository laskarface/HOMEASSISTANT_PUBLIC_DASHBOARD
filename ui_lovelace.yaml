                main: |
                  [[[
                    const check = (name, temp, hum = null) => {
                      // Seuil à 25°C et 19°C comme demandé à l'origine
                      if (!isNaN(temp) && temp > 25) return { msg: name + ' TROP CHAUDE',  color: '#FF9800', bg: 'rgba(255,152,0,0.15)',  icon: '🌡️' };
                      if (!isNaN(temp) && temp < 19) return { msg: name + ' TROP FROIDE',  color: '#29B6F6', bg: 'rgba(41,182,246,0.15)', icon: '❄️' };
                      if (hum !== null && !isNaN(hum) && hum > 65) return { msg: name + ' TROP HUMIDE', color: '#2196F3', bg: 'rgba(33,150,243,0.15)', icon: '💧' };
                      return null;
                    };

                    const g = (id) => {
                      const s = states[id];
                      return s ? parseFloat(s.state) : NaN;
                    };

                    const alerts = [
                      check('CH. PARENTALE', g('sensor.humidite_chambre_parentale_temperature'), g('sensor.humidite_chambre_parentale_humidity')),
                      check('CH. CHLOÉ',     g('sensor.smart_temp_humidity_sensor_39000e5be749_temperature'), g('sensor.smart_temp_humidity_sensor_39000e5be749_humidity')),
                      check('CH. MOMO',      g('sensor.smart_temp_humidity_sensor_39000e4fa9fc_temperature'), g('sensor.smart_temp_humidity_sensor_39000e4fa9fc_humidity')),
                      check('CH. MARLEY',    g('sensor.capteur_marley_temperature'), g('sensor.capteur_marley_humidity')),
                      check('CH. LISON',     g('sensor.capteur_lison_z_temperature'), g('sensor.capteur_lison_z_humidity')),
                    ].filter(a => a !== null);

                    let label, color, bg, icon;
                    if (alerts.length === 0) {
                      label = 'TOUT VA BIEN';
                      color = '#4CAF50';
                      bg    = 'rgba(0,0,0,0.2)';
                      icon  = '✓';
                    } else if (alerts.length === 1) {
                      ({ msg: label, color, bg, icon } = alerts[0]);
                    } else {
                      // Affiche le message de la première alerte + le nombre d'autres alertes
                      label = alerts[0].msg + ' +' + (alerts.length - 1);
                      color = alerts[0].color;
                      bg    = alerts[0].bg;
                      icon  = alerts[0].icon;
