                      <circle cx="8" cy="11" r="1.5" fill="white"/>
                      <circle cx="12" cy="11" r="1.5" fill="white"/>
                      <circle cx="16" cy="11" r="1.5" fill="white"/>
                    </svg>
                  `;
                  return `
