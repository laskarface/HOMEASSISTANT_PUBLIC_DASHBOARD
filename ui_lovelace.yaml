                        </div>

                        <div style="flex:1;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;padding:0 12px;
                          background: linear-gradient(${bg}, ${bg}), linear-gradient(rgba(10, 15, 25, 0.65), rgba(10, 15, 25, 0.65)), url('${imageUrl}');
                          background-size: cover;
                          background-position: center;
                          transition: all 0.4s;">
                          <span style="font-size:12px;font-weight:950;color:${color};letter-spacing:0.5px;text-shadow: 0 1px 4px rgba(0,0,0,0.9);">${icon} ${label}</span>
                        </div>

                      </div>`;
                  ]]]
