                                  var color = i===4 ? '#DC5050' : i===3 ? '#FFA500' : i===2 ? '#008CFF' : '#78EBFF';
                                  html += `<div style="flex:1;max-width:12px;height:100%;position:relative;border-radius:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);"><div style="position:absolute;bottom:0;left:0;right:0;height:${pct}%;background:${color};box-shadow:0 0 10px ${color};transition:height 1s ease;"></div></div>`;
