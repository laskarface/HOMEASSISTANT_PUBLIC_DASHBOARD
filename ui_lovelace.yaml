                  let items = (entity && entity.attributes && entity.attributes.items) ? entity.attributes.items.slice(0, 6) : [];
                  
                  if (items.length === 0) {
                     return out + `<div style="font-size: 10px; font-style: italic; color: #8a92b2; text-align: center; white-space: normal; padding: 10px;">Chargement du flux RMC Sport...</div></div>`;
                  }
                  
                  items.forEach((article, index) => {
                     let parts = article.title ? article.title.split(' - ') : ['Titre inconnu'];
                     let title = article.title || 'Titre inconnu';
                     
                     if (parts.length > 1) {
                        // Google News ajoute " - RMC Sport" à la fin de tous les titres, on le coupe pour un rendu propre
                        parts.pop(); 
                        title = parts.join(' - ').trim();
                     }
                     
                     let dateStr = '';
                     if (article.pubDate) {
                       let pubDate = new Date(article.pubDate);
                       let d = pubDate.getDate().toString().padStart(2, '0');
                       let m = (pubDate.getMonth() + 1).toString().padStart(2, '0');
                       let y = pubDate.getFullYear().toString().slice(-2);
                       let h = pubDate.getHours().toString().padStart(2, '0');
                       let min = pubDate.getMinutes().toString().padStart(2, '0');
                       dateStr = `${d}/${m}/${y} à ${h}:${min}`;
                     }

                     let lienUrl = article.link || '#';
                     
                     out += `
                      <div 
                        onclick="event.stopPropagation(); window.open('${lienUrl}', '_blank');"
                        onpointerdown="event.stopPropagation();"
                        ontouchstart="event.stopPropagation();"
                        style="display: flex; flex-direction: column; gap: 3px; cursor: pointer; transition: opacity 0.2s; padding: 2px;"
                        onmouseover="this.style.opacity='0.6'"
                        onmouseout="this.style.opacity='1'"
                      >
                        <div style="white-space: normal; font-size: 13.5px; font-weight: 600; color: #ffffff; line-height: 1.3; text-align: left;">${title}</div>
                        <div style="white-space: normal; font-size: 10px; font-style: italic; color: #8a92b2; line-height: 1.2; text-align: center;">${dateStr}</div>
                      </div>
                     `;
                     
                     if (index < items.length - 1) {
                        out += `
                          <div style="height: 1px; width: 85%; margin: 6px auto; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%); box-shadow: 0 1px 3px rgba(255,255,255,0.2);"></div>
                        `;
                     }
                  });
                  
                  out += `</div>`;
                  return out;
                ]]]
