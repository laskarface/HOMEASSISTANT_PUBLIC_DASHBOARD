                  50% { opacity: 0.35; text-shadow: 0 0 2px var(--glow-color); } 
                  100% { opacity: 1; text-shadow: 0 0 10px var(--glow-color); }
                }
              custom_fields:
                img: |
                  [[[
                    const title = (entity.attributes.original_title || "").toLowerCase();
                    const state = (entity.state || "").toLowerCase();
                    const s = title + state;
                    const v = new Date().getTime();
                    let imgUrl = `/local/garbage/green_bin.png?v=${v}`;
                    if (s.includes('jaune')) imgUrl = `/local/garbage/yellow_bin.png?v=${v}`;
                    else if (s.includes('verre')) imgUrl = `/local/glass_bin.png?v=${v}`;
                    else if (s.includes('marron') || s.includes('brun') || s.includes('bio')) imgUrl = `/local/garbage/brown_bin.png?v=${v}`;
                    
                    const color = variables.color;
                    return `
                      <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, ${color}33 0%, ${color}0D 100%); margin: 0; padding: 0; box-sizing: border-box;">
                        <img src="${imgUrl}" style="height: 72px; width: auto; filter: drop-shadow(0 4px 10px ${color}66); object-fit: contain; margin-top: -3px;" />
                        <div style="font-size: 8px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 0.8px; margin-top: -5px; z-index: 1;">Poubelles</div>
                      </div>
                    `;
                  ]]]
                info: |
                  [[[
                    const title = entity.attributes.original_title || "POUBELLE À SORTIR";
                    const color = variables.color;
                    const regex = /(.*?)\((.*)\)/;
                    const match = title.match(regex);
                    let m = title;
                    let p = "";
                    if (match) { m = match[1].trim(); p = `(${match[2].trim()})`; }
                    
                    // Utilisation de votre fichier local (Garantie de sujet)
                    const bgImg = "/local/garbage/recyclage-115022.jpg";
                    
                    return `
                      <div style="width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <!-- Votre image locale bien cadrée -->
                        <div style="position: absolute; top:0; left:0; width: 100%; height: 100%; background: url('${bgImg}') center center / cover no-repeat; opacity: 0.45; z-index: 0;"></div>
                        
                        <!-- Contenu Texte avec padding et ombres renforcées -->
