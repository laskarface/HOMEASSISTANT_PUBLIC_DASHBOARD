          - type: custom:button-card
            show_name: false
            show_icon: false
            styles:
              grid:
                - grid-template-areas: '"table"'
                - grid-template-columns: 100%
              card:
                - background: rgba(20, 27, 38, 0.6)
                - backdrop-filter: blur(10px)
                - '-webkit-backdrop-filter': blur(10px)
                - border-radius: 20px
                - border: 1px solid rgba(255,255,255,0.1)
                - box-shadow: 0 4px 15px rgba(0,0,0,0.3)
                - margin-top: 8px
                - padding: 0
                - cursor: default
              custom_fields:
                table:
                  - pointer-events: auto
            custom_fields:
              table: |
                [[[
                  let out = `
                  <h1 style="display: flex; align-items: center; gap: 10px; padding: 12px 16px 0 16px; margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; color: #ffffff;">
                    <img src="https://a.espncdn.com/i/leaguelogos/soccer/500/9.png" style="width: 38px; height: 38px; filter: brightness(0) invert(1) drop-shadow(0 0 5px rgba(255,255,255,0.5));">
                    Classement Ligue 1
                  </h1>`;

                  
                  let sensor = states['sensor.ligue_1_scoreboard'];
                  if (!sensor || !sensor.attributes || !sensor.attributes.entries) {
                    return out + `<div style="padding: 10px; text-align: center; color: #ffb300;">Données en cours de synchronisation...</div>`;
                  }
                  
                  let entries = sensor.attributes.entries;
                  
                  let renderRow = function(entry) {
                    let stats = entry.stats || [];
                    let rank_stat = stats.find(s => s.name === 'rank');
                    let pts_stat = stats.find(s => s.name === 'points');
                    let pld_stat = stats.find(s => s.name === 'gamesPlayed');
                    
                    let rank = rank_stat ? rank_stat.displayValue : '0';
                    let pts = pts_stat ? pts_stat.displayValue : '0';
                    let pld = pld_stat ? pld_stat.displayValue : '0';
                    
                    let r = parseInt(rank) || 0;
                    let c_color = '#ffffff'; 
                    let opacity = '1'; 
                    
                    if (r >= 1 && r <= 4) {
                      c_color = '#4caf50'; 
                    } else if (r >= 5 && r <= 6) {
                      c_color = '#2196f3'; 
                    } else if (r == 16) {
                      c_color = '#ff9800'; 
                    } else if (r >= 17) {
                      c_color = '#f44336'; 
                      opacity = '0.4';
                    }
                    
                    let border_left = (c_color !== '#ffffff') ? `3px solid ${c_color}` : `3px solid transparent`;
                    
                    let name = entry.team.shortDisplayName || entry.team.name;
                    let logo = (entry.team.logos && entry.team.logos[0]) ? entry.team.logos[0].href : '';
                    
                    let name_style = "white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;";
                    if (name === 'PSG' || name === 'Paris Saint-Germain') {
                      name_style += " font-weight: bold; color: #ffb300;";
                    }
                    
                    return `
                      <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; opacity: ${opacity};">
                        <td style="width: 12%; padding: 3px 8px; font-weight: bold; color: ${c_color}; border-left: ${border_left};">${rank}</td>
                        <td style="width: 58%; padding: 3px 4px;">
                          <div style="display: flex; align-items: center; gap: 8px;">
                            <img src="${logo}" width="16" height="16" style="background: white; border-radius: 50%; padding: 1px;">
                            <span style="${name_style}">${name}</span>
                          </div>
                        </td>
                        <td style="width: 15%; text-align: center; padding: 3px 4px; color: #a9b1d6;">${pld}</td>
                        <td style="width: 15%; text-align: center; padding: 3px 4px; font-weight: bold;">${pts}</td>
                      </tr>
                    `;
                  };
                  
                  out += `<table width="100%" style="border-collapse: collapse; text-align: left; color: white; font-family: Roboto, sans-serif; margin-top: 8px;">
                    <tr style="border-bottom: 2px solid rgba(255,255,255,0.2); font-size: 11px; text-transform: uppercase; color: #a9b1d6;">
                      <th style="width: 12%; padding: 4px 8px;">#</th>
                      <th style="width: 58%; padding: 4px 4px;">Équipe</th>
                      <th style="width: 15%; text-align: center; padding: 4px 4px;">J</th>
                      <th style="width: 15%; text-align: center; padding: 4px 4px;">Pts</th>
                    </tr>`;
                    
                  let top_6 = entries.slice(0, 6);
                  let rest = entries.slice(6);
                  
                  top_6.forEach(entry => {
                    out += renderRow(entry);
                  });
                  out += `</table>`;
                  
                  if (rest.length > 0) {
                    out += `
                    <details 
                      onpointerdown="event.stopPropagation();" 
                      ontouchstart="event.stopPropagation();"
                      onclick="event.stopPropagation();" 
                      style="width: 100%; outline: none;">
                      <summary style="cursor: pointer; text-align: center; display: block; color: #ffffff; padding: 6px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0); border-radius: 8px; margin: 8px 0; outline: none; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
                        ▼ AFFICHER LE RESTE DU CLASSEMENT ▼
                      </summary>
                      <table width="100%" style="border-collapse: collapse; text-align: left; color: white; font-family: Roboto, sans-serif;">
                    `;
                    rest.forEach(entry => {
                      out += renderRow(entry);
                    });
                    out += `</table></details>`;
                  }
                  
                  out += `
                    <div style="margin-top: 10px; margin-bottom: 10px; font-size: 10px; color: #a9b1d6; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                      <span style="display: flex; align-items: center; gap: 4px;"><div style="width:8px; height:8px; background:#4caf50; border-radius:50%;"></div> LDC</span>
                      <span style="display: flex; align-items: center; gap: 4px;"><div style="width:8px; height:8px; background:#2196f3; border-radius:50%;"></div> Europa</span>
                      <span style="display: flex; align-items: center; gap: 4px;"><div style="width:8px; height:8px; background:#ff9800; border-radius:50%;"></div> Barrages</span>
                      <span style="display: flex; align-items: center; gap: 4px;"><div style="width:8px; height:8px; background:#f44336; border-radius:50%;"></div> Relégation</span>
                    </div>
                  `;
                  
                  return out;
                ]]]
      - type: grid
        cards:
          - type: custom:button-card
            show_name: false
            show_icon: false
            styles:
              grid:
                - grid-template-areas: '"jauge"'
