                    const n = Number(String(raw).replace(',', '.'));
                    const v = Number.isFinite(n) ? Math.max(0, Math.min(100, Math.round(n))) : 0;

                    const bg = `linear-gradient(90deg,
                      rgba(0,170,255,0.95) 0%,
