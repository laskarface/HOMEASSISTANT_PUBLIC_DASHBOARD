                      if (n_base !== base_phase) is_last_in_phase = true;
                    } else {
                       is_last_in_phase = true;
                    }
                    
                    let row_style = is_last_in_phase ? "border-bottom: none;" : "border-bottom: 1px solid rgba(255,255,255,0.05);";
                    
