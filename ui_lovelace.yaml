                      oninput="try { window.hassConnection && window.hassConnection.then(({conn}) => conn.sendMessage({type: 'call_service', domain: 'input_text', service: 'set_value', service_data: { entity_id: 'input_text.message_salon', value: this.value }})) } catch(e) {}"
