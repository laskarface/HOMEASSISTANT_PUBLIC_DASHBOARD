                        <div style="flex:0 0 130px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-bottom:6px;border-right:2px solid rgba(255,255,255,0.08);background:linear-gradient(135deg,rgba(41,182,246,0.15) 0%,transparent 100%);">
