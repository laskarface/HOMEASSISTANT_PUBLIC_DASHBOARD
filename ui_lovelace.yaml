                      <rect x="60" y="20" width="6" height="43" rx="1.5" fill="url(#holoGrad)" />

                      <!-- Courbe de tendance Fluo -->
                      <path d="M 23 55 Q 35 60, 50 35 T 77 15" fill="none" stroke="#ffee58" stroke-width="1.5" opacity="0.9" filter="drop-shadow(0 0 2px #ffee58)"/>
