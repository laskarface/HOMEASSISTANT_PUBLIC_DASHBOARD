                          const colors = {"1":"#4CAF50","2":"#8BC34A","3":"#FFC107","4":"#FF9800","5":"#F44336","6":"#9C27B0"};
                          const msgs = {
                            "1":"Qualité de l'air optimale",
                            "2":"Bonne qualité de l'air",
