          name:
            - font-size: 12px
            - font-weight: 700
            - color: rgba(255, 255, 255, 0.9)
      - type: custom:vehicle-status-card
        name: Tesla Modèle 3
        layout_config:
          button_grid:
            rows: 2
            columns: 2
            swipe: true
          images_swipe:
            height: 150
          section_order:
            - range_info
            - images
            - indicators
            - mini_map
            - buttons
          range_info_config:
            layout: row
        mini_map:
          enable_popup: true
          device_tracker: device_tracker.tesla_model_3_location
          use_zone_name: false
          user_location: false
        range_info:
          - energy_level:
              tap_action:
                action: more-info
              value_alignment: end
              value_position: inside
              entity: sensor.tesla_model_3_niveau_de_batterie
            range_level:
              value_position: outside
              entity: sensor.tesla_model_3_autonomie_de_batterie
            charging_entity: binary_sensor.tesla_model_3_charging
            progress_color: '#d60000'
            charging_template: '{{ true }}'
            color_blocks: false
            color_thresholds:
              - value: 0
                color: '#ff0000'
              - value: 20
                color: '#ff7300'
              - value: 40
                color: '#ffbb00'
              - value: 60
                color: '#eeff00'
              - value: 80
                color: '#44ff00'
            bar_radius: 10
          - energy_level:
              tap_action:
                action: more-info
              value_alignment: end
              value_position: inside
              entity: sensor.tesla_model_3_charge_energy_added
              hide_icon: false
              max_value: 50
            range_level:
              value_position: inside
              icon: mdi:ev-station
            progress_color: '#fbff00'
            color_blocks: false
            color_thresholds:
              - value: 0
                color: '#fbff00'
              - value: 20
                color: '#aeff00'
              - value: 40
                color: '#4dff00'
              - value: 60
                color: '#00ffbf'
              - value: 80
                color: '#00bfff'
            bar_radius: 10
            charging_entity: sensor.tesla_model_3_vitesse_de_charge
          - charging_entity: binary_sensor.ci_tesla_charging
            progress_color: '#8ce73a'
