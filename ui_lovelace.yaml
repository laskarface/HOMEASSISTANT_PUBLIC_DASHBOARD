                - box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3)
                - padding: 15px
                - cursor: default
            custom_fields:
              jauge: |
                [[[
                  // On fouille dans le capteur existant pour trouver la Journée actuelle (max matchs joués)
                  let sensor = states['sensor.ligue_1_scoreboard'];
                  let gamesPlayed = 0;
                  if (sensor && sensor.attributes && sensor.attributes.entries) {
                     let maxGames = 0;
                     sensor.attributes.entries.forEach(e => {
                        if (e.stats) {
                           let gp = e.stats.find(s => s.name === 'gamesPlayed');
                           if (gp) {
                              let v = parseInt(gp.displayValue);
                              if (v > maxGames) maxGames = v;
                           }
                        }
                     });
                     gamesPlayed = maxGames;
                  }
                  
                  let totalGames = 34; // 18 équipes en L1 = 34 Journées
                  let pct = (gamesPlayed / totalGames) * 100;
                  if (pct > 100) pct = 100;
                  
                  return `
                    <!-- En-tête : Logo, Titres et Badge Journée -->
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;">
                      <div style="display: flex; align-items: center; gap: 10px;">
