                        width: 100% !important;
                        height: 48px !important;
                        outline: none !important;
                        text-align: left !important;
                        padding: 0 15px;
                        margin: 0;
                        user-select: text !important;
                        -webkit-user-select: text !important;
                        box-sizing: border-box;
                        box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
                      "
                    />
                  `;
                ]]]
