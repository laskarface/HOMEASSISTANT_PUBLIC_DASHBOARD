    name: "Trajet Maison Travail Aline"
    origin: "48.4744, 2.3333"
    destination: "48.598, 2.425"
    region: 'EU'
  - platform: waze_travel_time
    name: "Trajet Travail Maison Aline"
    origin: "48.598, 2.425"
    destination: "48.4744, 2.3333"
    region: 'EU'
  - platform: waze_travel_time
    name: "Trajet Maison Travail Chris"
    origin: "48.4744, 2.3333"
    destination: "48.8322, 2.3871"
    region: 'EU'
  - platform: waze_travel_time
    name: "Trajet Travail Maison Chris"
    origin: "48.8322, 2.3871"
    destination: "48.4744, 2.3333"
    region: 'EU'
  # STATISTICS ALLER heart
  - platform: statistics
    name: "Trajet Aline Moyenne"
    unique_id: "trajet_aline_moyenne_uid"
    entity_id: sensor.trajet_maison_travail_aline
    state_characteristic: mean
    max_age:
      days: 7
  - platform: statistics
    name: "Trajet Chris Moyenne"
    unique_id: "trajet_chris_moyenne_uid"
    entity_id: sensor.trajet_maison_travail_chris
    state_characteristic: mean
    max_age:
      days: 7
      
  # STATISTICS RETOUR heart
  - platform: statistics
    name: "Trajet Aline Retour Moyenne"
    unique_id: "trajet_aline_retour_moyenne_uid"
    entity_id: sensor.aline_travail_maison  # Corrigé ici
    state_characteristic: mean
    max_age:
      days: 7

  - platform: statistics
    name: "Trajet Chris Retour Moyenne"
    unique_id: "trajet_chris_retour_moyenne_uid"
    entity_id: sensor.chris_travail_maison  # Corrigé ici
    state_characteristic: mean
    max_age:
      days: 7

  # SQL S-1 ALLER
  - platform: sql
    queries:
      - name: "Trajet Aline Semaine Dernière"
        unique_id: "trajet_aline_semaine_derniere_uid"
        query: >
          SELECT state FROM states 
